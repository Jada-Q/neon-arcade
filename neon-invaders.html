<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON INVADERS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== 全局：合成波 OutRun 风格 ===== */
  :root{
    --pink:#ff2e88; --cyan:#5ef0ff; --magenta:#ff5ec8; --gold:#ffd95e; --green:#5effa0;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#160a36; }
  body{
    font-family:'Chakra Petch', system-ui, "Microsoft YaHei", sans-serif;
    display:flex; align-items:center; justify-content:center;
    /* 日落渐变背景 */
    background:linear-gradient(#160a36,#3a1457 30%,#7a2a6e 50%,#ff5e7e 64%,#ff9a4d 72%,#160a36 72%);
    color:#fff; -webkit-user-select:none; user-select:none; touch-action:none;
  }
  #wrap{
    position:relative; height:100vh; aspect-ratio:9/16; max-width:100vw;
    box-shadow:0 0 40px rgba(0,0,0,.6);
  }
  canvas{ display:block; width:100%; height:100%; image-rendering:pixelated; background:transparent; }

  /* CRT 扫描线 */
  #crt{
    position:absolute; inset:0; pointer-events:none; z-index:30; opacity:.18;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.5) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode:overlay;
  }

  /* HUD */
  #hud{
    position:absolute; top:0; left:0; right:0; z-index:20; padding:10px 14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    font-family:'Press Start 2P', monospace; font-size:11px; line-height:1.6; pointer-events:none;
    text-shadow:2px 2px 0 #000;
  }
  #hud .lbl{ color:var(--cyan); font-size:8px; }
  #hud .pink{ color:var(--pink); } #hud .gold{ color:var(--gold); }
  #muteBtn{
    pointer-events:auto; cursor:pointer; font-family:'Press Start 2P',monospace; font-size:10px;
    color:var(--gold); background:rgba(22,10,54,.7); border:2px solid var(--gold);
    box-shadow:3px 3px 0 var(--pink); padding:6px 8px;
  }

  /* 遮罩(开始 / 结束) */
  .mask{
    position:absolute; inset:0; z-index:40; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:18px; padding:24px;
    background:rgba(13,6,32,.72); backdrop-filter:blur(2px);
  }
  .mask.hidden{ display:none; }
  .mask h1{
    font-family:'Press Start 2P',monospace; font-size:26px; line-height:1.4;
    color:var(--cyan); text-shadow:4px 4px 0 var(--pink), 0 0 18px var(--cyan);
    letter-spacing:1px;
  }
  .mask h1 small{ display:block; font-size:13px; color:var(--gold); margin-top:8px; text-shadow:3px 3px 0 var(--magenta); }
  .mask p{ font-size:15px; max-width:320px; line-height:1.7; color:#ffe; }
  .mask .hi{ color:var(--gold); font-weight:700; }
  .btn{
    font-family:'Press Start 2P',monospace; font-size:14px; cursor:pointer;
    color:#160a36; background:var(--cyan); border:none; padding:16px 26px;
    box-shadow:5px 5px 0 var(--pink); transition:transform .05s;
  }
  .btn:active{ transform:translate(3px,3px); box-shadow:2px 2px 0 var(--pink); }
  .gov{ color:var(--pink); text-shadow:4px 4px 0 var(--gold),0 0 18px var(--pink); }
  .tag{ font-family:'Press Start 2P',monospace; font-size:9px; color:var(--magenta); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="crt"></div>

  <div id="hud">
    <div>
      <div class="lbl">SCORE</div><div id="scoreV">0</div>
      <div class="lbl pink" style="margin-top:6px">HI</div><div id="hiV" class="gold">0</div>
    </div>
    <div style="text-align:center">
      <div class="lbl">WAVE</div><div id="waveV" class="gold">1</div>
    </div>
    <div style="text-align:right">
      <div class="lbl">LIVES</div><div id="livesV" class="pink">♥♥♥</div>
      <button id="muteBtn">♪ ON</button>
    </div>
  </div>

  <!-- 开始遮罩 -->
  <div id="startMask" class="mask">
    <h1>NEON<br>INVADERS<small>合成波 · 太空入侵者</small></h1>
    <p><span class="hi">← →</span> 或 拖动 移动炮台<br>
       <span class="hi">空格</span> 或 点击 开火<br>
       清光一波过关 · 守住底线 · 3 条命</p>
    <button id="startBtn" class="btn">▶ START</button>
    <div class="tag">MAX SCORE 保存在本机</div>
  </div>

  <!-- 结束遮罩 -->
  <div id="overMask" class="mask hidden">
    <h1 class="gov">GAME<br>OVER</h1>
    <p>本局得分 <span id="finalScore" class="hi">0</span><br>最高 <span id="finalHi" class="hi">0</span></p>
    <button id="againBtn" class="btn">↺ RETRY</button>
  </div>
</div>

<script>
"use strict";
/* =========================================================================
   NEON INVADERS — 合成波太空入侵者
   单文件 / 原生 Canvas 2D / rAF + delta time
   ========================================================================= */

(function(){
  // ---- DOM ----
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d', { alpha:true });
  const scoreV = document.getElementById('scoreV');
  const hiV    = document.getElementById('hiV');
  const waveV  = document.getElementById('waveV');
  const livesV = document.getElementById('livesV');
  const startMask = document.getElementById('startMask');
  const overMask  = document.getElementById('overMask');
  const startBtn  = document.getElementById('startBtn');
  const againBtn  = document.getElementById('againBtn');
  const finalScore= document.getElementById('finalScore');
  const finalHi   = document.getElementById('finalHi');
  const muteBtn   = document.getElementById('muteBtn');

  // ---- 霓虹色 ----
  const C = { pink:'#ff2e88', cyan:'#5ef0ff', magenta:'#ff5ec8', gold:'#ffd95e', green:'#5effa0' };

  // ---- URL 参数:demo / record ----
  const params   = new URLSearchParams(location.search);
  const DEMO     = params.has('demo') || params.has('record');
  const RECORD_N = params.has('record') ? Math.max(1, parseInt(params.get('record')||'20',10)) : 0;

  // ---- 逻辑分辨率(竖屏)----
  const W = 540, H = 960;   // 9:16
  let DPR = 1;

  // ---- 最高分 ----
  let hi = 0;
  try{ hi = parseInt(localStorage.getItem('neonInvadersHi')||'0',10)||0; }catch(e){}
  hiV.textContent = hi;

  // =======================================================================
  //  画布尺寸:仅在真正变化时重设(录制期间不破坏画面)
  // =======================================================================
  function resize(){
    DPR = Math.min(2, window.devicePixelRatio||1);
    const rect = cv.getBoundingClientRect();
    const w = Math.max(1, Math.round(rect.width  * DPR));
    const h = Math.max(1, Math.round(rect.height * DPR));
    if(cv.width !== w || cv.height !== h){
      cv.width = w; cv.height = h;
    }
  }
  window.addEventListener('resize', resize);

  // =======================================================================
  //  Web Audio:程序化音效 + 合成波循环配乐
  // =======================================================================
  const Audio = (function(){
    let actx=null, master=null, musicGain=null, sfxGain=null, muted=false;
    let musicTimer=null, step=0;
    function ensure(){
      if(actx) return;
      try{
        actx = new (window.AudioContext||window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0.9; master.connect(actx.destination);
        musicGain = actx.createGain(); musicGain.gain.value = 0.18; musicGain.connect(master);
        sfxGain = actx.createGain(); sfxGain.gain.value = 0.55; sfxGain.connect(master);
      }catch(e){ actx=null; }
    }
    function resume(){ ensure(); if(actx && actx.state==='suspended'){ actx.resume(); } }
    function beep(freq, dur, type, gain, slideTo){
      if(!actx || muted) return;
      try{
        const o=actx.createOscillator(), g=actx.createGain();
        o.type=type||'square'; o.frequency.value=freq;
        if(slideTo){ o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), actx.currentTime+dur); }
        g.gain.value=0.0001;
        g.gain.exponentialRampToValueAtTime(gain||0.3, actx.currentTime+0.008);
        g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
        o.connect(g); g.connect(sfxGain); o.start(); o.stop(actx.currentTime+dur+0.02);
      }catch(e){}
    }
    function noise(dur, gain){
      if(!actx || muted) return;
      try{
        const len=Math.floor(actx.sampleRate*dur);
        const buf=actx.createBuffer(1,len,actx.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*(1-i/len); }
        const src=actx.createBufferSource(); src.buffer=buf;
        const g=actx.createGain(); g.gain.value=gain||0.3;
        const f=actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1200;
        src.connect(f); f.connect(g); g.connect(sfxGain); src.start();
      }catch(e){}
    }
    // 音效封装
    const sfx = {
      shoot(){ beep(880,0.12,'square',0.22,220); },
      explode(){ noise(0.32,0.4); beep(180,0.3,'sawtooth',0.25,40); },
      hit(){ beep(330,0.18,'triangle',0.3,90); },
      wave(){ beep(523,0.1,'square',0.3); setTimeout(()=>beep(784,0.16,'square',0.3),110); },
      enemyShoot(){ beep(200,0.14,'sawtooth',0.18,120); },
      shield(){ noise(0.12,0.25); },
      over(){ beep(440,0.2,'sawtooth',0.3,60); setTimeout(()=>beep(220,0.45,'sawtooth',0.3,40),180); }
    };
    // 合成波循环配乐:贝斯 + 琶音
    const bass=[55,55,82.4,73.4];           // A1 A1 E2 D2
    const arp =[440,554,659,554,440,659,880,659];
    function startMusic(){
      if(!actx || musicTimer) return;
      step=0;
      const tempo=0.26;
      musicTimer=setInterval(()=>{
        if(muted) return;
        const t=actx.currentTime;
        // 贝斯每 2 拍
        if(step%2===0){
          const b=bass[(step/2|0)%bass.length];
          tone(b,tempo*2,'sawtooth',0.5,musicGain);
        }
        // 琶音
        const a=arp[step%arp.length];
        tone(a,tempo*0.9,'square',0.16,musicGain);
        step++;
      }, tempo*1000);
    }
    function tone(freq,dur,type,gain,dest){
      if(!actx||muted) return;
      try{
        const o=actx.createOscillator(), g=actx.createGain();
        o.type=type; o.frequency.value=freq;
        g.gain.value=0.0001;
        g.gain.linearRampToValueAtTime(gain, actx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
        o.connect(g); g.connect(dest); o.start(); o.stop(actx.currentTime+dur+0.02);
      }catch(e){}
    }
    function setMuted(m){
      muted=m;
      if(master) master.gain.value = m?0:0.9;
    }
    return {
      resume, ensure, sfx, startMusic, setMuted,
      get muted(){ return muted; }
    };
  })();

  // 静音按钮
  muteBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    const m = !Audio.muted;
    Audio.setMuted(m);
    muteBtn.textContent = m ? '♪ OFF' : '♪ ON';
    muteBtn.style.color = m ? '#888' : C.gold;
    muteBtn.style.borderColor = m ? '#888' : C.gold;
  });

  // =======================================================================
  //  游戏状态
  // =======================================================================
  const STATE = { MENU:0, PLAY:1, OVER:2 };
  let state = STATE.MENU;

  let player, bullets, enemies, enemyBullets, shields, particles, stars;
  let enemyDir, enemyStepDown, enemyBaseSpeed, enemySpeed, enemyFireCd, enemyFireTimer;
  let score, lives, wave, playerCd, invuln, shakeT;
  let bottomLine;

  const player0 = ()=>({ x:W/2, y:H-90, w:54, h:26, speed:430 });

  // 星空背景
  function makeStars(){
    stars=[];
    for(let i=0;i<70;i++){
      stars.push({ x:Math.random()*W, y:Math.random()*H, s:Math.random()*1.8+0.4, sp:Math.random()*22+8 });
    }
  }

  // 掩体(由小块组成,可被打掉)
  function makeShields(){
    shields=[];
    const count=4, blockW=14, blockH=12;
    const cols=6, rows=4;
    const gap=(W-count*cols*blockW)/(count+1);
    const baseY=H-200;
    for(let s=0;s<count;s++){
      const ox=gap*(s+1)+s*cols*blockW;
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          // 挖掉底部中间形成拱形
          if(r>=rows-2 && c>1 && c<cols-2) continue;
          shields.push({ x:ox+c*blockW, y:baseY+r*blockH, w:blockW, h:blockH, hp:3 });
        }
      }
    }
  }

  // 外星人阵列
  function makeEnemies(){
    enemies=[];
    const cols=8, rows=5;
    const ew=38, eh=28, gx=14, gy=18;
    const totalW=cols*ew+(cols-1)*gx;
    const ox=(W-totalW)/2;
    const oy=140;
    const types=[
      {c:C.pink, pts:30}, {c:C.magenta, pts:20}, {c:C.magenta, pts:20},
      {c:C.cyan, pts:10}, {c:C.cyan, pts:10}
    ];
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const t=types[r];
        enemies.push({
          x:ox+c*(ew+gx), y:oy+r*(eh+gy), w:ew, h:eh,
          col:t.c, pts:t.pts, alive:true, row:r, anim:0
        });
      }
    }
  }

  function resetGame(){
    player = player0();
    bullets=[]; enemyBullets=[]; particles=[];
    score=0; lives=3; wave=1;
    playerCd=0; invuln=0; shakeT=0;
    enemyDir=1; enemyStepDown=22;
    bottomLine=H-150;
    makeStars(); makeShields(); makeEnemies();
    setWaveSpeed();
    updateHUD();
  }

  function setWaveSpeed(){
    // 难度递增:每波更快;剩余越少越快
    enemyBaseSpeed = 26 + (wave-1)*10;
    enemySpeed = enemyBaseSpeed;
    enemyFireCd = Math.max(0.45, 1.35 - (wave-1)*0.12);
    enemyFireTimer = enemyFireCd*Math.random();
  }

  function nextWave(){
    wave++;
    bullets=[]; enemyBullets=[];
    makeEnemies(); makeShields();
    enemyDir=1;
    setWaveSpeed();
    Audio.sfx.wave();
    updateHUD();
  }

  function updateHUD(){
    scoreV.textContent = score;
    hiV.textContent = hi;
    waveV.textContent = wave;
    livesV.textContent = '♥'.repeat(Math.max(0,lives)) || '—';
  }

  // =======================================================================
  //  输入
  // =======================================================================
  const keys = { left:false, right:false, fire:false };
  let pointerX=null, pointerActive=false;

  window.addEventListener('keydown', e=>{
    if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=true;
    if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
    if(e.code==='Space'){ keys.fire=true; e.preventDefault(); }
    if((e.code==='Enter'||e.code==='Space') && state!==STATE.PLAY){ startGame(); }
  });
  window.addEventListener('keyup', e=>{
    if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
    if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
    if(e.code==='Space') keys.fire=false;
  });

  function canvasX(clientX){
    const r=cv.getBoundingClientRect();
    return (clientX-r.left)/r.width*W;
  }
  cv.addEventListener('pointerdown', e=>{
    if(DEMO) return;
    pointerActive=true; pointerX=canvasX(e.clientX);
    keys.fire=true;
  });
  cv.addEventListener('pointermove', e=>{
    if(DEMO) return;
    if(pointerActive) pointerX=canvasX(e.clientX);
  });
  window.addEventListener('pointerup', ()=>{ pointerActive=false; pointerX=null; keys.fire=false; });

  // =======================================================================
  //  开火 / 命中
  // =======================================================================
  function playerShoot(){
    if(playerCd>0) return;
    bullets.push({ x:player.x, y:player.y-player.h/2, w:5, h:16, vy:-720 });
    playerCd=0.32;
    Audio.sfx.shoot();
  }

  function spawnExplosion(x,y,col,n){
    n=n||14;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=Math.random()*220+40;
      particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.6+Math.random()*0.4, t:0, col });
    }
  }

  function rectHit(a,b){
    return a.x-a.w/2 < b.x+b.w/2 && a.x+a.w/2 > b.x-b.w/2 &&
           a.y-a.h/2 < b.y+b.h/2 && a.y+a.h/2 > b.y-b.h/2;
  }
  // 子弹(中心x,y, w,h) 与 块(左上角x,y,w,h)
  function bulletHitBlock(bx,by,bw,bh, blk){
    return bx-bw/2 < blk.x+blk.w && bx+bw/2 > blk.x &&
           by-bh/2 < blk.y+blk.h && by+bh/2 > blk.y;
  }

  // =======================================================================
  //  更新
  // =======================================================================
  function update(dt){
    // 星空
    for(const s of stars){ s.y += s.sp*dt; if(s.y>H){ s.y=0; s.x=Math.random()*W; } }

    // 粒子
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i]; p.t+=dt;
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt;
      if(p.t>=p.life) particles.splice(i,1);
    }

    if(state!==STATE.PLAY) return;

    if(shakeT>0) shakeT-=dt;
    if(invuln>0) invuln-=dt;
    if(playerCd>0) playerCd-=dt;

    // ---- AI 演示 或 玩家输入 ----
    if(DEMO){ demoControl(dt); }
    else {
      if(keys.left)  player.x-=player.speed*dt;
      if(keys.right) player.x+=player.speed*dt;
      if(pointerX!=null){
        const d=pointerX-player.x;
        player.x += Math.max(-player.speed*dt, Math.min(player.speed*dt, d));
      }
      if(keys.fire) playerShoot();
    }
    player.x = Math.max(player.w/2, Math.min(W-player.w/2, player.x));

    // ---- 外星人群移动 ----
    let alive=0, minX=1e9, maxX=-1e9, maxY=-1e9;
    for(const e of enemies){ if(e.alive){ alive++; minX=Math.min(minX,e.x-e.w/2); maxX=Math.max(maxX,e.x+e.w/2); maxY=Math.max(maxY,e.y+e.h/2); } }

    if(alive===0){ nextWave(); return; }

    // 剩余越少越快
    const speedMul = 1 + (40-alive)/40*1.8;
    const sp = enemySpeed*speedMul;
    let dx = enemyDir*sp*dt;
    let stepDown=false;
    if(minX+dx < 8){ dx = 8-minX; stepDown=true; }
    if(maxX+dx > W-8){ dx = (W-8)-maxX; stepDown=true; }

    for(const e of enemies){ if(e.alive){ e.x+=dx; e.anim+=dt; } }
    if(stepDown){
      enemyDir*=-1;
      for(const e of enemies){ if(e.alive) e.y+=enemyStepDown; }
      enemySpeed += 3; // 每次下降略加速
    }

    // 压到底线 -> GAME OVER
    if(maxY>=bottomLine){ gameOver(); return; }

    // ---- 外星人开火 ----
    enemyFireTimer-=dt;
    if(enemyFireTimer<=0){
      enemyFireTimer = enemyFireCd*(0.6+Math.random()*0.8);
      // 选一个有外星人的列的最底者
      const cols={};
      for(const e of enemies){ if(e.alive){ const k=Math.round(e.x); if(!cols[k]||e.y>cols[k].y) cols[k]=e; } }
      const arr=Object.values(cols);
      if(arr.length){
        const shooter=arr[(Math.random()*arr.length)|0];
        enemyBullets.push({ x:shooter.x, y:shooter.y+shooter.h/2, w:6, h:16, vy:240+wave*18 });
        Audio.sfx.enemyShoot();
      }
    }

    // ---- 玩家子弹 ----
    for(let i=bullets.length-1;i>=0;i--){
      const b=bullets[i]; b.y+=b.vy*dt;
      if(b.y<-20){ bullets.splice(i,1); continue; }
      let hit=false;
      // 命中外星人
      for(const e of enemies){
        if(!e.alive) continue;
        if(rectHit(b,e)){
          e.alive=false; score+=e.pts;
          spawnExplosion(e.x,e.y,e.col,16);
          Audio.sfx.explode();
          if(score>hi){ hi=score; try{localStorage.setItem('neonInvadersHi',String(hi));}catch(_){} }
          updateHUD(); hit=true; break;
        }
      }
      if(hit){ bullets.splice(i,1); continue; }
      // 命中掩体
      for(const blk of shields){
        if(bulletHitBlock(b.x,b.y,b.w,b.h,blk)){
          blk.hp--; spawnExplosion(b.x,b.y,C.green,4); Audio.sfx.shield();
          hit=true; break;
        }
      }
      if(hit) bullets.splice(i,1);
    }
    // 清掉破坏的掩体块
    for(let i=shields.length-1;i>=0;i--){ if(shields[i].hp<=0) shields.splice(i,1); }

    // ---- 敌弹 ----
    for(let i=enemyBullets.length-1;i>=0;i--){
      const b=enemyBullets[i]; b.y+=b.vy*dt;
      if(b.y>H+20){ enemyBullets.splice(i,1); continue; }
      let hit=false;
      // 掩体
      for(const blk of shields){
        if(bulletHitBlock(b.x,b.y,b.w,b.h,blk)){
          blk.hp--; spawnExplosion(b.x,b.y,C.green,4); Audio.sfx.shield(); hit=true; break;
        }
      }
      if(hit){ enemyBullets.splice(i,1); continue; }
      // 玩家
      if(invuln<=0 && rectHit(b,player)){
        enemyBullets.splice(i,1);
        lives--; invuln=2.0; shakeT=0.4;
        spawnExplosion(player.x,player.y,C.pink,22);
        Audio.sfx.hit();
        updateHUD();
        if(lives<=0){ gameOver(); return; }
      }
    }
    for(let i=shields.length-1;i>=0;i--){ if(shields[i].hp<=0) shields.splice(i,1); }
  }

  // =======================================================================
  //  AI 演示控制:对准最近一列开火 + 躲避下落敌弹 + 持续清场
  // =======================================================================
  function demoControl(dt){
    // 1) 找威胁:最接近且会砸到附近的敌弹
    let danger=null, dDist=1e9;
    for(const b of enemyBullets){
      if(b.y<player.y && b.y>player.y-360){
        const dx=Math.abs(b.x-player.x);
        if(dx<70){
          const d=player.y-b.y;
          if(d<dDist){ dDist=d; danger=b; }
        }
      }
    }
    let target=null;
    // 2) 选目标:对准上方最低(最近)的存活外星人
    let best=-1;
    for(const e of enemies){
      if(!e.alive) continue;
      if(e.y>best){ best=e.y; target=e; }
    }
    // 也优先瞄准 x 接近的列,提高命中
    let aim=null, aimDx=1e9;
    for(const e of enemies){
      if(!e.alive) continue;
      const dx=Math.abs(e.x-player.x);
      if(dx<aimDx){ aimDx=dx; aim=e; }
    }

    let desiredX;
    if(danger){
      // 躲避:朝远离弹道方向移动
      desiredX = (danger.x>player.x) ? player.x-120 : player.x+120;
      // 边界处反向
      if(desiredX<60) desiredX=player.x+120;
      if(desiredX>W-60) desiredX=player.x-120;
    } else if(aim){
      desiredX = aim.x;
    } else {
      desiredX = W/2;
    }

    const diff=desiredX-player.x;
    if(Math.abs(diff)>6){
      player.x += Math.sign(diff)*player.speed*dt;
    }

    // 3) 开火:对准某列且无紧迫危险时
    if(aim && Math.abs(aim.x-player.x)<16 && playerCd<=0){
      playerShoot();
    } else if(!danger && playerCd<=0 && Math.random()<0.3){
      playerShoot();
    }
  }

  // =======================================================================
  //  绘制
  // =======================================================================
  function draw(){
    const w=cv.width, h=cv.height;
    const sx=w/W, sy=h/H;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.scale(sx,sy);

    // 抖动
    if(shakeT>0){
      const m=shakeT*22;
      ctx.translate((Math.random()-.5)*m,(Math.random()-.5)*m);
    }

    // 星空
    ctx.fillStyle='#fff';
    for(const s of stars){ ctx.globalAlpha=0.5+s.s/2.2; ctx.fillRect(s.x,s.y,s.s,s.s); }
    ctx.globalAlpha=1;

    // 地平线网格(合成波)
    drawGrid();

    // 掩体
    for(const blk of shields){
      const a = blk.hp>=3?1 : blk.hp===2?0.7:0.4;
      ctx.fillStyle = blk.hp>=3?C.green : blk.hp===2?C.cyan:C.gold;
      ctx.globalAlpha=a;
      ctx.fillRect(blk.x,blk.y,blk.w-1,blk.h-1);
    }
    ctx.globalAlpha=1;

    // 外星人
    for(const e of enemies){ if(e.alive) drawAlien(e); }

    // 玩家子弹
    for(const b of bullets){ neonRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h,C.cyan); }
    // 敌弹
    for(const b of enemyBullets){ neonRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h,C.pink); }

    // 玩家
    if(state===STATE.PLAY || state===STATE.OVER){
      const blink = invuln>0 && (Math.floor(invuln*10)%2===0);
      if(!blink) drawPlayer();
    }

    // 粒子
    for(const p of particles){
      ctx.globalAlpha=Math.max(0,1-p.t/p.life);
      ctx.fillStyle=p.col;
      ctx.fillRect(p.x-2,p.y-2,4,4);
    }
    ctx.globalAlpha=1;

    // 底线警示
    ctx.strokeStyle=C.pink; ctx.globalAlpha=0.35; ctx.lineWidth=2;
    ctx.setLineDash([10,8]);
    ctx.beginPath(); ctx.moveTo(0,bottomLine); ctx.lineTo(W,bottomLine); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;

    ctx.restore();
  }

  function drawGrid(){
    ctx.save();
    ctx.strokeStyle='rgba(94,240,255,0.18)'; ctx.lineWidth=1;
    const hy=H-130;
    for(let i=0;i<=10;i++){
      const x=i/10*W;
      ctx.beginPath(); ctx.moveTo(x,hy); ctx.lineTo(W/2+(x-W/2)*3,H); ctx.stroke();
    }
    for(let i=0;i<6;i++){
      const t=i/6, y=hy+t*t*(H-hy);
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    ctx.restore();
  }

  function neonRect(x,y,w,h,col){
    ctx.save();
    ctx.shadowColor=col; ctx.shadowBlur=10;
    ctx.fillStyle=col; ctx.fillRect(x,y,w,h);
    ctx.restore();
  }

  function drawAlien(e){
    const x=e.x, y=e.y, w=e.w, h=e.h;
    const frame=Math.floor(e.anim*4)%2;
    ctx.save();
    ctx.shadowColor=e.col; ctx.shadowBlur=12;
    ctx.fillStyle=e.col;
    const px=w/8, py=h/8;
    // 像素外星人(8x8 网格)
    const pat = frame===0
      ? [[0,2],[0,5],[1,1],[1,3],[1,4],[1,6],[2,0],[2,1],[2,2],[2,3],[2,4],[2,5],[2,6],[2,7],[3,0],[3,2],[3,3],[3,4],[3,5],[3,7],[4,0],[4,2],[4,5],[4,7]]
      : [[0,2],[0,5],[1,2],[1,3],[1,4],[1,5],[2,1],[2,2],[2,3],[2,4],[2,5],[2,6],[3,0],[3,2],[3,3],[3,4],[3,5],[3,7],[4,1],[4,6]];
    const ox=x-w/2, oy=y-h/2;
    for(const [r,c] of pat){
      ctx.fillRect(ox+c*px, oy+r*py, px+0.5, py+0.5);
    }
    // 眼睛
    ctx.fillStyle='#160a36';
    ctx.fillRect(ox+2.2*px, oy+2*py, px*0.9, py*0.9);
    ctx.fillRect(ox+4.9*px, oy+2*py, px*0.9, py*0.9);
    ctx.restore();
  }

  function drawPlayer(){
    const x=player.x, y=player.y, w=player.w, h=player.h;
    ctx.save();
    ctx.shadowColor=C.cyan; ctx.shadowBlur=14;
    ctx.fillStyle=C.cyan;
    // 炮台底座
    ctx.fillRect(x-w/2, y+h/2-8, w, 8);
    ctx.fillRect(x-w/2+6, y-2, w-12, h/2);
    // 炮管
    ctx.fillStyle=C.gold;
    ctx.fillRect(x-3, y-h/2, 6, h/2);
    // 翼
    ctx.fillStyle=C.pink;
    ctx.fillRect(x-w/2, y+h/2-4, 6, 4);
    ctx.fillRect(x+w/2-6, y+h/2-4, 6, 4);
    ctx.restore();
  }

  // =======================================================================
  //  游戏流程
  // =======================================================================
  function startGame(){
    Audio.resume();
    Audio.startMusic();
    state=STATE.PLAY;
    resetGame();
    startMask.classList.add('hidden');
    overMask.classList.add('hidden');
  }

  function gameOver(){
    state=STATE.OVER;
    Audio.sfx.over();
    if(score>hi){ hi=score; try{localStorage.setItem('neonInvadersHi',String(hi));}catch(_){} }
    finalScore.textContent=score;
    finalHi.textContent=hi;
    updateHUD();
    if(DEMO){
      // 演示:稍后自动重开,保证整段有内容
      setTimeout(()=>{ if(DEMO){ startGame(); } }, 2200);
    } else {
      overMask.classList.remove('hidden');
    }
  }

  startBtn.addEventListener('click', startGame);
  againBtn.addEventListener('click', startGame);

  // =======================================================================
  //  主循环:rAF + delta time,update/draw 各自 try/catch
  // =======================================================================
  let last=performance.now();
  function loop(now){
    let dt=(now-last)/1000; last=now;
    if(dt>0.05) dt=0.05; // 限制大跳变
    resize();
    try{ update(dt); }catch(err){ /* 防止单帧异常中断 */ console&&console.warn&&console.warn('update',err); }
    try{ draw(); }catch(err){ console&&console.warn&&console.warn('draw',err); }
    requestAnimationFrame(loop);
  }

  // 初始化
  resize();
  resetGame();
  state=STATE.MENU;
  requestAnimationFrame(loop);

  // =======================================================================
  //  ?demo / ?record:免手势开局
  // =======================================================================
  if(DEMO){
    // 免手势:尝试 resume 音频(部分浏览器仍需手势,失败也不影响画面)
    Audio.ensure();
    setTimeout(()=>{ Audio.resume(); Audio.startMusic(); }, 100);
    startGame();
  }

  // =======================================================================
  //  ?record=N:自动录制主 canvas N 秒后下载 webm
  // =======================================================================
  if(RECORD_N>0){
    function startRecording(){
      try{
        if(!cv.width || !cv.height){ setTimeout(startRecording,200); return; }
        const stream=cv.captureStream(30);
        if(!stream || stream.getVideoTracks().length===0){ setTimeout(startRecording,200); return; }
        let mt='video/webm;codecs=vp9';
        if(!MediaRecorder.isTypeSupported(mt)) mt=(MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm');
        const mr=new MediaRecorder(stream,{mimeType:mt,videoBitsPerSecond:9000000});
        const chunks=[];
        mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
        mr.onstop=()=>{
          const b=new Blob(chunks,{type:'video/webm'});
          const a=document.createElement('a');
          a.href=URL.createObjectURL(b); a.download='neon-invaders.webm';
          document.body.appendChild(a); try{a.click()}catch(e){}
        };
        mr.start(250);
        setTimeout(()=>{ try{mr.stop()}catch(e){} }, RECORD_N*1000);
      }catch(e){ /* 录制不可用则忽略 */ }
    }
    setTimeout(startRecording, 500);
  }

})();
</script>
