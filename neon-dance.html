<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON DANCE — 霓虹方向键节奏跳舞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== 合成波 OutRun 全局样式 ===== */
  :root{
    --pink:#ff2e88; --cyan:#5ef0ff; --magenta:#ff5ec8; --gold:#ffd95e; --green:#5effa0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;width:100%;overflow:hidden;background:#160a36;}
  body{
    font-family:'Chakra Petch','Microsoft YaHei',sans-serif;
    display:flex;align-items:center;justify-content:center;
    /* 日落渐变背景 */
    background:linear-gradient(#160a36,#3a1457 30%,#7a2a6e 50%,#ff5e7e 64%,#ff9a4d 72%,#160a36 72%);
    color:#fff;-webkit-tap-highlight-color:transparent;user-select:none;
  }
  #wrap{
    position:relative;height:100vh;max-height:100vh;aspect-ratio:9/16;
    max-width:100vw;background:#0c0622;overflow:hidden;
    box-shadow:0 0 40px rgba(255,46,136,.4),0 0 80px rgba(94,240,255,.2);
  }
  canvas{display:block;width:100%;height:100%;}
  /* 极轻 CRT 扫描线叠加 */
  #scan{
    position:absolute;inset:0;pointer-events:none;z-index:30;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.10) 3px,rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply;
  }
  /* 静音按钮 */
  #muteBtn{
    position:absolute;top:10px;right:10px;z-index:40;
    font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:13px;
    color:var(--cyan);background:#1a0e3a;border:2px solid var(--cyan);
    box-shadow:4px 4px 0 var(--pink);padding:7px 11px;cursor:pointer;
  }
  #muteBtn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--pink);}
  /* 遮罩(开始/结束) */
  .overlay{
    position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px;
    background:radial-gradient(ellipse at 50% 38%,rgba(58,20,87,.82),rgba(12,6,34,.96));
    backdrop-filter:blur(2px);
  }
  .overlay.hidden{display:none;}
  .title{
    font-family:'Press Start 2P',monospace;font-size:clamp(18px,5.4vw,30px);line-height:1.5;
    color:var(--pink);text-shadow:3px 3px 0 var(--cyan),0 0 18px var(--pink);margin-bottom:18px;
  }
  .sub{font-size:clamp(13px,3.4vw,17px);color:var(--cyan);margin-bottom:8px;line-height:1.7;font-weight:600;}
  .hint{font-size:clamp(11px,2.8vw,13px);color:#ffd95e;line-height:1.9;margin-top:14px;opacity:.9;}
  .btn{
    margin-top:22px;font-family:'Press Start 2P',monospace;font-size:clamp(12px,3.4vw,16px);
    color:#0c0622;background:var(--gold);border:3px solid #fff;
    box-shadow:5px 5px 0 var(--pink);padding:15px 26px;cursor:pointer;letter-spacing:1px;
  }
  .btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--pink);}
  .score-final{font-family:'Press Start 2P',monospace;font-size:clamp(16px,4.4vw,24px);color:var(--gold);text-shadow:0 0 14px var(--gold);margin:10px 0;}
  .rank{font-family:'Press Start 2P',monospace;font-size:clamp(28px,9vw,52px);margin:8px 0;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="scan"></div>
  <button id="muteBtn">♪ ON</button>

  <!-- 开始遮罩 -->
  <div id="startOverlay" class="overlay">
    <div class="title">NEON<br>DANCE</div>
    <div class="sub">方向键节奏跳舞</div>
    <div class="sub" style="color:var(--magenta);">踩中节拍 · 连击计分</div>
    <button id="startBtn" class="btn">▶ START</button>
    <div class="hint">
      键盘:← ↓ ↑ →<br>
      触屏:点击底部四区<br>
      箭头到达顶部判定线时按对应方向
    </div>
  </div>

  <!-- 结束遮罩 -->
  <div id="endOverlay" class="overlay hidden">
    <div class="title" style="font-size:clamp(16px,4.6vw,26px);">RESULT</div>
    <div class="rank" id="rankText">A</div>
    <div class="score-final" id="finalScore">0</div>
    <div class="sub" id="finalStats" style="font-size:clamp(12px,3vw,15px);"></div>
    <div class="sub" id="bestScore" style="color:var(--gold);font-size:clamp(12px,3vw,15px);"></div>
    <button id="retryBtn" class="btn">↻ RETRY</button>
  </div>
</div>

<script>
"use strict";
/* =========================================================================
   NEON DANCE — DDR 式方向键节奏跳舞(竖屏 2D Canvas / 合成波 OutRun)
   - 四方向箭头(← ↓ ↑ →)从下往上滚向顶部判定线
   - Web Audio 合成波节拍 + 按拍确定性生成谱面
   - 用 audioCtx.currentTime 做采样级音画对齐
   ========================================================================= */

(function(){

// ---------- 基础引用 ----------
const cv = document.getElementById('game');
const ctx = cv.getContext('2d', { alpha:false });
const wrap = document.getElementById('wrap');
const startOverlay = document.getElementById('startOverlay');
const endOverlay   = document.getElementById('endOverlay');
const startBtn = document.getElementById('startBtn');
const retryBtn = document.getElementById('retryBtn');
const muteBtn  = document.getElementById('muteBtn');

// ---------- URL 参数(?demo / ?record=N) ----------
const params = new URLSearchParams(location.search);
const DEMO   = params.has('demo') || params.has('record');
const RECORD_SEC = params.has('record') ? Math.max(1, parseInt(params.get('record')||'15',10)||15) : 0;

// ---------- 逻辑分辨率(竖屏 9:16) ----------
const W = 540, H = 960;
let scaleCss = 1;     // CSS 缩放(仅显示)
let dpr = 1;

// ---------- 颜色 ----------
const COL = {
  pink:'#ff2e88', cyan:'#5ef0ff', magenta:'#ff5ec8', gold:'#ffd95e', green:'#5effa0',
  bg0:'#160a36', bg1:'#3a1457'
};

// 四条轨道:索引 0=左 1=下 2=上 3=右
const DIRS = [
  { name:'L', key:'ArrowLeft',  rot:Math.PI,        color:COL.cyan    },
  { name:'D', key:'ArrowDown',  rot:Math.PI/2,      color:COL.magenta },
  { name:'U', key:'ArrowUp',    rot:-Math.PI/2,     color:COL.green   },
  { name:'R', key:'ArrowRight', rot:0,              color:COL.gold    }
];
const LANE_COUNT = 4;
const JUDGE_Y = 150;          // 顶部判定线 y(逻辑像素)
const SCROLL_PX_PER_SEC = 520; // 箭头上滚速度
const LEAD_TIME = (H - JUDGE_Y) / SCROLL_PX_PER_SEC; // 从底部生成到判定的时间

// 判定窗口(秒)
const WIN_PERFECT = 0.060;
const WIN_GOOD    = 0.130;
const WIN_MISS    = 0.180; // 超过此值未按视为漏掉(或过线)

// ---------- 音频 ----------
let audioCtx = null;
let masterGain = null;
let musicGain = null;
let muted = false;
let musicTimer = null;
let nextNoteTime = 0;   // 下一拍调度时间(audioCtx 时间)
let beatIndex = 0;      // 全局拍计数
const BPM = 124;
const SPB = 60 / BPM;   // 每拍秒数
let songStartCtxTime = 0; // 歌曲开始时的 audioCtx.currentTime

// ---------- 游戏状态 ----------
let state = 'menu';     // menu | playing | end
let arrows = [];        // 活动箭头
let chart = [];         // 谱面:{time, lane, hit, judged}
let chartIdx = 0;       // 已生成箭头的谱面指针
let lastTime = 0;
let score = 0, combo = 0, maxCombo = 0;
let counts = { perfect:0, good:0, miss:0 };
let totalNotes = 0;
let songElapsed = 0;    // 采样自 audioCtx 的歌曲时间(秒)
const SONG_LEN = DEMO && !RECORD_SEC ? 9999 : (RECORD_SEC ? RECORD_SEC + LEAD_TIME + 1.2 : 95); // 演示无限,普通约 95s

// 视觉效果
let laneFlash = [0,0,0,0];      // 每轨判定闪光计时
let laneJudgeText = [null,null,null,null]; // 每轨判定文字 {txt,col,t}
let particles = [];
let pulse = 0;                  // 全局随拍脉动 0..1
let bgScroll = 0;
let shake = 0;

let best = 0;
try { best = parseInt(localStorage.getItem('neonDanceBest')||'0',10)||0; } catch(e){ best = 0; }

// =========================================================================
//  自适应:仅在尺寸真正变化时重设 canvas(录制期避免清空)
// =========================================================================
function resize(){
  const rect = wrap.getBoundingClientRect();
  const newDpr = Math.min(window.devicePixelRatio||1, 2);
  const targetW = Math.round(rect.width  * newDpr);
  const targetH = Math.round(rect.height * newDpr);
  if (cv.width !== targetW || cv.height !== targetH){
    cv.width  = targetW;
    cv.height = targetH;
    dpr = newDpr;
  }
}
window.addEventListener('resize', resize);

// 把逻辑坐标系映射到物理像素:整体等比缩放并居中
function applyTransform(){
  const sx = cv.width / W, sy = cv.height / H;
  const s = Math.min(sx, sy);
  const ox = (cv.width  - W*s)/2;
  const oy = (cv.height - H*s)/2;
  ctx.setTransform(s,0,0,s,ox,oy);
}

// =========================================================================
//  音频初始化与合成波配乐
// =========================================================================
function initAudio(){
  if (audioCtx) return;
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : 0.9;
    masterGain.connect(audioCtx.destination);
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.55;
    musicGain.connect(masterGain);
  }catch(e){ console.warn('audio init fail', e); }
}

// 单个合成音:osc -> gain
function tone(freq, t, dur, type, vol, dest){
  if(!audioCtx) return;
  try{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type||'sawtooth';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(dest||musicGain);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}

// 底鼓(噪声+低频)
function kick(t){
  if(!audioCtx) return;
  try{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(48, t+0.12);
    g.gain.setValueAtTime(0.9, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
    o.connect(g); g.connect(musicGain);
    o.start(t); o.stop(t+0.2);
  }catch(e){}
}

// 嗨帽(高通噪声)
function hat(t){
  if(!audioCtx) return;
  try{
    const bufSize = audioCtx.sampleRate*0.05;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/bufSize,2);
    const src = audioCtx.createBufferSource(); src.buffer=buf;
    const hp = audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7000;
    const g = audioCtx.createGain(); g.gain.value=0.18;
    src.connect(hp); hp.connect(g); g.connect(musicGain);
    src.start(t);
  }catch(e){}
}

// 合成波贝斯线(每拍)+ 旋律(琶音)
const BASS_NOTES = [55.00, 55.00, 73.42, 65.41]; // A1 A1 D2 C2  四小节循环根音
const ARP = [220.00, 277.18, 329.63, 440.00, 329.63, 277.18]; // A C# E A E C#

// 调度器:每帧检查,把临近的拍写入音频时间线(采样级精准)
function scheduleMusic(){
  if(!audioCtx) return;
  const lookAhead = 0.12; // 提前 120ms 调度
  while (nextNoteTime < audioCtx.currentTime + lookAhead){
    const t = nextNoteTime;
    const b = beatIndex;
    // 底鼓:每拍
    kick(t);
    // 嗨帽:半拍
    hat(t);
    hat(t + SPB*0.5);
    // 贝斯:每拍低音(四拍换根音)
    const root = BASS_NOTES[(Math.floor(b/4))%BASS_NOTES.length];
    tone(root, t, SPB*0.9, 'sawtooth', 0.22, musicGain);
    tone(root*2, t, SPB*0.45, 'square', 0.10, musicGain);
    // 旋律琶音:每半拍走一步,加入合成波明亮感
    const arpStep = (b*2)%ARP.length;
    tone(ARP[arpStep], t, 0.18, 'sawtooth', 0.10, musicGain);
    tone(ARP[(arpStep+3)%ARP.length], t+SPB*0.5, 0.16, 'triangle', 0.07, musicGain);
    // 每 8 拍来个上行 sweep 增加段落感
    if (b%8===7){
      tone(440, t+SPB*0.5, 0.22, 'sawtooth', 0.08, musicGain);
      tone(660, t+SPB*0.75, 0.22, 'sawtooth', 0.06, musicGain);
    }
    nextNoteTime += SPB;
    beatIndex++;
  }
}

// 命中音效(根据判定)
function sfx(type){
  if(!audioCtx) return;
  const t = audioCtx.currentTime;
  if(type==='perfect'){
    tone(880, t, 0.10, 'square', 0.20, masterGain);
    tone(1320, t+0.02, 0.10, 'square', 0.14, masterGain);
  }else if(type==='good'){
    tone(660, t, 0.10, 'square', 0.16, masterGain);
  }else if(type==='miss'){
    tone(120, t, 0.18, 'sawtooth', 0.20, masterGain);
    tone(90, t+0.02, 0.18, 'sawtooth', 0.14, masterGain);
  }
}

// =========================================================================
//  谱面生成:按拍确定性(基于拍号的伪随机,保证每次相同且对齐音乐)
// =========================================================================
function buildChart(){
  chart = [];
  // 用确定性散列从拍号决定该拍是否放箭头、放哪个方向
  // 普通游玩约 SONG_LEN 秒;录制/演示则覆盖足够长
  const horizon = (DEMO ? (RECORD_SEC ? RECORD_SEC + 4 : 220) : 92);
  const totalBeats = Math.ceil(horizon / SPB);
  for (let b=0; b<totalBeats; b++){
    const tBeat = b * SPB;
    // 难度递增:开局每拍约 1 个,后段加入半拍密集
    const prog = Math.min(1, tBeat / 70); // 0..1 难度进度
    const h = hash(b*2654435761 >>> 0);
    // 主拍:几乎每拍有一个(开头 2 拍预备空拍)
    if (b >= 4){
      const lane = h % LANE_COUNT;
      chart.push({ time: tBeat, lane, hit:false, judged:false });
      // 半拍加音:随难度提高概率,且避免与主拍同轨
      const h2 = hash((b*40503 + 7) >>> 0);
      const halfProb = 0.12 + prog*0.45;
      if ((h2 % 1000)/1000 < halfProb){
        let lane2 = h2 % LANE_COUNT;
        if (lane2 === lane) lane2 = (lane2+1)%LANE_COUNT;
        chart.push({ time: tBeat + SPB*0.5, lane:lane2, hit:false, judged:false });
      }
      // 高难度段偶尔双押(同拍两轨)
      if (prog>0.55){
        const h3 = hash((b*2246822519 + 13) >>> 0);
        if ((h3%1000)/1000 < (prog-0.5)*0.4){
          let lane3 = h3 % LANE_COUNT;
          if (lane3===lane) lane3=(lane3+2)%LANE_COUNT;
          chart.push({ time: tBeat, lane:lane3, hit:false, judged:false });
        }
      }
    }
  }
  chart.sort((a,b)=>a.time-b.time);
  totalNotes = chart.length;
  chartIdx = 0;
}

// 简单 32bit 整数散列
function hash(x){
  x = (x ^ (x>>>16)) >>> 0;
  x = Math.imul(x, 0x45d9f3b) >>> 0;
  x = (x ^ (x>>>16)) >>> 0;
  x = Math.imul(x, 0x45d9f3b) >>> 0;
  x = (x ^ (x>>>16)) >>> 0;
  return x;
}

// =========================================================================
//  游戏流程
// =========================================================================
function startGame(){
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  // 启动配乐调度
  const now = audioCtx ? audioCtx.currentTime : 0;
  songStartCtxTime = now + 0.18; // 留一点起播缓冲
  nextNoteTime = songStartCtxTime;
  beatIndex = 0;
  if (musicTimer) clearInterval(musicTimer);
  if (audioCtx){
    musicTimer = setInterval(scheduleMusic, 25);
  }

  buildChart();
  arrows = [];
  score = 0; combo = 0; maxCombo = 0;
  counts = { perfect:0, good:0, miss:0 };
  particles = [];
  laneFlash = [0,0,0,0];
  laneJudgeText = [null,null,null,null];
  songElapsed = 0;
  state = 'playing';
  startOverlay.classList.add('hidden');
  endOverlay.classList.add('hidden');
}

function endGame(){
  if (state !== 'playing') return;
  state = 'end';
  if (musicTimer){ clearInterval(musicTimer); musicTimer=null; }
  // 淡出音乐
  if (musicGain && audioCtx){
    try{
      musicGain.gain.setValueAtTime(musicGain.gain.value, audioCtx.currentTime);
      musicGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.6);
    }catch(e){}
  }
  if (score > best){
    best = score;
    try{ localStorage.setItem('neonDanceBest', String(best)); }catch(e){}
  }
  // 评级
  const acc = totalNotes>0 ? (counts.perfect + counts.good*0.5)/totalNotes : 0;
  let rank='D';
  if (acc>=0.95) rank='S';
  else if (acc>=0.85) rank='A';
  else if (acc>=0.7) rank='B';
  else if (acc>=0.5) rank='C';
  document.getElementById('rankText').textContent = rank;
  document.getElementById('rankText').style.color =
    rank==='S'?COL.gold : rank==='A'?COL.green : rank==='B'?COL.cyan : COL.magenta;
  document.getElementById('finalScore').textContent = score.toLocaleString();
  document.getElementById('finalStats').innerHTML =
    `PERFECT ${counts.perfect} · GOOD ${counts.good} · MISS ${counts.miss}<br>MAX COMBO ${maxCombo}`;
  document.getElementById('bestScore').textContent = `BEST ${best.toLocaleString()}`;
  endOverlay.classList.remove('hidden');

  // 演示模式:自动重开,保证整段都有内容
  if (DEMO && !RECORD_SEC){
    setTimeout(()=>{ if(state==='end') startGame(); }, 1800);
  }
}

// =========================================================================
//  输入处理
// =========================================================================
function pressLane(lane){
  if (state !== 'playing') return;
  laneFlash[lane] = 1; // 按键反馈
  // 在该轨找最接近判定时刻的未判定箭头
  const tNow = songElapsed;
  let bestArrow = null, bestDt = 999;
  for (const a of arrows){
    if (a.lane!==lane || a.judged) continue;
    const dt = Math.abs(a.time - tNow);
    if (dt < bestDt){ bestDt = dt; bestArrow = a; }
  }
  if (bestArrow && bestDt <= WIN_GOOD){
    if (bestDt <= WIN_PERFECT) judge(bestArrow,'perfect');
    else judge(bestArrow,'good');
  } else {
    // 空按:不判 miss,只给一点视觉(避免过度惩罚),但断不掉的combo保留
    // 这里给轻微脉冲
  }
}

function judge(a, kind){
  a.judged = true; a.hit = true;
  const dir = DIRS[a.lane];
  if (kind==='perfect'){
    counts.perfect++;
    combo++;
    score += 300 + Math.min(combo,50)*6;
    laneJudgeText[a.lane] = { txt:'PERFECT', col:COL.gold, t:1 };
    spawnHit(a.lane, COL.gold, 22);
    sfx('perfect');
    pulse = 1;
  } else if (kind==='good'){
    counts.good++;
    combo++;
    score += 120 + Math.min(combo,50)*3;
    laneJudgeText[a.lane] = { txt:'GOOD', col:COL.cyan, t:1 };
    spawnHit(a.lane, dir.color, 12);
    sfx('good');
    pulse = 0.7;
  } else {
    counts.miss++;
    combo = 0;
    laneJudgeText[a.lane] = { txt:'MISS', col:COL.pink, t:1 };
    sfx('miss');
    shake = 1;
  }
  if (combo > maxCombo) maxCombo = combo;
}

// 键盘
const keyMap = {};
DIRS.forEach((d,i)=> keyMap[d.key]=i);
window.addEventListener('keydown', (e)=>{
  if (keyMap.hasOwnProperty(e.key)){
    e.preventDefault();
    pressLane(keyMap[e.key]);
  }
});

// 触屏 / 鼠标:底部四区 -> 注意逻辑坐标
function pointerLane(clientX){
  const rect = cv.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width; // 0..1
  return Math.max(0, Math.min(LANE_COUNT-1, Math.floor(x*LANE_COUNT)));
}
cv.addEventListener('touchstart', (e)=>{
  if (state!=='playing') return;
  e.preventDefault();
  for (const t of e.changedTouches){
    pressLane(pointerLane(t.clientX));
  }
}, {passive:false});
cv.addEventListener('mousedown', (e)=>{
  if (state!=='playing') return;
  pressLane(pointerLane(e.clientX));
});

// =========================================================================
//  粒子 / 视觉
// =========================================================================
function laneX(lane){
  const margin = 40;
  const usable = W - margin*2;
  const lw = usable / LANE_COUNT;
  return margin + lw*lane + lw/2;
}
function laneWidth(){ return (W-80)/LANE_COUNT; }

function spawnHit(lane, color, n){
  const x = laneX(lane);
  for (let i=0;i<n;i++){
    const ang = Math.random()*Math.PI*2;
    const sp = 2 + Math.random()*5;
    particles.push({
      x, y:JUDGE_Y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp - 1,
      life:1, color, size:2+Math.random()*4
    });
  }
}

// =========================================================================
//  AI 自动演示:在每个箭头到判定区的精确时刻命中,满连击
// =========================================================================
function aiUpdate(){
  const tNow = songElapsed;
  for (const a of arrows){
    if (a.judged) continue;
    // 在极接近判定时刻时触发命中(精度高 -> 全 PERFECT)
    if (Math.abs(a.time - tNow) <= 0.018){
      laneFlash[a.lane] = 1;
      judge(a, 'perfect');
    }
  }
}

// =========================================================================
//  主循环
// =========================================================================
function update(dt){
  try{
    if (state==='playing'){
      // 采样级音画对齐:歌曲时间 = audioCtx.currentTime - 开始时刻
      if (audioCtx){
        songElapsed = audioCtx.currentTime - songStartCtxTime;
      } else {
        songElapsed += dt; // 无音频回退
      }

      // 从谱面生成箭头:当箭头应在底部出现(time - LEAD_TIME <= now)就生成
      while (chartIdx < chart.length && chart[chartIdx].time - LEAD_TIME <= songElapsed){
        arrows.push(chart[chartIdx]);
        chartIdx++;
      }

      // AI 演示命中
      if (DEMO) aiUpdate();

      // 检查漏判:过了判定窗口仍未命中 -> miss(仅非 AI)
      for (const a of arrows){
        if (a.judged) continue;
        if (songElapsed - a.time > WIN_MISS){
          if (!DEMO){
            judge(a,'miss');
          } else {
            // AI 兜底:理论不该发生,但万一漏了就当 perfect 顶上保证满连
            judge(a,'perfect');
          }
        }
      }

      // 清理已判定且飞出屏幕上方的箭头
      arrows = arrows.filter(a=>{
        const y = JUDGE_Y + (a.time - songElapsed)*(-SCROLL_PX_PER_SEC)*-1; // 见 draw
        return !(a.judged && (songElapsed - a.time) > 0.35);
      });

      // 结束条件
      if (songElapsed > SONG_LEN && state==='playing'){
        endGame();
      }
      if (!DEMO && chartIdx>=chart.length && arrows.length===0 && songElapsed>2){
        endGame();
      }
    }

    // 衰减视觉计时
    for (let i=0;i<LANE_COUNT;i++){
      if (laneFlash[i]>0) laneFlash[i] = Math.max(0, laneFlash[i]-dt*4);
      if (laneJudgeText[i]) {
        laneJudgeText[i].t -= dt*1.6;
        if (laneJudgeText[i].t<=0) laneJudgeText[i]=null;
      }
    }
    pulse = Math.max(0, pulse - dt*2.5);
    shake = Math.max(0, shake - dt*3);
    bgScroll = (bgScroll + dt*60) % 80;

    // 粒子
    for (const p of particles){
      p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= dt*1.8;
    }
    particles = particles.filter(p=>p.life>0);

  }catch(e){ console.warn('update err', e); }
}

function draw(){
  try{
    // 物理像素清屏(整屏背景,录制期不留空)
    ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle = '#0c0622';
    ctx.fillRect(0,0,cv.width,cv.height);

    applyTransform();

    // 抖动
    if (shake>0){
      ctx.translate((Math.random()-0.5)*shake*8, (Math.random()-0.5)*shake*8);
    }

    drawBackground();
    drawLanes();
    drawArrows();
    drawJudgeLine();
    drawParticles();
    drawHUD();

  }catch(e){ console.warn('draw err', e); }
}

function drawBackground(){
  // 日落渐变
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,    '#160a36');
  g.addColorStop(0.30, '#3a1457');
  g.addColorStop(0.50, '#7a2a6e');
  g.addColorStop(0.64, '#ff5e7e');
  g.addColorStop(0.72, '#ff9a4d');
  g.addColorStop(0.721,'#160a36');
  g.addColorStop(1,    '#160a36');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // 远处太阳(地平线上方)
  const sunY = H*0.40;
  const sunR = 130 + pulse*8;
  ctx.save();
  ctx.beginPath();
  ctx.arc(W/2, sunY, sunR, 0, Math.PI*2);
  ctx.clip();
  const sg = ctx.createLinearGradient(0, sunY-sunR, 0, sunY+sunR);
  sg.addColorStop(0,'#ffe85e'); sg.addColorStop(0.5,'#ff7eb0'); sg.addColorStop(1,'#ff2e88');
  ctx.fillStyle=sg; ctx.fillRect(W/2-sunR, sunY-sunR, sunR*2, sunR*2);
  // 太阳横纹
  ctx.fillStyle='#160a36';
  for (let i=0;i<8;i++){
    const yy = sunY + 18 + i*14;
    ctx.fillRect(W/2-sunR, yy, sunR*2, 6 + i);
  }
  ctx.restore();

  // 透视网格地面(地平线 0.72*H 以下)
  const horizon = H*0.72;
  ctx.strokeStyle = 'rgba(94,240,255,0.35)';
  ctx.lineWidth = 1.5;
  // 横线(随滚动)
  for (let i=0;i<14;i++){
    const f = (i + (bgScroll/80)) ;
    const y = horizon + Math.pow(f/14,2)*(H-horizon)*1.6;
    if (y>H) continue;
    ctx.globalAlpha = 0.4*(1 - (y-horizon)/(H-horizon));
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  ctx.globalAlpha=1;
  // 纵向汇聚线
  ctx.strokeStyle='rgba(255,46,136,0.30)';
  for (let i=-6;i<=6;i++){
    ctx.beginPath();
    ctx.moveTo(W/2 + i*22, horizon);
    ctx.lineTo(W/2 + i*150, H);
    ctx.stroke();
  }
}

function drawLanes(){
  const lw = laneWidth();
  for (let i=0;i<LANE_COUNT;i++){
    const x = laneX(i) - lw/2;
    // 轨道半透明
    ctx.fillStyle = i%2===0 ? 'rgba(255,46,136,0.05)' : 'rgba(94,240,255,0.05)';
    ctx.fillRect(x+3, 0, lw-6, H);
    // 轨道边线
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth=1;
    ctx.strokeRect(x+3, 0, lw-6, H);
  }
}

// 绘制一个箭头形状(以中心为原点,按方向旋转)
function drawArrowShape(cx, cy, size, rot, fill, glow, alpha){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.globalAlpha = alpha;
  ctx.shadowColor = glow;
  ctx.shadowBlur = 16;
  ctx.fillStyle = fill;
  ctx.beginPath();
  const s = size;
  // 指向 +x 的箭头
  ctx.moveTo(s*0.55, 0);
  ctx.lineTo(-s*0.1, -s*0.55);
  ctx.lineTo(-s*0.1, -s*0.22);
  ctx.lineTo(-s*0.6, -s*0.22);
  ctx.lineTo(-s*0.6,  s*0.22);
  ctx.lineTo(-s*0.1,  s*0.22);
  ctx.lineTo(-s*0.1,  s*0.55);
  ctx.closePath();
  ctx.fill();
  // 内描边
  ctx.shadowBlur = 0;
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.stroke();
  ctx.restore();
}

function drawJudgeLine(){
  const lw = laneWidth();
  for (let i=0;i<LANE_COUNT;i++){
    const dir = DIRS[i];
    const cx = laneX(i);
    const flash = laneFlash[i];
    // 判定圈(目标)
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.lineWidth = 3 + flash*4;
    ctx.strokeStyle = dir.color;
    ctx.shadowColor = dir.color;
    ctx.shadowBlur = 10 + flash*22;
    const r = lw*0.34 + flash*8;
    ctx.beginPath();
    ctx.arc(cx, JUDGE_Y, r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
    // 判定区内的方向轮廓(提示该方向)
    drawArrowShape(cx, JUDGE_Y, lw*0.42, dir.rot,
      flash>0.05 ? dir.color : 'rgba(255,255,255,0.10)',
      dir.color, flash>0.05 ? 0.9 : 0.25);

    // 判定文字
    const jt = laneJudgeText[i];
    if (jt){
      ctx.save();
      ctx.globalAlpha = Math.min(1, jt.t*1.4);
      ctx.font = '700 16px "Press Start 2P", monospace';
      ctx.fillStyle = jt.col;
      ctx.textAlign='center';
      ctx.shadowColor = jt.col; ctx.shadowBlur=12;
      const yo = JUDGE_Y + 56 - (1-jt.t)*16;
      ctx.fillText(jt.txt, cx, yo);
      ctx.restore();
    }
  }
  // 整条判定线
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.shadowColor = COL.cyan; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(20, JUDGE_Y); ctx.lineTo(W-20, JUDGE_Y); ctx.stroke();
  ctx.restore();
}

function drawArrows(){
  const lw = laneWidth();
  for (const a of arrows){
    if (a.judged && (songElapsed - a.time) > 0.05){
      // 命中后短暂上飞 + 淡出
      const k = (songElapsed - a.time);
      const y = JUDGE_Y - k*400;
      const alpha = Math.max(0, 1 - k*3);
      if (alpha<=0) continue;
      drawArrowShape(laneX(a.lane), y, lw*0.5*(1+k*1.5), DIRS[a.lane].rot, '#ffffff', DIRS[a.lane].color, alpha*0.6);
      continue;
    }
    if (a.judged) continue;
    // 位置:time 时刻应在 JUDGE_Y;未到则在下方
    const y = JUDGE_Y + (a.time - songElapsed) * SCROLL_PX_PER_SEC;
    if (y < -40 || y > H+40) continue;
    const dir = DIRS[a.lane];
    // 接近判定线时放大发光
    const near = Math.max(0, 1 - Math.abs(y-JUDGE_Y)/220);
    drawArrowShape(laneX(a.lane), y, lw*0.46*(1+near*0.12), dir.rot, dir.color, dir.color, 0.95);
  }
}

function drawParticles(){
  for (const p of particles){
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawHUD(){
  // 分数
  ctx.save();
  ctx.textAlign='left';
  ctx.font = '700 13px "Press Start 2P", monospace';
  ctx.fillStyle = COL.cyan;
  ctx.shadowColor = COL.cyan; ctx.shadowBlur=8;
  ctx.fillText('SCORE', 24, 40);
  ctx.fillStyle = '#fff';
  ctx.font = '700 22px "Press Start 2P", monospace';
  ctx.fillText(String(score).padStart(6,'0'), 24, 70);

  // BEST
  ctx.textAlign='right';
  ctx.font = '700 10px "Press Start 2P", monospace';
  ctx.fillStyle = COL.gold; ctx.shadowColor=COL.gold;
  ctx.fillText('BEST '+best, W-24, 40);
  ctx.restore();

  // 连击(中部,随拍脉动)
  if (combo>1){
    ctx.save();
    ctx.textAlign='center';
    const sc = 1 + pulse*0.25;
    ctx.translate(W/2, H*0.30);
    ctx.scale(sc, sc);
    ctx.font = '700 40px "Press Start 2P", monospace';
    ctx.fillStyle = COL.gold;
    ctx.shadowColor = COL.pink; ctx.shadowBlur = 18;
    ctx.fillText(String(combo), 0, 0);
    ctx.font = '700 13px "Press Start 2P", monospace';
    ctx.fillStyle = COL.cyan;
    ctx.fillText('COMBO', 0, 28);
    ctx.restore();
  }

  // 进度条(底部)
  if (state==='playing' && SONG_LEN<9000){
    const p = Math.min(1, songElapsed/SONG_LEN);
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(20, H-16, W-40, 6);
    ctx.fillStyle=COL.magenta;
    ctx.shadowColor=COL.magenta; ctx.shadowBlur=8;
    ctx.fillRect(20, H-16, (W-40)*p, 6);
    ctx.shadowBlur=0;
  }

  // 演示水印
  if (DEMO){
    ctx.save();
    ctx.textAlign='center';
    ctx.font='700 11px "Press Start 2P", monospace';
    ctx.fillStyle='rgba(94,240,255,0.8)';
    ctx.fillText('AUTO DEMO', W/2, H*0.30 - 70);
    ctx.restore();
  }
}

// =========================================================================
//  RAF 主循环 + delta time
// =========================================================================
function loop(ts){
  scheduleMusic(); // 也在帧里调度,双保险
  const now = ts/1000;
  let dt = now - lastTime;
  lastTime = now;
  if (!isFinite(dt) || dt<0) dt=0;
  if (dt>0.05) dt=0.05; // 防止切后台后跳变
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// =========================================================================
//  按钮 / 静音
// =========================================================================
startBtn.addEventListener('click', ()=>{ startGame(); });
retryBtn.addEventListener('click', ()=>{ startGame(); });
muteBtn.addEventListener('click', ()=>{
  muted = !muted;
  if (masterGain) masterGain.gain.value = muted?0:0.9;
  muteBtn.textContent = muted ? '♪ OFF' : '♪ ON';
  muteBtn.style.color = muted ? '#888' : COL.cyan;
});

// =========================================================================
//  录制(?record=N)
// =========================================================================
function startRecording(sec){
  try{
    if (!cv.width || !cv.height){ return; }
    const stream = cv.captureStream(30);
    if (!stream || stream.getVideoTracks().length===0){ return; }
    let mt='video/webm;codecs=vp9';
    if(!MediaRecorder.isTypeSupported(mt)) mt=(MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm');
    const mr=new MediaRecorder(stream,{mimeType:mt,videoBitsPerSecond:9000000});
    const chunks=[];
    mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
    mr.onstop=()=>{
      const b=new Blob(chunks,{type:'video/webm'});
      const url=URL.createObjectURL(b);
      const a=document.createElement('a');
      a.href=url;
      a.download='neon-dance.webm';
      document.body.appendChild(a);
      try{a.click()}catch(e){}
      setTimeout(()=>{ try{ document.body.removeChild(a); URL.revokeObjectURL(url); }catch(e){} }, 1000);
    };
    mr.start(250);
    setTimeout(()=>{ try{mr.stop()}catch(e){} }, sec*1000);
  }catch(e){ console.warn('record err', e); }
}

// =========================================================================
//  启动
// =========================================================================
function boot(){
  resize();
  lastTime = performance.now()/1000;
  requestAnimationFrame(loop);

  if (DEMO){
    // 免手势直接开局(尝试 resume,移动端可能受限但桌面 OK)
    startOverlay.classList.add('hidden');
    initAudio();
    // 用户手势可能缺失时,音频或被挂起;游戏逻辑用 audioCtx 时间,
    // 若挂起则 currentTime 不前进 -> 回退到 dt 累加(在 update 中已处理:无音频才回退)
    // 为保证演示画面始终前进,这里若 audioCtx 挂起则视作无音频对齐(用 dt)。
    setTimeout(()=>{
      startGame();
      // 若音频被策略挂起,songElapsed 不会前进:做个保护——挂起则改用 dt
      if (audioCtx && audioCtx.state==='suspended'){
        // 让 update 用 dt:临时把对齐关掉
        audioFallback = true;
      }
      if (RECORD_SEC){
        // 录制:确保已开局且 canvas 有有效尺寸后再录
        setTimeout(()=>startRecording(RECORD_SEC), 400);
      }
    }, 200);
  }
}

// 音频对齐回退标志(挂起时用 dt 累加)
let audioFallback = false;
// (songElapsed 的推进在下方 patchTime 中处理:有 ctx 但挂起时用 dt 平移开始时刻)

// 监听任意手势以 resume(满足自动播放策略)
['pointerdown','keydown','touchstart'].forEach(ev=>{
  window.addEventListener(ev, ()=>{
    if (audioCtx && audioCtx.state==='suspended'){
      audioCtx.resume().then(()=>{ audioFallback=false; });
    }
  }, {once:false, passive:true});
});

// 启动
window.addEventListener('load', boot);
// 字体加载后重绘一次(避免首帧无字体)
if (document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>{}); }

// 把 audioFallback 接入时间推进:覆盖 songElapsed 计算
// 通过包装:在每帧 update 前,如果挂起则把 songStartCtxTime 推进以模拟 dt
// —— 已在 update 用 (audioCtx? ctxTime : dt);为处理"有ctx但挂起"补丁如下:
(function patchTime(){
  const realUpdate = update;
  update = function(dt){
    if (state==='playing' && audioCtx && audioCtx.state==='suspended'){
      // 挂起:手动以 dt 前进歌曲时间,并平移开始时刻使下次差值正确
      songStartCtxTime = audioCtx.currentTime - (songElapsed + dt);
    }
    realUpdate(dt);
  };
})();

})();
