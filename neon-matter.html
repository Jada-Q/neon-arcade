<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>NEON PACHINKO · 霓虹弹珠机</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  /* ===== 合成波 OutRun 配色变量 ===== */
  :root{
    --pink:#ff2e88; --cyan:#5ef0ff; --magenta:#ff5ec8;
    --gold:#ffd95e; --green:#5effa0;
    --bg0:#1a0830; --bg1:#2a0a4a; --bg2:#3d0a55;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#0a0418; }
  body{
    font-family:'Chakra Petch', -apple-system, system-ui, sans-serif;
    color:#fff; touch-action:none; user-select:none;
    display:flex; align-items:center; justify-content:center;
  }
  #wrap{ position:relative; width:100vw; height:100vh; overflow:hidden; }
  /* 主画布 */
  canvas#game{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  /* 轻微 CRT 扫描线 */
  #scan{
    position:absolute; inset:0; pointer-events:none; z-index:5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.14) 0px, rgba(0,0,0,0.14) 1px, transparent 2px, transparent 3px);
    mix-blend-mode:multiply; opacity:.5;
  }
  /* ===== HUD ===== */
  #hud{
    position:absolute; top:0; left:0; right:0; z-index:6;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 16px; pointer-events:none;
  }
  .hud-box{
    background:rgba(20,4,40,0.55); border:2px solid var(--cyan);
    border-radius:8px; padding:8px 12px; backdrop-filter:blur(2px);
    box-shadow:0 0 14px rgba(94,240,255,0.45), inset 0 0 10px rgba(94,240,255,0.15);
  }
  .hud-box .lab{ font-size:9px; letter-spacing:1px; color:var(--cyan); font-family:'Press Start 2P',monospace; }
  .hud-box .val{ font-size:18px; margin-top:5px; color:#fff; font-family:'Press Start 2P',monospace; text-shadow:0 0 8px var(--pink); }
  #hud .right{ display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
  #hud .right .hud-box{ border-color:var(--gold); box-shadow:0 0 14px rgba(255,217,94,0.4), inset 0 0 10px rgba(255,217,94,0.12); }
  #hud .right .lab{ color:var(--gold); }
  #hud .right .val{ text-shadow:0 0 8px var(--gold); }
  #muteBtn{
    pointer-events:auto; cursor:pointer; margin-top:8px;
    background:rgba(20,4,40,0.6); border:2px solid var(--magenta); color:var(--magenta);
    border-radius:8px; padding:7px 10px; font-family:'Press Start 2P',monospace; font-size:11px;
    box-shadow:0 0 12px rgba(255,94,200,0.5);
  }
  #muteBtn:active{ transform:scale(0.94); }
  /* ===== 遮罩 ===== */
  .mask{
    position:absolute; inset:0; z-index:20; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px;
    background:radial-gradient(ellipse at center, rgba(42,10,74,0.82), rgba(10,4,24,0.95));
    backdrop-filter:blur(3px);
  }
  .mask.hidden{ display:none; }
  .title{
    font-family:'Press Start 2P',monospace; font-size:clamp(20px,6vw,46px); line-height:1.45;
    color:var(--cyan); text-shadow:0 0 10px var(--cyan), 0 0 22px var(--pink), 4px 4px 0 var(--pink);
    margin-bottom:8px;
  }
  .subtitle{ font-size:clamp(13px,2.6vw,18px); color:var(--gold); margin-bottom:22px; letter-spacing:1px; font-weight:600; }
  .desc{ font-size:clamp(12px,2.3vw,15px); color:#e8d6ff; line-height:1.9; max-width:560px; margin-bottom:26px; }
  .desc b{ color:var(--green); }
  .btn{
    cursor:pointer; pointer-events:auto;
    font-family:'Press Start 2P',monospace; font-size:clamp(13px,2.8vw,17px);
    color:#1a0830; background:linear-gradient(180deg, var(--gold), var(--pink));
    border:none; border-radius:10px; padding:16px 30px;
    box-shadow:0 0 18px var(--pink), 0 6px 0 #7a1240; transition:transform .08s;
  }
  .btn:active{ transform:translateY(4px); box-shadow:0 0 18px var(--pink), 0 2px 0 #7a1240; }
  #finalScore{ color:var(--green); text-shadow:0 0 10px var(--green); }
  .small{ font-size:11px; color:#b89fe0; margin-top:18px; line-height:1.7; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="scan"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="left">
      <div class="hud-box"><div class="lab">SCORE</div><div class="val" id="scoreVal">0</div></div>
    </div>
    <div class="right">
      <div class="hud-box"><div class="lab">BALLS</div><div class="val" id="ballsVal">0</div></div>
      <div class="hud-box"><div class="lab">BEST</div><div class="val" id="bestVal">0</div></div>
      <button id="muteBtn">♪ ON</button>
    </div>
  </div>

  <!-- 开始遮罩 -->
  <div class="mask" id="startMask">
    <div class="title">NEON<br>PACHINKO</div>
    <div class="subtitle">霓虹真物理弹珠机</div>
    <div class="desc">
      顶部<b>移动</b>瞄准 → <b>投下</b>发光小球 → 在霓虹钉间真实弹跳 → 落入底部计分槽得分。<br>
      小球有限,用完结束。中央槽分高、边缘加倍!
    </div>
    <button class="btn" id="startBtn">投 币 开 始</button>
    <div class="small">← → 或 鼠标移动瞄准 · 空格 / 点击投球 · M 静音</div>
  </div>

  <!-- 结束遮罩 -->
  <div class="mask hidden" id="overMask">
    <div class="title" style="font-size:clamp(18px,5vw,38px)">GAME OVER</div>
    <div class="subtitle">本局得分</div>
    <div class="title" id="finalScore" style="font-size:clamp(28px,9vw,60px); margin-bottom:18px">0</div>
    <button class="btn" id="restartBtn">再 来 一 局</button>
    <div class="small" id="overTip"></div>
  </div>
</div>

<!-- matter.js 物理引擎 (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script>
/* ============================================================
   NEON PACHINKO —— matter.js 真物理弹珠机
   合成波 OutRun 风格 · 单文件自包含
   ============================================================ */
(function(){
'use strict';

// ---------- matter.js 模块解构 ----------
const { Engine, World, Bodies, Body, Composite, Events } = Matter;

// ---------- 配色 ----------
const COL = {
  pink:'#ff2e88', cyan:'#5ef0ff', magenta:'#ff5ec8',
  gold:'#ffd95e', green:'#5effa0', white:'#ffffff'
};

// ---------- DOM ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreVal = document.getElementById('scoreVal');
const ballsVal = document.getElementById('ballsVal');
const bestVal  = document.getElementById('bestVal');
const startMask= document.getElementById('startMask');
const overMask = document.getElementById('overMask');
const startBtn = document.getElementById('startBtn');
const restartBtn=document.getElementById('restartBtn');
const finalScore=document.getElementById('finalScore');
const overTip  = document.getElementById('overTip');
const muteBtn  = document.getElementById('muteBtn');

// ---------- URL 参数 ----------
const params = new URLSearchParams(location.search);
const DEMO   = params.has('demo');
const RECORD = params.has('record') ? parseInt(params.get('record'),10) : 0;
const AUTO   = DEMO || RECORD>0;   // 自动游玩(AI 投球 + 自动重开):demo 或 录制时启用

// ---------- 逻辑坐标系(设计分辨率,等比映射到屏幕) ----------
const W = 540, H = 900;   // 物理世界使用此固定坐标系,渲染时缩放
let scale = 1, offX = 0, offY = 0;  // canvas 像素 → 逻辑坐标 的映射

// ---------- 游戏状态 ----------
let engine, world;
let running = false, gameOver = false;
let score = 0, ballsLeft = 0;
let best = +(localStorage.getItem('neonPachinkoBest')||0);
bestVal.textContent = best;

const START_BALLS = 12;
let aimX = W/2;          // 顶部瞄准位置(逻辑坐标)
const AIM_MIN = 40, AIM_MAX = W-40;

let pins = [];           // 钉子刚体列表 {body, glow}
let balls = [];          // 活动小球 {body, hue, trail:[]}
let slots = [];          // 计分槽 {x0,x1, score, color, label, flash}
let particles = [];      // 霓虹粒子特效
let floaters = [];       // 飘字得分

let muted = false;
let lastSpawn = 0;       // demo 自动投球计时
let frameCount = 0;

// ---------- 音频(Web Audio 程序化) ----------
let actx = null, masterGain = null, musicTimer = null;
function initAudio(){
  if(actx) return;
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.value = muted ? 0 : 0.5;
    masterGain.connect(actx.destination);
    startMusic();
  }catch(e){ console.warn('audio init fail', e); }
}
function resumeAudio(){ if(actx && actx.state==='suspended') actx.resume(); }

// 单音效:钉子叮、落槽
function beep(freq, dur, type, vol){
  if(!actx || muted) return;
  try{
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0, actx.currentTime);
    g.gain.linearRampToValueAtTime((vol||0.3), actx.currentTime+0.006);
    g.gain.exponentialRampToValueAtTime(0.0008, actx.currentTime+dur);
    o.connect(g); g.connect(masterGain);
    o.start(); o.stop(actx.currentTime+dur+0.02);
  }catch(e){}
}
function sfxPin(v){ beep(620+Math.random()*420, 0.07, 'triangle', 0.12*(v||1)); }
function sfxScore(s){
  // 落槽:上行琶音,分越高越亮
  if(!actx||muted) return;
  const base = 330 + Math.min(s,500)*0.5;
  [0,1,2].forEach((i)=>{ setTimeout(()=>beep(base*(1+i*0.28), 0.16, 'square', 0.22), i*55); });
}
function sfxLaunch(){ beep(180, 0.18, 'sawtooth', 0.25); beep(360,0.12,'sine',0.12); }
function sfxOver(){
  if(!actx||muted) return;
  [440,330,247,165].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'sawtooth',0.25), i*140));
}

// 合成波循环配乐:简单 bass + arpeggio
function startMusic(){
  if(!actx) return;
  const scaleNotes=[55,82.4,110,164.8,130.8,98]; // A 小调感
  let step=0;
  const bpm=104, beat=60/bpm;
  function loop(){
    if(!actx||muted){ /* 静音也保持节拍 */ }
    const t=actx?actx.currentTime:0;
    // bass
    if(actx && !muted){
      const n=scaleNotes[step%scaleNotes.length];
      voice(n, beat*0.9, 'sawtooth', 0.10, 600);
      // 高音 arp 隔拍
      if(step%2===0) voice(n*4, beat*0.45, 'square', 0.045, 2200);
      if(step%4===2) voice(n*3, beat*0.4, 'triangle', 0.05, 1800);
    }
    step++;
    musicTimer=setTimeout(loop, beat*1000);
  }
  loop();
}
function voice(freq, dur, type, vol, cutoff){
  if(!actx||muted) return;
  try{
    const o=actx.createOscillator(), g=actx.createGain(), f=actx.createBiquadFilter();
    o.type=type; o.frequency.value=freq;
    f.type='lowpass'; f.frequency.value=cutoff||1200;
    g.gain.setValueAtTime(0, actx.currentTime);
    g.gain.linearRampToValueAtTime(vol, actx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0008, actx.currentTime+dur);
    o.connect(f); f.connect(g); g.connect(masterGain);
    o.start(); o.stop(actx.currentTime+dur+0.03);
  }catch(e){}
}

// ---------- resize:仅在尺寸真正变化时重设(录制期间不清画布) ----------
function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const cw = Math.floor(window.innerWidth * dpr);
  const ch = Math.floor(window.innerHeight * dpr);
  if(canvas.width===cw && canvas.height===ch) return;  // 无变化不动
  canvas.width = cw; canvas.height = ch;
  // 等比 contain 映射:把 W×H 逻辑世界放入屏幕
  scale = Math.min(cw/W, ch/H);
  offX = (cw - W*scale)/2;
  offY = (ch - H*scale)/2;
}
window.addEventListener('resize', resize);

// ---------- 计分槽布局 ----------
function buildSlots(){
  slots = [];
  // 7 个槽,中间高分,两侧加倍
  const defs = [
    {score:500, color:COL.gold,    label:'500'},
    {score:120, color:COL.cyan,    label:'120'},
    {score:80,  color:COL.green,   label:'80'},
    {score:300, color:COL.pink,    label:'300'},
    {score:80,  color:COL.green,   label:'80'},
    {score:120, color:COL.cyan,    label:'120'},
    {score:500, color:COL.gold,    label:'500'},
  ];
  const n = defs.length;
  const margin = 18;
  const usable = W - margin*2;
  const sw = usable / n;
  for(let i=0;i<n;i++){
    slots.push({
      x0: margin + i*sw,
      x1: margin + (i+1)*sw,
      score: defs[i].score,
      color: defs[i].color,
      label: defs[i].label,
      flash: 0
    });
  }
}

// ---------- 构建物理世界 ----------
function buildWorld(){
  engine = Engine.create();
  world = engine.world;
  engine.gravity.y = 1.0;        // 重力
  engine.gravity.scale = 0.0012; // 调慢一点更有弹珠机手感

  pins = []; balls = []; particles = []; floaters = [];

  const staticOpt = { isStatic:true, restitution:0.55, friction:0.02, label:'wall' };

  // 边界墙(左右 + 底)
  const wallT = 30;
  World.add(world, [
    Bodies.rectangle(-wallT/2, H/2, wallT, H*2, staticOpt),           // 左
    Bodies.rectangle(W+wallT/2, H/2, wallT, H*2, staticOpt),          // 右
    Bodies.rectangle(W/2, H+wallT/2, W*2, wallT, staticOpt),          // 底(兜底)
  ]);

  // ---- 钉子阵:交错网格 ----
  const pinR = 6.5;
  const topY = 150;        // 钉区从这里开始
  const botY = H - 200;    // 钉区到这里
  const rows = 11;
  const colGap = 52;
  const rowGap = (botY - topY) / (rows-1);
  const hues = [330, 190, 320, 50, 150]; // 对应粉/青/品红/金/绿
  for(let r=0;r<rows;r++){
    const y = topY + r*rowGap;
    const offset = (r%2===0) ? 0 : colGap/2;
    for(let x = 30 + offset; x < W-30; x += colGap){
      const pin = Bodies.circle(x, y, pinR, {
        isStatic:true, restitution:0.7, friction:0.0, label:'pin'
      });
      const hue = hues[(r + Math.round(x/colGap))%hues.length];
      pins.push({ body:pin, glow:0, hue });
      World.add(world, pin);
    }
  }

  // ---- 计分槽分隔挡板 ----
  buildSlots();
  const sepTop = H - 175;   // 挡板顶部
  const sepBot = H - 30;    // 挡板底部(槽底)
  const sepH = sepBot - sepTop;
  const sepW = 7;
  // 槽底地板
  World.add(world, Bodies.rectangle(W/2, sepBot+6, W, 12, staticOpt));
  // 各分隔板(槽之间)
  for(let i=0;i<=slots.length;i++){
    let xpos;
    if(i===0) xpos = slots[0].x0;
    else if(i===slots.length) xpos = slots[slots.length-1].x1;
    else xpos = slots[i].x0;
    const sep = Bodies.rectangle(xpos, sepTop + sepH/2, sepW, sepH, {
      isStatic:true, restitution:0.4, friction:0.05, label:'sep', chamfer:{radius:3}
    });
    World.add(world, sep);
  }

  // ---- 顶部几个引导斜钉(漏斗),让球更分散 ----
  const guideOpt = {isStatic:true, restitution:0.6, friction:0, label:'pin'};
  [[110,110,-0.5],[W-110,110,0.5]].forEach(([gx,gy,ang])=>{
    const g = Bodies.rectangle(gx,gy,90,9,{...guideOpt, angle:ang});
    pins.push({body:g, glow:0, hue:280, rect:true, w:90, h:9, ang});
    World.add(world, g);
  });

  // ---- 碰撞事件:钉子发光 + 落槽计分 ----
  Events.on(engine, 'collisionStart', (ev)=>{
    for(const pair of ev.pairs){
      const a=pair.bodyA, b=pair.bodyB;
      let ballBody=null, other=null;
      if(a.label==='ball'){ ballBody=a; other=b; }
      else if(b.label==='ball'){ ballBody=b; other=a; }
      if(!ballBody) continue;
      if(other.label==='pin'){
        // 钉子发光 + 音效 + 火花
        const p = pins.find(pp=>pp.body===other);
        if(p) p.glow = 1;
        const v = Math.min(1, (Math.abs(ballBody.velocity.x)+Math.abs(ballBody.velocity.y))/12);
        sfxPin(v);
        spawnSparks(ballBody.position.x, ballBody.position.y, 3, p?p.hue:200);
      }
    }
  });

  Engine.update(engine, 16); // 预热一帧
}

// ---------- 投球 ----------
function dropBall(x){
  if(!running || gameOver || ballsLeft<=0) return;
  ballsLeft--;
  ballsVal.textContent = ballsLeft;
  const hue = [330,190,320,50,150][Math.floor(Math.random()*5)];
  const b = Bodies.circle(x, 70, 11, {
    restitution:0.5, friction:0.002, frictionAir:0.004, density:0.0016, label:'ball'
  });
  Body.setVelocity(b, {x:(Math.random()-0.5)*1.2, y:0});
  World.add(world, b);
  balls.push({ body:b, hue, trail:[], scored:false, age:0 });
  sfxLaunch();
  spawnSparks(x,70,8,hue);
}

// ---------- 粒子 ----------
function spawnSparks(x,y,n,hue){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4 - 1,
      life:1, hue, r:1.5+Math.random()*2.5
    });
  }
}
function spawnBurst(x,y,hue,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
    particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - 2, life:1, hue, r:2+Math.random()*3 });
  }
}

// ---------- 落槽判定 ----------
function checkScoring(){
  const floorY = H - 40;
  for(let i=balls.length-1;i>=0;i--){
    const bl = balls[i];
    const p = bl.body.position;
    bl.age = (bl.age||0) + 1;
    if(!bl.scored && p.y > floorY){
      // 找落入哪个槽
      for(const s of slots){
        if(p.x>=s.x0 && p.x<=s.x1){
          bl.scored = true;
          score += s.score;
          scoreVal.textContent = score;
          s.flash = 1;
          sfxScore(s.score);
          spawnBurst(p.x, p.y, hueOf(s.color), 22);
          floaters.push({ x:p.x, y:p.y-10, vy:-1.1, life:1, txt:'+'+s.score, color:s.color });
          // 分数反馈:闪屏由 flash 控制
          break;
        }
      }
      if(!bl.scored){ bl.scored=true; } // 边缘兜底
    }
    // 出界/落底很久/卡死过久则移除(防止永不结束的软锁)
    if(p.y > H+40 || (bl.scored && p.y>floorY+30) || bl.age > 1200){
      World.remove(world, bl.body);
      balls.splice(i,1);
    }
  }
}
function hueOf(c){
  // 把配色映射回 hue(粗略)
  if(c===COL.gold) return 50;
  if(c===COL.cyan) return 190;
  if(c===COL.green) return 150;
  if(c===COL.pink) return 330;
  if(c===COL.magenta) return 320;
  return 200;
}

// ---------- 结束判定 ----------
function maybeEnd(){
  if(gameOver) return;
  if(ballsLeft<=0 && balls.length===0){
    gameOver = true; running = false;
    const isNewRecord = (score>best && score>0);
    if(isNewRecord){ best=score; localStorage.setItem('neonPachinkoBest', best); bestVal.textContent=best; }
    finalScore.textContent = score;
    overTip.textContent = isNewRecord ? '★ 新纪录! ★' : '';
    sfxOver();
    overMask.classList.remove('hidden');
    if(AUTO){ setTimeout(()=>{ startGame(); }, 2200); } // 自动重开(demo/录制)
  }
}

// ---------- 开局 ----------
function startGame(){
  startMask.classList.add('hidden');
  overMask.classList.add('hidden');
  buildWorld();
  score=0; ballsLeft=START_BALLS; gameOver=false; running=true;
  aimX = W/2;
  scoreVal.textContent='0';
  ballsVal.textContent=ballsLeft;
  lastSpawn = performance.now();
}

// ==================================================================
//  更新与渲染
// ==================================================================
let lastT = performance.now();
function frame(now){
  const dt = Math.min(50, now-lastT);
  lastT = now;
  frameCount++;
  try{ update(dt, now); }catch(e){ console.error('update err',e); }
  try{ draw(now); }catch(e){ console.error('draw err',e); }
  requestAnimationFrame(frame);
}

function update(dt, now){
  resize();
  if(running && !gameOver){
    // 物理步进(固定子步以稳定)
    Engine.update(engine, 16.666);

    // demo AI:不同水平位置定时投球
    if(AUTO){
      if(ballsLeft>0 && now-lastSpawn > 620){
        lastSpawn = now;
        // 偏向中间高分槽,带随机
        const targets=[W*0.5, W*0.3, W*0.7, W*0.5, W*0.42, W*0.58];
        aimX = targets[Math.floor(Math.random()*targets.length)] + (Math.random()-0.5)*60;
        aimX = Math.max(AIM_MIN, Math.min(AIM_MAX, aimX));
        dropBall(aimX);
      }
    }

    checkScoring();
    maybeEnd();
  }

  // 钉子辉光衰减
  for(const p of pins){ if(p.glow>0) p.glow = Math.max(0, p.glow - dt*0.004); }
  // 槽闪烁衰减
  for(const s of slots){ if(s.flash>0) s.flash = Math.max(0, s.flash - dt*0.003); }
  // 粒子
  for(let i=particles.length-1;i>=0;i--){
    const pa=particles[i];
    pa.x+=pa.vx; pa.y+=pa.vy; pa.vy+=0.15; pa.life-=dt*0.0022;
    if(pa.life<=0) particles.splice(i,1);
  }
  // 飘字
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i]; f.y+=f.vy; f.life-=dt*0.0015;
    if(f.life<=0) floaters.splice(i,1);
  }
  // 小球拖尾
  for(const bl of balls){
    bl.trail.push({x:bl.body.position.x, y:bl.body.position.y});
    if(bl.trail.length>10) bl.trail.shift();
  }
}

// ---------- 绘制 ----------
function draw(now){
  const cw=canvas.width, ch=canvas.height;
  // 背景(全屏,日落渐变)
  drawBackground(cw, ch, now);

  // 进入逻辑坐标系
  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(scale, scale);

  // 弹珠机外框
  drawCabinet();

  // 计分槽
  drawSlots();

  // 钉子
  drawPins();

  // 顶部瞄准器
  if(running && !gameOver && ballsLeft>0) drawAimer();

  // 小球
  drawBalls();

  // 粒子
  drawParticles();

  // 飘字
  drawFloaters();

  ctx.restore();
}

function drawBackground(cw, ch, now){
  // 日落渐变
  const g = ctx.createLinearGradient(0,0,0,ch);
  g.addColorStop(0, '#1a0830');
  g.addColorStop(0.45,'#3d0a55');
  g.addColorStop(0.7, '#5a1248');
  g.addColorStop(1, '#1a0830');
  ctx.fillStyle=g; ctx.fillRect(0,0,cw,ch);

  // 远景太阳 + 网格(纯氛围,位于逻辑区背后)
  ctx.save();
  ctx.translate(offX, offY); ctx.scale(scale, scale);
  // 太阳
  const sunY = H*0.30;
  const sg = ctx.createLinearGradient(0,sunY-70,0,sunY+70);
  sg.addColorStop(0, 'rgba(255,217,94,0.0)');
  sg.addColorStop(0.5,'rgba(255,94,200,0.18)');
  sg.addColorStop(1, 'rgba(255,46,136,0.05)');
  ctx.fillStyle=sg;
  ctx.beginPath(); ctx.arc(W/2, sunY, 150, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCabinet(){
  // 外框霓虹边
  ctx.lineWidth=4;
  neonStroke(()=>{
    roundRect(6,6,W-12,H-12,16); ctx.stroke();
  }, COL.magenta, 16);
}

function drawPins(){
  for(const p of pins){
    const pos=p.body.position;
    const base = p.hue;
    const lum = 55 + p.glow*30;
    const color = `hsl(${base},100%,${lum}%)`;
    if(p.rect){
      // 引导斜板
      ctx.save();
      ctx.translate(pos.x,pos.y); ctx.rotate(p.body.angle);
      ctx.shadowColor=color; ctx.shadowBlur=14+p.glow*16;
      ctx.fillStyle=color;
      roundRect(-p.w/2,-p.h/2,p.w,p.h,4); ctx.fill();
      ctx.restore();
    }else{
      const r=p.body.circleRadius;
      ctx.save();
      ctx.shadowColor=color; ctx.shadowBlur=12+p.glow*22;
      ctx.fillStyle=color;
      ctx.beginPath(); ctx.arc(pos.x,pos.y,r+p.glow*1.5,0,Math.PI*2); ctx.fill();
      // 内核白点
      ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,'+(0.5+p.glow*0.4)+')';
      ctx.beginPath(); ctx.arc(pos.x,pos.y,r*0.4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

function drawSlots(){
  const top = H-175, bot=H-30;
  for(const s of slots){
    const cx=(s.x0+s.x1)/2;
    // 槽底发光块
    ctx.save();
    const fl = s.flash;
    const grad = ctx.createLinearGradient(0,top,0,bot);
    grad.addColorStop(0, hexA(s.color, 0.05+fl*0.4));
    grad.addColorStop(1, hexA(s.color, 0.35+fl*0.5));
    ctx.fillStyle=grad;
    ctx.fillRect(s.x0+2, top, (s.x1-s.x0)-4, bot-top);
    // 槽标签
    ctx.shadowColor=s.color; ctx.shadowBlur=8+fl*18;
    ctx.fillStyle=s.color;
    ctx.font='bold 15px "Press Start 2P", monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(s.label, cx, bot-22);
    ctx.restore();
  }
  // 分隔板高光
  ctx.save();
  ctx.shadowColor=COL.cyan; ctx.shadowBlur=8;
  ctx.fillStyle=COL.cyan;
  for(let i=0;i<=slots.length;i++){
    let xpos = (i===0)?slots[0].x0 : (i===slots.length)?slots[slots.length-1].x1 : slots[i].x0;
    roundRect(xpos-3.5, top, 7, bot-top-2, 3); ctx.fill();
  }
  ctx.restore();
}

function drawAimer(){
  const x = aimX, y=48;
  ctx.save();
  // 投球口
  ctx.shadowColor=COL.gold; ctx.shadowBlur=18;
  ctx.fillStyle=COL.gold;
  ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fill();
  // 虚线瞄准
  ctx.strokeStyle=hexA(COL.gold,0.5); ctx.lineWidth=2; ctx.setLineDash([5,8]);
  ctx.beginPath(); ctx.moveTo(x,y+12); ctx.lineTo(x, 130); ctx.stroke();
  ctx.setLineDash([]);
  // 箭头
  ctx.fillStyle=COL.gold;
  ctx.beginPath(); ctx.moveTo(x-6,126); ctx.lineTo(x+6,126); ctx.lineTo(x,138); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawBalls(){
  for(const bl of balls){
    const pos=bl.body.position, r=bl.body.circleRadius;
    const c=`hsl(${bl.hue},100%,65%)`;
    // 拖尾
    for(let i=0;i<bl.trail.length;i++){
      const t=bl.trail[i], a=(i/bl.trail.length)*0.5;
      ctx.fillStyle=`hsla(${bl.hue},100%,65%,${a})`;
      ctx.beginPath(); ctx.arc(t.x,t.y, r*(i/bl.trail.length)*0.9, 0, Math.PI*2); ctx.fill();
    }
    // 球体
    ctx.save();
    ctx.shadowColor=c; ctx.shadowBlur=20;
    const g=ctx.createRadialGradient(pos.x-r*0.3,pos.y-r*0.3,1, pos.x,pos.y,r);
    g.addColorStop(0,'#ffffff');
    g.addColorStop(0.4,c);
    g.addColorStop(1,`hsl(${bl.hue},100%,45%)`);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(pos.x,pos.y,r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawParticles(){
  for(const pa of particles){
    ctx.globalAlpha=Math.max(0,pa.life);
    ctx.fillStyle=`hsl(${pa.hue},100%,65%)`;
    ctx.shadowColor=`hsl(${pa.hue},100%,65%)`; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(pa.x,pa.y,pa.r*pa.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawFloaters(){
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 16px "Press Start 2P", monospace';
  for(const f of floaters){
    ctx.globalAlpha=Math.max(0,f.life);
    ctx.shadowColor=f.color; ctx.shadowBlur=14;
    ctx.fillStyle=f.color;
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ---------- 绘制小工具 ----------
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function neonStroke(drawFn, color, blur){
  ctx.save();
  ctx.strokeStyle=color; ctx.shadowColor=color; ctx.shadowBlur=blur||12;
  drawFn();
  ctx.restore();
}
function hexA(hex, a){
  // #rrggbb → rgba
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ==================================================================
//  输入
// ==================================================================
function screenToLogicX(clientX){
  const rect=canvas.getBoundingClientRect();
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const px=(clientX-rect.left)*dpr;
  return (px - offX)/scale;
}
function setAim(lx){
  aimX = Math.max(AIM_MIN, Math.min(AIM_MAX, lx));
}

// 鼠标移动瞄准
canvas.addEventListener('mousemove', (e)=>{
  if(AUTO) return;
  setAim(screenToLogicX(e.clientX));
});
canvas.addEventListener('mousedown', (e)=>{
  resumeAudio();
  if(AUTO) return;
  if(running && !gameOver){ setAim(screenToLogicX(e.clientX)); dropBall(aimX); }
});
// 触屏
canvas.addEventListener('touchmove', (e)=>{
  if(AUTO) return;
  if(e.touches[0]) setAim(screenToLogicX(e.touches[0].clientX));
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchstart', (e)=>{
  resumeAudio();
  if(AUTO) return;
  if(e.touches[0]){ setAim(screenToLogicX(e.touches[0].clientX)); if(running&&!gameOver) dropBall(aimX); }
  e.preventDefault();
}, {passive:false});

// 键盘
window.addEventListener('keydown', (e)=>{
  resumeAudio();
  if(AUTO) return;
  if(e.code==='ArrowLeft'){ setAim(aimX-22); }
  else if(e.code==='ArrowRight'){ setAim(aimX+22); }
  else if(e.code==='Space'){ if(running&&!gameOver) dropBall(aimX); e.preventDefault(); }
  else if(e.key==='m'||e.key==='M'){ toggleMute(); }
});

// 静音
function toggleMute(){
  muted=!muted;
  muteBtn.textContent = muted ? '♪ OFF' : '♪ ON';
  muteBtn.style.color = muted ? '#888' : COL.magenta;
  muteBtn.style.borderColor = muted ? '#888' : COL.magenta;
  if(masterGain) masterGain.gain.value = muted?0:0.5;
}
muteBtn.addEventListener('click', (e)=>{ e.stopPropagation(); initAudio(); resumeAudio(); toggleMute(); });

// 开始/重开按钮
startBtn.addEventListener('click', ()=>{ initAudio(); resumeAudio(); startGame(); });
restartBtn.addEventListener('click', ()=>{ initAudio(); resumeAudio(); startGame(); });

// ==================================================================
//  录制(?record=N)
// ==================================================================
function startRecording(seconds){
  try{
    const cv=canvas;
    const stream=cv.captureStream(30);
    if(!stream || stream.getVideoTracks().length===0){ console.warn('no video track'); return; }
    let mt='video/webm;codecs=vp9';
    if(!MediaRecorder.isTypeSupported(mt)) mt=(MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm');
    const mr=new MediaRecorder(stream,{mimeType:mt, videoBitsPerSecond:9000000});
    const chunks=[];
    mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
    mr.onstop=()=>{
      const b=new Blob(chunks,{type:'video/webm'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(b); a.download='neon-matter.webm';
      document.body.appendChild(a); try{a.click()}catch(e){}
    };
    mr.start(250);
    setTimeout(()=>{ try{mr.stop()}catch(e){} }, seconds*1000);
  }catch(e){ console.warn('record fail', e); }
}

// ==================================================================
//  启动
// ==================================================================
resize();
buildWorld();        // 预构建,让开始遮罩背后有静态画面
requestAnimationFrame(frame);

if(DEMO || RECORD>0){
  // 免手势直接开局 + AI 自动游玩(record 也强制自动游玩,保证录像有内容)
  initAudio();
  // 浏览器策略下音频可能需手势,但视觉与逻辑照常
  startGame();
  if(RECORD>0){
    // 等一帧确保 canvas 有内容再录
    setTimeout(()=>startRecording(RECORD), 300);
  }
}

})();
</script>
