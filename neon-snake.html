<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON SNAKE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== 合成波 OutRun 基础风格 ===== */
  :root{
    --pink:#ff2e88;     /* 粉 */
    --cyan:#5ef0ff;     /* 青 */
    --magenta:#ff5ec8;  /* 品红 */
    --gold:#ffd95e;     /* 金 */
    --green:#5effa0;    /* 绿 */
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; }
  body{
    /* 背景日落渐变 */
    background:linear-gradient(#160a36,#3a1457 30%,#7a2a6e 50%,#ff5e7e 64%,#ff9a4d 72%,#160a36 72%);
    font-family:'Chakra Petch','Segoe UI',sans-serif;
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  /* 全屏极轻 CRT 扫描线叠加 */
  #crt{
    position:fixed; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0.16) 0px, rgba(0,0,0,0.16) 1px, transparent 2px, transparent 3px);
    mix-blend-mode:multiply; opacity:.55;
  }
  /* 主容器 竖屏友好 */
  #wrap{
    position:relative;
    display:flex; flex-direction:column; align-items:center;
    gap:10px;
    padding:10px;
    width:100%; height:100%;
    max-width:720px;
    justify-content:center;
  }
  /* HUD */
  #hud{
    display:flex; align-items:center; justify-content:space-between;
    width:100%;
    gap:10px;
    font-family:'Press Start 2P',monospace;
    font-size:11px;
  }
  .hud-box{
    background:rgba(22,10,54,0.6);
    border:2px solid var(--cyan);
    box-shadow:4px 4px 0 var(--pink);
    padding:8px 10px;
    color:var(--cyan);
    line-height:1.5;
    white-space:nowrap;
  }
  .hud-box b{ color:var(--gold); }
  .hud-box.hi{ border-color:var(--gold); box-shadow:4px 4px 0 var(--magenta); color:var(--gold); }
  .hud-box.hi b{ color:#fff; }
  #title{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(13px,4.4vw,24px);
    color:var(--pink);
    text-shadow:0 0 8px var(--pink), 3px 3px 0 var(--cyan);
    letter-spacing:1px;
    text-align:center;
    margin-bottom:2px;
  }
  /* Canvas 区域 */
  #stage{
    position:relative;
    border:3px solid var(--magenta);
    box-shadow:4px 4px 0 var(--cyan), 0 0 24px rgba(255,46,136,.5);
    background:rgba(10,4,28,0.55);
    border-radius:4px;
    overflow:hidden;
  }
  canvas#game{ display:block; }
  /* 遮罩通用 */
  .mask{
    position:absolute; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    background:rgba(12,5,30,0.82);
    backdrop-filter:blur(2px);
    padding:18px;
    gap:14px;
  }
  .mask.hidden{ display:none; }
  .mask h1{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(16px,5.5vw,30px);
    color:var(--cyan);
    text-shadow:0 0 10px var(--cyan), 3px 3px 0 var(--pink);
    line-height:1.4;
  }
  .mask h1.over{ color:var(--pink); text-shadow:0 0 10px var(--pink), 3px 3px 0 var(--gold); }
  .mask p{
    font-size:clamp(12px,3.4vw,16px);
    color:#ffd1ec;
    line-height:1.7;
    max-width:340px;
  }
  .mask .score-line{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(11px,3.4vw,15px);
    color:var(--gold);
    line-height:1.8;
  }
  .btn{
    font-family:'Press Start 2P',monospace;
    font-size:clamp(11px,3.4vw,15px);
    color:#160a36;
    background:var(--gold);
    border:3px solid #fff;
    box-shadow:4px 4px 0 var(--pink);
    padding:14px 20px;
    cursor:pointer;
    transition:transform .06s ease;
  }
  .btn:active{ transform:translate(2px,2px); box-shadow:2px 2px 0 var(--pink); }
  /* 静音按钮 右上角 */
  #mute{
    position:fixed; top:10px; right:10px; z-index:60;
    font-family:'Press Start 2P',monospace;
    font-size:12px;
    width:42px; height:42px;
    color:var(--cyan);
    background:rgba(22,10,54,0.75);
    border:2px solid var(--cyan);
    box-shadow:3px 3px 0 var(--pink);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #mute:active{ transform:translate(1px,1px); }
  /* 触屏方向提示(仅触屏显示) */
  #hint-touch{ display:none; }
  @media (pointer:coarse){ #hint-touch{ display:block; } }
</style>
</head>
<body>
<div id="crt"></div>
<button id="mute" title="静音">♪</button>

<div id="wrap">
  <div id="title">NEON SNAKE</div>
  <div id="hud">
    <div class="hud-box">SCORE <b id="score">0</b></div>
    <div class="hud-box">LEN <b id="len">3</b></div>
    <div class="hud-box hi">HI <b id="hi">0</b></div>
  </div>

  <div id="stage">
    <canvas id="game" width="480" height="480"></canvas>

    <!-- 开始遮罩 -->
    <div id="startMask" class="mask">
      <h1>NEON SNAKE</h1>
      <p>方向键 / WASD / 滑动 转向<br>吃霓虹食物 变长加分 渐加速<br>撞墙或撞到自己 GAME OVER</p>
      <button class="btn" id="startBtn">START</button>
    </div>

    <!-- 结束遮罩 -->
    <div id="overMask" class="mask hidden">
      <h1 class="over">GAME OVER</h1>
      <div class="score-line">
        SCORE <span id="overScore">0</span><br>
        HI&nbsp;&nbsp;&nbsp;&nbsp;<span id="overHi">0</span>
      </div>
      <button class="btn" id="againBtn">RETRY</button>
    </div>
  </div>
</div>

<script>
/* ===========================================================
   NEON SNAKE — 合成波 OutRun 贪吃蛇
   原生 Canvas 2D + requestAnimationFrame + delta time
   =========================================================== */
(function(){
'use strict';

// ---------- URL 参数:演示 / 录制 ----------
const PARAMS = new URLSearchParams(location.search);
const DEMO   = PARAMS.has('demo') || PARAMS.has('record');
const RECORD_SEC = PARAMS.has('record') ? Math.max(1, parseInt(PARAMS.get('record')||'20',10)||20) : 0;

// ---------- 霓虹色 ----------
const COL = { pink:'#ff2e88', cyan:'#5ef0ff', magenta:'#ff5ec8', gold:'#ffd95e', green:'#5effa0' };

// ---------- DOM ----------
const cv  = document.getElementById('game');
const ctx = cv.getContext('2d');
const stage = document.getElementById('stage');
const elScore = document.getElementById('score');
const elLen   = document.getElementById('len');
const elHi    = document.getElementById('hi');
const startMask = document.getElementById('startMask');
const overMask  = document.getElementById('overMask');
const overScore = document.getElementById('overScore');
const overHi    = document.getElementById('overHi');
const startBtn  = document.getElementById('startBtn');
const againBtn  = document.getElementById('againBtn');
const muteBtn   = document.getElementById('mute');

// ---------- 网格设定 ----------
const GRID = 22;          // 格子数(每边)
let cell = 22;            // 每格像素(随尺寸计算)
let pxSize = GRID * cell; // canvas 像素尺寸

// ---------- 最高分 ----------
const HI_KEY = 'neon-snake-hi';
let hiScore = parseInt(localStorage.getItem(HI_KEY) || '0', 10) || 0;
elHi.textContent = hiScore;

// ---------- 游戏状态 ----------
let snake, dir, nextDir, food, score, alive, started;
let stepInterval, stepAcc;   // 自动前进节奏(秒)
let foodPulse = 0;           // 食物脉动相位
let particles = [];          // 得分/死亡粒子
let shake = 0;               // 屏幕震动
let bgScroll = 0;            // 背景网格滚动

// 初始化一局
function resetGame(){
  const c = Math.floor(GRID/2);
  snake = [ {x:c-1,y:c}, {x:c-2,y:c}, {x:c-3,y:c} ]; // 头在前
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  alive = true;
  stepInterval = 0.135;   // 起始节奏(秒/步)
  stepAcc = 0;
  particles = [];
  shake = 0;
  spawnFood();
  updateHUD();
}

// 随机放置食物(不在蛇身上)
function spawnFood(){
  let tries = 0;
  while(true){
    const fx = (Math.random()*GRID)|0;
    const fy = (Math.random()*GRID)|0;
    if(!snake.some(s=>s.x===fx && s.y===fy)){ food = {x:fx,y:fy}; return; }
    if(++tries>500){ food = {x:fx,y:fy}; return; }
  }
}

function updateHUD(){
  elScore.textContent = score;
  elLen.textContent = snake.length;
  elHi.textContent = hiScore;
}

// =========================================================
//  Web Audio:程序化音效 + 合成波循环配乐
// =========================================================
let actx = null, masterGain = null, musicGain = null, sfxGain = null;
let muted = false;
let musicTimer = null;

function initAudio(){
  if(actx) return;
  try{
    actx = new (window.AudioContext || window.webkitAudioContext)();
  }catch(e){ return; }
  masterGain = actx.createGain();
  masterGain.gain.value = muted ? 0 : 0.9;
  masterGain.connect(actx.destination);

  musicGain = actx.createGain();
  musicGain.gain.value = 0.22;
  musicGain.connect(masterGain);

  sfxGain = actx.createGain();
  sfxGain.gain.value = 0.55;
  sfxGain.connect(masterGain);

  startMusic();
}

function resumeAudio(){
  if(actx && actx.state === 'suspended') actx.resume();
}

// 简单合成音效
function blip(freq, dur, type, gain){
  if(!actx || muted) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type || 'square';
  o.frequency.value = freq;
  g.gain.value = 0;
  o.connect(g); g.connect(sfxGain);
  const t = actx.currentTime;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gain||0.5, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0008, t+dur);
  o.start(t);
  o.stop(t+dur+0.02);
}

function sfxEat(){
  blip(620, 0.08, 'square', 0.5);
  setTimeout(()=>blip(940, 0.10, 'square', 0.45), 60);
}
function sfxTurn(){ blip(320, 0.04, 'triangle', 0.25); }
function sfxDie(){
  blip(220,0.18,'sawtooth',0.5);
  setTimeout(()=>blip(160,0.22,'sawtooth',0.5),90);
  setTimeout(()=>blip(90,0.35,'sawtooth',0.5),200);
}

// 合成波循环配乐:贝斯琶音 + 柔和 pad
const MUSIC_NOTES = [55,55,82.41,55,98,55,73.42,82.41]; // A1 琶音律动
let musicStep = 0;
function startMusic(){
  if(musicTimer) return;
  const beat = 0.26; // 节拍秒
  musicTimer = setInterval(()=>{
    if(!actx || muted) return;
    const t = actx.currentTime;
    const f = MUSIC_NOTES[musicStep % MUSIC_NOTES.length];
    // 贝斯
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type='sawtooth'; o.frequency.value=f;
    const lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600;
    o.connect(lp); lp.connect(g); g.connect(musicGain);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.5,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+beat*0.9);
    o.start(t); o.stop(t+beat);
    // 每 4 拍加一层高音 pad
    if(musicStep % 4 === 0){
      const o2=actx.createOscillator(); const g2=actx.createGain();
      o2.type='triangle'; o2.frequency.value=f*4;
      o2.connect(g2); g2.connect(musicGain);
      g2.gain.setValueAtTime(0,t);
      g2.gain.linearRampToValueAtTime(0.12,t+0.05);
      g2.gain.exponentialRampToValueAtTime(0.001,t+beat*2);
      o2.start(t); o2.stop(t+beat*2);
    }
    musicStep++;
  }, beat*1000);
}

function setMuted(m){
  muted = m;
  if(masterGain) masterGain.gain.value = muted ? 0 : 0.9;
  muteBtn.textContent = muted ? '✕' : '♪';
  muteBtn.style.color = muted ? COL.pink : COL.cyan;
}
muteBtn.addEventListener('click', ()=>{ initAudio(); resumeAudio(); setMuted(!muted); });

// =========================================================
//  输入:键盘 + 触屏滑动
// =========================================================
function tryTurn(nx, ny){
  // 不能直接反向
  if(nx === -dir.x && ny === -dir.y) return;
  if(nx === dir.x && ny === dir.y) return;
  nextDir = {x:nx, y:ny};
  if(started && alive) sfxTurn();
}

window.addEventListener('keydown', (e)=>{
  if(!e.key) return;
  const k = e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(!started){ if(k===' '||k==='enter') beginGame(); return; }
  if(!alive){ if(k===' '||k==='enter') beginGame(); return; }
  if(k==='arrowup'||k==='w')    tryTurn(0,-1);
  else if(k==='arrowdown'||k==='s')  tryTurn(0,1);
  else if(k==='arrowleft'||k==='a')  tryTurn(-1,0);
  else if(k==='arrowright'||k==='d') tryTurn(1,0);
});

// 触屏滑动
let touchStart = null;
stage.addEventListener('touchstart', (e)=>{
  if(e.touches.length){ touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY}; }
}, {passive:true});
stage.addEventListener('touchend', (e)=>{
  if(!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  touchStart = null;
  if(Math.abs(dx)<18 && Math.abs(dy)<18) return; // 视为点击
  if(!started || !alive) return;
  if(Math.abs(dx) > Math.abs(dy)) tryTurn(dx>0?1:-1, 0);
  else tryTurn(0, dy>0?1:-1);
}, {passive:true});

// =========================================================
//  AI 自动寻路(演示):贪心 + 安全检查,优先不困死自己
// =========================================================
function aiChooseDir(){
  const head = snake[0];
  const occ = new Set(snake.map(s=>s.x+','+s.y)); // 当前占用
  // 候选方向(不能反向)
  const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].filter(d=>!(d.x===-dir.x&&d.y===-dir.y));

  // 模拟一步后:身体会前移(尾巴让位,除非吃到食物)
  function simulate(d){
    const nx = head.x+d.x, ny = head.y+d.y;
    if(nx<0||ny<0||nx>=GRID||ny>=GRID) return null; // 撞墙
    const willEat = (nx===food.x && ny===food.y);
    // 新蛇身
    const body = snake.map(s=>({x:s.x,y:s.y}));
    body.unshift({x:nx,y:ny});
    if(!willEat) body.pop();
    // 撞自身?(允许进入将要移走的尾巴格)
    const set = new Set(body.slice(1).map(s=>s.x+','+s.y));
    if(set.has(nx+','+ny)) return null;
    return {nx,ny,willEat,body};
  }

  // 洪水填充:从某格出发可到达的空格数(评估自由空间,避免困死)
  function floodFree(body){
    const head2 = body[0];
    const blocked = new Set(body.map(s=>s.x+','+s.y));
    const seen = new Set();
    const stack = [];
    // 头四周的空格作为起点
    for(const d of [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]){
      const px=head2.x+d.x, py=head2.y+d.y;
      const key=px+','+py;
      if(px<0||py<0||px>=GRID||py>=GRID) continue;
      if(blocked.has(key)) continue;
      stack.push({x:px,y:py});
    }
    let count=0;
    while(stack.length && count<GRID*GRID){
      const c = stack.pop();
      const key=c.x+','+c.y;
      if(seen.has(key)) continue;
      if(c.x<0||c.y<0||c.x>=GRID||c.y>=GRID) continue;
      if(blocked.has(key)) continue;
      seen.add(key); count++;
      stack.push({x:c.x+1,y:c.y},{x:c.x-1,y:c.y},{x:c.x,y:c.y+1},{x:c.x,y:c.y-1});
    }
    return count;
  }

  // 评分每个合法方向
  let best=null, bestScore=-Infinity;
  for(const d of dirs){
    const sim = simulate(d);
    if(!sim) continue;
    const dist = Math.abs(sim.nx-food.x)+Math.abs(sim.ny-food.y); // 曼哈顿距离
    const free = floodFree(sim.body); // 走后剩余自由空间
    // 综合:自由空间权重高(避免困死),其次靠近食物
    let s = free*2.2 - dist*1.0 + (sim.willEat?6:0);
    // 要求:走后剩余空间至少能容纳一定身体,否则强惩罚
    if(free < snake.length*0.5) s -= 50;
    if(s>bestScore){ bestScore=s; best=d; }
  }
  // 实在没有安全方向,选任意不撞墙不立即撞身的方向
  if(!best){
    for(const d of dirs){ if(simulate(d)){ best=d; break; } }
  }
  if(best){ nextDir = {x:best.x, y:best.y}; }
}

// =========================================================
//  游戏推进
// =========================================================
function step(){
  if(!alive) return;
  if(DEMO) aiChooseDir();
  dir = nextDir;
  const head = snake[0];
  const nx = head.x + dir.x;
  const ny = head.y + dir.y;

  // 撞墙
  if(nx<0||ny<0||nx>=GRID||ny>=GRID){ die(nx,ny); return; }
  // 撞自身(尾巴本步会移走,允许进入)
  const willEat = (nx===food.x && ny===food.y);
  const bodyCheck = willEat ? snake : snake.slice(0, snake.length-1);
  if(bodyCheck.some(s=>s.x===nx && s.y===ny)){ die(nx,ny); return; }

  // 前进
  snake.unshift({x:nx,y:ny});
  if(willEat){
    score += 10;
    burst(nx, ny, COL.green, 14);
    burst(nx, ny, COL.gold, 8);
    shake = Math.min(shake+5, 9);
    sfxEat();
    // 略微提速(有下限),难度递增
    stepInterval = Math.max(0.055, stepInterval * 0.965);
    spawnFood();
    updateHUD();
  } else {
    snake.pop();
  }
}

function die(nx,ny){
  alive = false;
  shake = 16;
  burst(Math.max(0,Math.min(GRID-1,nx)), Math.max(0,Math.min(GRID-1,ny)), COL.pink, 26);
  sfxDie();
  if(score > hiScore){ hiScore = score; localStorage.setItem(HI_KEY, hiScore); }
  updateHUD();
  // 显示结束遮罩(演示模式自动重开,不挡录制)
  if(!DEMO){
    overScore.textContent = score;
    overHi.textContent = hiScore;
    setTimeout(()=>{ overMask.classList.remove('hidden'); }, 650);
  } else {
    setTimeout(()=>{ resetGame(); }, 900); // 演示自动重开
  }
}

// =========================================================
//  粒子(juice)
// =========================================================
function burst(gx, gy, color, n){
  const cxp = gx*cell + cell/2;
  const cyp = gy*cell + cell/2;
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 40 + Math.random()*160;
    particles.push({
      x:cxp, y:cyp,
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:0.5+Math.random()*0.4, age:0,
      color, size:2+Math.random()*3
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.age+=dt;
    if(p.age>=p.life){ particles.splice(i,1); continue; }
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=0.92; p.vy*=0.92;
  }
}

// =========================================================
//  渲染
// =========================================================
function draw(dt){
  foodPulse += dt*5;
  bgScroll = (bgScroll + dt*16) % cell;

  ctx.save();
  // 屏幕震动
  if(shake>0.2){
    const sx=(Math.random()*2-1)*shake;
    const sy=(Math.random()*2-1)*shake;
    ctx.translate(sx,sy);
  }

  // 背景:深色 + 滚动霓虹网格(透视感)
  ctx.fillStyle = 'rgba(10,4,28,0.55)';
  ctx.fillRect(-20,-20,pxSize+40,pxSize+40);

  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(94,240,255,0.10)';
  ctx.beginPath();
  for(let i=0;i<=GRID;i++){
    const x=i*cell;
    ctx.moveTo(x,0); ctx.lineTo(x,pxSize);
  }
  for(let j=0;j<=GRID;j++){
    const y=j*cell;
    ctx.moveTo(0,y); ctx.lineTo(pxSize,y);
  }
  ctx.stroke();

  // 食物:脉动发光
  drawFood();

  // 蛇:霓虹渐变辉光
  drawSnake();

  // 粒子
  ctx.globalCompositeOperation = 'lighter';
  for(const p of particles){
    const k = 1 - p.age/p.life;
    ctx.globalAlpha = k;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*k+0.5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  ctx.restore();

  if(shake>0) shake = Math.max(0, shake - dt*40);
}

function drawFood(){
  const pulse = 0.5 + 0.5*Math.sin(foodPulse);
  const cxp = food.x*cell + cell/2;
  const cyp = food.y*cell + cell/2;
  const r = cell*0.30 + pulse*cell*0.12;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  // 外辉光
  const g = ctx.createRadialGradient(cxp,cyp,1, cxp,cyp, r*2.4);
  g.addColorStop(0, COL.magenta);
  g.addColorStop(0.4, 'rgba(255,94,200,0.5)');
  g.addColorStop(1, 'rgba(255,94,200,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cxp,cyp,r*2.4,0,Math.PI*2); ctx.fill();
  // 核心
  ctx.fillStyle = COL.gold;
  ctx.shadowColor = COL.gold; ctx.shadowBlur = 16+pulse*10;
  ctx.beginPath(); ctx.arc(cxp,cyp,r*0.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawSnake(){
  const n = snake.length;
  ctx.save();
  // 辉光层
  for(let i=n-1;i>=0;i--){
    const s = snake[i];
    const t = n>1 ? i/(n-1) : 0;       // 0=头 1=尾
    // 头青 -> 身粉 -> 尾品红 渐变
    const col = lerpColor3(COL.cyan, COL.pink, COL.magenta, t);
    const x = s.x*cell, y = s.y*cell;
    const pad = 1.5;
    const size = cell - pad*2;
    const rad = Math.max(3, cell*0.28);

    ctx.shadowColor = col;
    ctx.shadowBlur = i===0 ? 22 : 12;
    ctx.fillStyle = col;
    roundRect(x+pad, y+pad, size, size, rad);
    ctx.fill();
  }
  // 高光描边层(去掉阴影,叠亮)
  ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = 'lighter';
  for(let i=0;i<n;i++){
    const s = snake[i];
    const x = s.x*cell, y = s.y*cell;
    const pad = cell*0.30;
    ctx.fillStyle = 'rgba(255,255,255,'+(i===0?0.55:0.18)+')';
    roundRect(x+pad, y+pad, cell-pad*2, cell-pad*2, cell*0.12);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  // 蛇头眼睛
  const head = snake[0];
  const hx = head.x*cell, hy = head.y*cell;
  ctx.fillStyle = '#0a041c';
  const ex = cell*0.30, ey = cell*0.30, es = Math.max(1.6, cell*0.09);
  const offx = dir.x*cell*0.10, offy = dir.y*cell*0.10;
  ctx.beginPath();
  ctx.arc(hx+ex+offx, hy+ey+offy, es, 0, Math.PI*2);
  ctx.arc(hx+cell-ex+offx, hy+ey+offy, es, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// 圆角矩形
function roundRect(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// 三段颜色插值
function hexToRgb(h){ const n=parseInt(h.slice(1),16); return [n>>16&255,n>>8&255,n&255]; }
function lerpColor3(a,b,c,t){
  let c1,c2,tt;
  if(t<0.5){ c1=hexToRgb(a); c2=hexToRgb(b); tt=t/0.5; }
  else { c1=hexToRgb(b); c2=hexToRgb(c); tt=(t-0.5)/0.5; }
  const r=Math.round(c1[0]+(c2[0]-c1[0])*tt);
  const g=Math.round(c1[1]+(c2[1]-c1[1])*tt);
  const bl=Math.round(c1[2]+(c2[2]-c1[2])*tt);
  return 'rgb('+r+','+g+','+bl+')';
}

// =========================================================
//  主循环 requestAnimationFrame + delta time
// =========================================================
let lastT = 0;
function loop(ts){
  if(!lastT) lastT = ts;
  let dt = (ts - lastT)/1000;
  lastT = ts;
  if(dt>0.1) dt = 0.1; // 防止卡顿大跳

  try{
    if(started && alive){
      stepAcc += dt;
      let guard = 0;
      while(stepAcc >= stepInterval){
        stepAcc -= stepInterval;
        step();
        if(!alive) break;
        if(++guard > 1000){ stepAcc = 0; break; } // 防御:避免极端 dt 卡死循环
      }
    }
    updateParticles(dt);
    draw(dt);
  }catch(err){
    // 单帧异常不应中断渲染循环
    console.error('frame error', err);
    try{ ctx.restore(); }catch(_){}
  }
  requestAnimationFrame(loop);
}

// =========================================================
//  开始 / 重开
// =========================================================
function beginGame(){
  initAudio();
  resumeAudio();
  startMask.classList.add('hidden');
  overMask.classList.add('hidden');
  resetGame();
  started = true;
}
startBtn.addEventListener('click', beginGame);
againBtn.addEventListener('click', beginGame);

// =========================================================
//  自适应尺寸(resize):仅在真正变化时重设 canvas
// =========================================================
function fitSize(){
  let vw = window.innerWidth || document.documentElement.clientWidth || 480;
  let vh = window.innerHeight || document.documentElement.clientHeight || 480;
  if(vw<=0) vw=480; if(vh<=0) vh=480;
  // 预留 HUD/标题/边距空间
  const avail = Math.min(vw - 24, vh - 150, 680);
  let target = Math.max(220, avail);
  // 让 cell 为整数,避免缝隙
  let newCell = Math.max(8, Math.floor(target / GRID));
  let newPx = newCell * GRID;

  // 仅在尺寸真正变化时重设(避免录制期间清空画布)
  if(newPx !== pxSize || newCell !== cell){
    cell = newCell;
    pxSize = newPx;
    if(cv.width !== pxSize)  cv.width  = pxSize;
    if(cv.height !== pxSize) cv.height = pxSize;
  }
}
window.addEventListener('resize', fitSize);
window.addEventListener('orientationchange', ()=>setTimeout(fitSize,150));

// =========================================================
//  录制(?record=N):自动演示 + 录主 canvas 并下载 webm
// =========================================================
function startRecording(){
  // 确认 canvas 尺寸有效
  if(!cv.width || !cv.height){ fitSize(); }
  let stream;
  try{ stream = cv.captureStream(30); }
  catch(e){ console.warn('captureStream 失败', e); return; }

  let mt='video/webm;codecs=vp9';
  if(!MediaRecorder.isTypeSupported(mt)) mt=(MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm');
  let mr;
  try{ mr = new MediaRecorder(stream,{mimeType:mt,videoBitsPerSecond:9000000}); }
  catch(e){ console.warn('MediaRecorder 失败', e); return; }

  const chunks=[];
  mr.ondataavailable=e=>{ if(e.data && e.data.size) chunks.push(e.data); };
  mr.onstop=()=>{
    const blob=new Blob(chunks,{type:'video/webm'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='neon-snake.webm';
    document.body.appendChild(a);
    try{a.click()}catch(e){}
  };
  mr.start(250); // 周期落块,避免 resize 丢帧产生空文件
  setTimeout(()=>{ try{mr.stop()}catch(e){} }, RECORD_SEC*1000);
}

// =========================================================
//  启动
// =========================================================
fitSize();
resetGame();         // 预填一局,使开始遮罩后方有画面
started = false;
requestAnimationFrame(loop);

if(DEMO){
  // 演示:免手势直接开局
  beginGame();
  // 演示模式也尝试初始化音频(可能被自动播放策略静音,但不影响画面)
  if(RECORD_SEC>0){
    // 稍等画面稳定后开始录制
    setTimeout(startRecording, 400);
  }
}
})();
</script>
