<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON FRUIT NINJA · 霓虹切水果</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ====== 全局合成波 OutRun 风格 ====== */
  :root{
    --pink:#ff2e88; --cyan:#5ef0ff; --magenta:#ff5ec8; --gold:#ffd95e; --green:#5effa0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#160a36;}
  body{
    font-family:'Chakra Petch','PingFang SC','Microsoft YaHei',sans-serif;
    color:#fff; user-select:none; -webkit-user-select:none; touch-action:none;
  }
  /* 背景日落渐变 */
  #wrap{
    position:fixed; inset:0;
    background:linear-gradient(#160a36,#3a1457 30%,#7a2a6e 50%,#ff5e7e 64%,#ff9a4d 72%,#160a36 72%);
  }
  canvas{position:absolute; inset:0; display:block; width:100%; height:100%;}
  /* CRT 扫描线 */
  #crt{
    position:fixed; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, rgba(0,0,0,0) 2px, rgba(0,0,0,0) 3px);
    mix-blend-mode:multiply;
  }
  /* HUD */
  #hud{
    position:fixed; top:0; left:0; right:0; z-index:30;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 16px; pointer-events:none; gap:10px;
  }
  .hud-box{
    font-family:'Press Start 2P',monospace; font-size:13px; line-height:1.4;
    background:rgba(22,10,54,0.55); padding:8px 11px;
    border:2px solid var(--cyan); box-shadow:4px 4px 0 var(--pink);
    color:#fff;
  }
  .hud-box .lab{color:var(--cyan); font-size:8px; display:block; margin-bottom:5px;}
  #scoreBox{color:var(--gold);}
  #scoreBox .lab{color:var(--gold);}
  #bestBox{color:var(--green); border-color:var(--green); box-shadow:4px 4px 0 var(--magenta);}
  #bestBox .lab{color:var(--green);}
  #livesBox{border-color:var(--pink); box-shadow:4px 4px 0 var(--cyan); color:var(--pink); text-align:right;}
  #livesBox .lab{color:var(--pink);}
  #comboTag{
    position:fixed; left:50%; top:64px; transform:translateX(-50%); z-index:31;
    font-family:'Press Start 2P',monospace; font-size:18px; color:var(--gold);
    text-shadow:0 0 12px var(--gold),3px 3px 0 var(--pink); opacity:0; pointer-events:none;
    transition:opacity .15s;
  }
  /* 按钮通用 */
  .btn{
    font-family:'Press Start 2P',monospace; font-size:11px; cursor:pointer;
    padding:12px 16px; color:#160a36; background:var(--cyan);
    border:none; box-shadow:4px 4px 0 var(--pink); pointer-events:auto;
    transition:transform .05s;
  }
  .btn:active{transform:translate(2px,2px); box-shadow:2px 2px 0 var(--pink);}
  /* 静音按钮 */
  #muteBtn{
    position:fixed; right:16px; bottom:16px; z-index:40;
    width:50px; height:50px; font-size:18px; padding:0;
    background:var(--magenta); color:#160a36; box-shadow:4px 4px 0 var(--cyan);
  }
  /* 遮罩 */
  .overlay{
    position:fixed; inset:0; z-index:60;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:18px; padding:24px;
    background:radial-gradient(ellipse at center, rgba(58,20,87,0.78), rgba(22,10,54,0.94));
  }
  .overlay.hidden{display:none;}
  .title{
    font-family:'Press Start 2P',monospace; font-size:clamp(20px,6vw,46px); line-height:1.3;
    color:var(--pink); text-shadow:0 0 16px var(--pink),4px 4px 0 var(--cyan);
  }
  .title .l2{color:var(--cyan); text-shadow:0 0 16px var(--cyan),4px 4px 0 var(--pink); display:block; margin-top:8px;}
  .sub{font-size:clamp(13px,3.2vw,18px); max-width:560px; line-height:1.7; color:#ffe;}
  .sub b{color:var(--gold);}
  .bomb{color:var(--pink); font-weight:700;}
  #finalScore{
    font-family:'Press Start 2P',monospace; font-size:clamp(16px,4vw,26px); color:var(--gold);
    text-shadow:0 0 12px var(--gold);
  }
  .demohint{font-size:11px; color:var(--cyan); opacity:.85;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>
<div id="crt"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-box" id="scoreBox"><span class="lab">SCORE 分数</span><span id="scoreVal">0</span></div>
  <div class="hud-box" id="bestBox"><span class="lab">BEST 最高</span><span id="bestVal">0</span></div>
  <div class="hud-box" id="livesBox"><span class="lab">LIVES 命</span><span id="livesVal">XXX</span></div>
</div>
<div id="comboTag"></div>

<!-- 开始遮罩 -->
<div class="overlay" id="startOverlay">
  <div class="title">NEON FRUIT<span class="l2">霓虹切水果</span></div>
  <div class="sub">
    用<b>鼠标/手指快速划过</b>飞起的霓虹水果即可切开得分。<br>
    一刀切多个 = <b>连击 COMBO</b> 加分;水果会越来越密。<br>
    切到<span class="bomb">炸弹 💣</span>扣命,漏掉水果也扣命，命尽 GAME OVER。
  </div>
  <button class="btn" id="startBtn">▶ 开始游戏 START</button>
  <div class="demohint">提示：网址加 <b>?demo</b> 自动演示，<b>?record=20</b> 录制 20 秒</div>
</div>

<!-- 结束遮罩 -->
<div class="overlay hidden" id="endOverlay">
  <div class="title" style="color:var(--gold);text-shadow:0 0 16px var(--gold),4px 4px 0 var(--pink);">GAME OVER</div>
  <div id="finalScore">SCORE 0</div>
  <div class="sub" id="endMsg">再来一刀？</div>
  <button class="btn" id="restartBtn">↻ 再玩一次 RETRY</button>
</div>

<button id="muteBtn" class="btn" title="静音">🔊</button>

<script>
"use strict";
/* ============================================================
   NEON FRUIT NINJA — 霓虹切水果 (合成波 OutRun)
   单文件 / 原生 Canvas 2D / Web Audio 程序化音效
   ============================================================ */
(function(){

  // ---------- URL 参数 ----------
  const params = new URLSearchParams(location.search);
  const DEMO   = params.has('demo') || params.has('record');
  const RECORD = params.has('record') ? Math.max(1, parseInt(params.get('record'))||20) : 0;

  // ---------- DOM ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreVal = document.getElementById('scoreVal');
  const bestVal  = document.getElementById('bestVal');
  const livesVal = document.getElementById('livesVal');
  const comboTag = document.getElementById('comboTag');
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay   = document.getElementById('endOverlay');
  const finalScore   = document.getElementById('finalScore');
  const endMsg       = document.getElementById('endMsg');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const muteBtn = document.getElementById('muteBtn');

  // ---------- 视图尺寸 ----------
  let W=0, H=0, DPR=1;
  function resize(){
    DPR = Math.min(2, window.devicePixelRatio||1);
    const cssW = window.innerWidth, cssH = window.innerHeight;
    const nw = Math.round(cssW*DPR), nh = Math.round(cssH*DPR);
    // 仅在真正变化时重设（录制期间避免清画布）
    if(canvas.width!==nw || canvas.height!==nh){
      canvas.width=nw; canvas.height=nh;
      canvas.style.width=cssW+'px'; canvas.style.height=cssH+'px';
    }
    W=cssW; H=cssH;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- 颜色 ----------
  const NEON = {
    pink:'#ff2e88', cyan:'#5ef0ff', magenta:'#ff5ec8', gold:'#ffd95e', green:'#5effa0'
  };
  const FRUIT_DEFS = [
    {name:'lime',   color:'#5effa0', rim:'#aaffd0', emoji:'🍈'},
    {name:'cherry', color:'#ff2e88', rim:'#ff9ec8', emoji:'🍒'},
    {name:'orange', color:'#ff9a4d', rim:'#ffd0a0', emoji:'🍊'},
    {name:'grape',  color:'#ff5ec8', rim:'#ffb0e8', emoji:'🍇'},
    {name:'lemon',  color:'#ffd95e', rim:'#fff0a8', emoji:'🍋'},
    {name:'plum',   color:'#5ef0ff', rim:'#b0f8ff', emoji:'🫐'},
  ];

  // ============================================================
  //  Web Audio 程序化音效 + 合成波配乐
  // ============================================================
  const Audio = (function(){
    let actx=null, master=null, musicGain=null, sfxGain=null, muted=false, musicTimer=null, musicStep=0;
    function ensure(){
      if(actx) return;
      try{
        actx = new (window.AudioContext||window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value=0.9; master.connect(actx.destination);
        musicGain = actx.createGain(); musicGain.gain.value=0.16; musicGain.connect(master);
        sfxGain = actx.createGain(); sfxGain.gain.value=0.5; sfxGain.connect(master);
      }catch(e){ console.warn('audio init fail',e); }
    }
    function resume(){ ensure(); if(actx && actx.state==='suspended') actx.resume(); }
    function blip(freq, dur, type, gain, target){
      if(!actx||muted) return;
      try{
        const o=actx.createOscillator(), g=actx.createGain();
        o.type=type||'square'; o.frequency.value=freq;
        const t=actx.currentTime;
        g.gain.setValueAtTime(0.0001,t);
        g.gain.exponentialRampToValueAtTime(gain||0.3, t+0.008);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        o.connect(g); g.connect(target||sfxGain);
        o.start(t); o.stop(t+dur+0.02);
      }catch(e){}
    }
    function noise(dur, gain){
      if(!actx||muted) return;
      try{
        const n = actx.createBufferSource();
        const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
        const d = buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
        n.buffer=buf;
        const f=actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1800; f.Q.value=0.7;
        const g=actx.createGain(); g.gain.value=gain||0.4;
        n.connect(f); f.connect(g); g.connect(sfxGain);
        n.start();
      }catch(e){}
    }
    // 切水果：上行小亮音
    function slice(combo){
      const base = 520 + Math.min(combo,8)*60;
      blip(base, 0.12, 'square', 0.28);
      blip(base*1.5, 0.10, 'triangle', 0.18);
      noise(0.08, 0.18);
    }
    // 炸弹爆炸
    function boom(){
      noise(0.5, 0.6);
      blip(90, 0.4, 'sawtooth', 0.4);
      blip(55, 0.5, 'square', 0.3);
    }
    // 漏掉
    function miss(){ blip(180,0.18,'sawtooth',0.25); blip(120,0.22,'sawtooth',0.2); }
    // 开局
    function start(){ blip(440,0.1,'square',0.3); setTimeout(()=>blip(660,0.12,'square',0.3),90); setTimeout(()=>blip(880,0.15,'square',0.3),190); }
    function over(){ [440,330,260,180].forEach((f,i)=>setTimeout(()=>blip(f,0.25,'sawtooth',0.3),i*150)); }

    // 合成波循环配乐（琶音 bass + lead）
    const BASS = [55,55,82.4,73.4,65.4,65.4,49,55];   // A,A,E,D,C,C,G,A 低音
    const LEAD = [220,261.6,329.6,261.6,293.6,349.2,293.6,261.6];
    function musicTick(){
      if(!actx||muted) return;
      const step = musicStep % 8;
      // bass
      blip(BASS[step], 0.26, 'sawtooth', 0.22, musicGain);
      // lead 每两拍
      if(step%2===0) blip(LEAD[step], 0.32, 'triangle', 0.14, musicGain);
      // hi-hat
      if(step%2===1) noise(0.03, 0.05);
      musicStep++;
    }
    function startMusic(){
      ensure(); if(musicTimer) return;
      musicStep=0;
      musicTimer = setInterval(musicTick, 220); // ~136bpm 八分音
    }
    function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } }
    function setMuted(m){
      muted=m;
      if(master) master.gain.value = m?0:0.9;
    }
    return {ensure,resume,slice,boom,miss,start,over,startMusic,stopMusic,setMuted,
            get muted(){return muted;}};
  })();

  // ============================================================
  //  游戏状态
  // ============================================================
  const STATE = { MENU:0, PLAY:1, OVER:2 };
  let state = STATE.MENU;

  let score=0, best=+(localStorage.getItem('neonFruitBest')||0)||0;
  let lives=3, maxLives=3;
  let timeAlive=0;        // 存活时间(秒) 用于难度
  let spawnTimer=0;       // 距下次抛出
  let fruits=[];          // 飞行物
  let particles=[];       // 切开/爆炸粒子
  let halves=[];          // 切开后的两半
  let blades=[];          // 划痕拖尾点 {x,y,life}
  let popups=[];          // 飘字
  let shake=0;            // 屏幕震动
  let flash=0;            // 爆炸白闪
  let gravity = 1400;     // px/s^2 (基于 CSS 像素)
  bestVal.textContent = best;

  // 鼠标/触摸划动
  const pointer = { x:0, y:0, px:0, py:0, active:false, speed:0 };

  // ---------- 工具 ----------
  function rand(a,b){ return a + Math.random()*(b-a); }
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

  // ---------- 生成飞行物 ----------
  function difficulty(){
    // 随时间提升：抛出间隔变短 + 一次抛出更多 + 炸弹更多
    return Math.min(1, timeAlive/90);
  }
  function spawnInterval(){
    const d = difficulty();
    return rand(0.9,1.4) - d*0.65; // 由 ~1.1s 缩短到 ~0.5s
  }
  function spawnGroup(){
    const d = difficulty();
    const n = 1 + (Math.random()< (0.35+d*0.45) ? 1:0) + (Math.random()< (0.12+d*0.4)?1:0);
    for(let i=0;i<n;i++){
      const isBomb = Math.random() < (0.07 + d*0.13); // 7% -> 20%
      spawnOne(isBomb);
    }
  }
  function spawnOne(isBomb){
    const x = rand(W*0.12, W*0.88);
    const dir = (x < W*0.5) ? 1 : -1;
    // 速度足够飞到屏幕上方再落下
    const vy = -rand(Math.sqrt(2*gravity*H*0.78), Math.sqrt(2*gravity*H*1.05));
    const vx = rand(40, 180) * dir + rand(-60,60);
    const r = isBomb ? rand(30,36) : rand(30,42);
    const def = FRUIT_DEFS[(Math.random()*FRUIT_DEFS.length)|0];
    fruits.push({
      x, y:H+r+10, vx, vy, r,
      rot: rand(0,Math.PI*2), vr: rand(-3,3),
      isBomb, def, sliced:false, alive:true
    });
  }

  // ---------- 切开 ----------
  function sliceFruit(f, combo){
    f.sliced=true; f.alive=false;
    // 两半
    const ang = Math.atan2(pointer.y-pointer.py, pointer.x-pointer.px);
    for(let s=-1;s<=1;s+=2){
      halves.push({
        x:f.x, y:f.y, r:f.r,
        vx:f.vx*0.4 + Math.cos(ang+Math.PI/2)*s*120,
        vy:f.vy*0.3 - 60,
        rot:f.rot, vr:s*4, def:f.def, life:1.2, cutAng:ang+Math.PI/2, side:s
      });
    }
    // 汁液粒子
    spawnParticles(f.x, f.y, f.def.color, 14, 260);
    // 飘分
    const gain = 10 * combo;
    score += gain;
    popups.push({x:f.x, y:f.y, text:'+'+gain, color:f.def.rim, life:0.9, vy:-50});
    if(combo>=2){
      showCombo(combo);
      popups.push({x:f.x, y:f.y-26, text:'COMBO x'+combo, color:NEON.gold, life:1.0, vy:-40});
    }
    Audio.slice(combo);
  }
  function explodeBomb(b){
    b.alive=false;
    spawnParticles(b.x, b.y, NEON.pink, 36, 420);
    spawnParticles(b.x, b.y, NEON.gold, 18, 380);
    shake = 22; flash = 0.9;
    Audio.boom();
    loseLife(2); // 炸弹扣 2 命，更狠
    popups.push({x:b.x, y:b.y, text:'💥 BOMB!', color:NEON.pink, life:1.1, vy:-30});
  }
  function spawnParticles(x,y,color,count,spd){
    for(let i=0;i<count;i++){
      const a=rand(0,Math.PI*2), s=rand(spd*0.2,spd);
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s - 80,
        life:rand(0.4,0.9), size:rand(2,5), color});
    }
  }
  function loseLife(n){
    lives -= n;
    if(lives<0) lives=0;
    updateHUD();
    if(lives<=0) gameOver();
  }
  function showCombo(c){
    comboTag.textContent = 'COMBO x'+c+'!';
    comboTag.style.opacity = 1;
    clearTimeout(showCombo._t);
    showCombo._t = setTimeout(()=>{ comboTag.style.opacity=0; }, 650);
  }

  // ---------- HUD ----------
  function updateHUD(){
    scoreVal.textContent = score;
    bestVal.textContent = best;
    let s=''; for(let i=0;i<maxLives;i++) s += (i<lives?'❤':'·');
    livesVal.textContent = s || '·';
  }

  // ============================================================
  //  划动检测：判定划线段是否切到某飞行物
  // ============================================================
  let comboWindow = 0;   // 连击计时窗
  let comboCount = 0;    // 当前这刀已切数
  function processSlice(){
    if(!pointer.active) return;
    const x1=pointer.px, y1=pointer.py, x2=pointer.x, y2=pointer.y;
    const segLen = Math.hypot(x2-x1,y2-y1);
    if(segLen < 6) return; // 速度太慢不算切
    let hitThisStep = 0;
    for(const f of fruits){
      if(!f.alive || f.sliced) continue;
      if(segCircle(x1,y1,x2,y2,f.x,f.y,f.r*0.92)){
        if(f.isBomb){ explodeBomb(f); }
        else {
          hitThisStep++;
          comboCount++;
          comboWindow = 0.35; // 维持窗口
          sliceFruit(f, comboCount);
        }
      }
    }
  }
  // 线段与圆相交
  function segCircle(x1,y1,x2,y2,cx,cy,r){
    const dx=x2-x1, dy=y2-y1;
    const l2=dx*dx+dy*dy;
    let t = l2>0 ? ((cx-x1)*dx+(cy-y1)*dy)/l2 : 0;
    t = clamp(t,0,1);
    const px=x1+t*dx, py=y1+t*dy;
    return (px-cx)**2+(py-cy)**2 <= r*r;
  }

  // ============================================================
  //  输入
  // ============================================================
  function setPointer(x,y){
    pointer.px = pointer.active ? pointer.x : x;
    pointer.py = pointer.active ? pointer.y : y;
    pointer.x=x; pointer.y=y;
    pointer.active=true;
  }
  function addBlade(x,y){
    blades.push({x,y,life:1});
    if(blades.length>40) blades.shift();
  }
  function onMove(x,y){
    if(state!==STATE.PLAY) return;
    setPointer(x,y);
    addBlade(x,y);
    processSlice();
  }
  function pointerEnd(){ pointer.active=false; }

  canvas.addEventListener('mousemove', e=>{ onMove(e.clientX, e.clientY); });
  canvas.addEventListener('mousedown', e=>{ pointer.active=false; onMove(e.clientX,e.clientY); });
  canvas.addEventListener('mouseup', pointerEnd);
  canvas.addEventListener('mouseleave', pointerEnd);
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); pointer.active=false; const t=e.touches[0]; onMove(t.clientX,t.clientY); }, {passive:false});
  canvas.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.touches[0]; onMove(t.clientX,t.clientY); }, {passive:false});
  canvas.addEventListener('touchend', e=>{ e.preventDefault(); pointerEnd(); }, {passive:false});

  // 键盘：空格/回车 开始或重开；M 静音
  window.addEventListener('keydown', e=>{
    if(e.code==='Space'||e.code==='Enter'){
      if(state===STATE.MENU) startGame();
      else if(state===STATE.OVER) startGame();
      e.preventDefault();
    } else if(e.key==='m'||e.key==='M'){ toggleMute(); }
  });

  // ============================================================
  //  AI 自动演示
  // ============================================================
  const AI = {
    enabled:false,
    bx:0, by:0,        // 当前虚拟刀位置
    tx:0, ty:0,        // 目标
    swinging:false,
    swingT:0,
    cooldown:0,
    restartTimer:0,
    init(){
      this.bx=W*0.5; this.by=H*0.5; this.tx=this.bx; this.ty=this.by;
    },
    // 找一个可切的目标群（避开炸弹）
    pickTarget(){
      // 收集即将到达可切区域的水果（非炸弹、在上升或顶部、屏幕内）
      let cand = fruits.filter(f=>f.alive && !f.isBomb && f.y>40 && f.y<H*0.95);
      if(!cand.length) return null;
      // 优先即将下落到中部、或聚集的水果
      // 选一个 y 最靠近屏幕中上部、且附近有伴的
      cand.sort((a,b)=> (Math.abs(a.y-H*0.45)) - (Math.abs(b.y-H*0.45)) );
      return cand[0];
    },
    // 检测路径上是否经过炸弹
    pathHitsBomb(x1,y1,x2,y2){
      for(const f of fruits){
        if(f.alive && f.isBomb && segCircle(x1,y1,x2,y2,f.x,f.y,f.r+10)) return true;
      }
      return false;
    },
    update(dt){
      if(!this.enabled || state!==STATE.PLAY){
        // 处理结束后自动重开
        if(state===STATE.OVER){
          this.restartTimer -= dt;
          if(this.restartTimer<=0){ startGame(); }
        }
        return;
      }
      this.cooldown -= dt;
      if(!this.swinging && this.cooldown<=0){
        const t = this.pickTarget();
        if(t){
          // 设计一道横扫：从目标一侧扫到另一侧，尽量串多个水果，避开炸弹
          // 预测目标位置稍微提前
          const ahead = 0.04;
          const px = t.x + t.vx*ahead;
          const py = t.y + t.vy*ahead;
          const sweep = (px < W*0.5)? 1 : -1;
          const x1 = px - sweep*(t.r+90);
          const y1 = py + rand(-40,40);
          const x2 = px + sweep*(t.r+110);
          const y2 = py + rand(-30,50);
          if(!this.pathHitsBomb(x1,y1,x2,y2)){
            this.bx=x1; this.by=y1; this.tx=x2; this.ty=y2;
            this.swinging=true; this.swingT=0;
          } else {
            this.cooldown=0.08; // 危险，稍等重选
          }
        } else {
          this.cooldown=0.1;
        }
      }
      if(this.swinging){
        this.swingT += dt;
        const dur=0.12;
        const k = clamp(this.swingT/dur,0,1);
        const nx = this.bx + (this.tx-this.bx)*k;
        const ny = this.by + (this.ty-this.by)*k;
        // 模拟划动：设置 pointer + 加拖尾 + 切
        setPointer(nx, ny);
        addBlade(nx, ny);
        // 演示时也避免切到炸弹：若当前段碰炸弹则不 process（直接跳过该步切割）
        if(!this.pathHitsBomb(pointer.px,pointer.py,pointer.x,pointer.y)){
          processSlice();
        }
        if(k>=1){
          this.swinging=false;
          pointer.active=false;
          this.cooldown=rand(0.05,0.18);
        }
      }
    }
  };

  // ============================================================
  //  主流程：开始 / 结束
  // ============================================================
  function startGame(){
    score=0; lives=maxLives=3; timeAlive=0; spawnTimer=0.4;
    fruits.length=0; particles.length=0; halves.length=0; blades.length=0; popups.length=0;
    comboCount=0; comboWindow=0; shake=0; flash=0;
    state=STATE.PLAY;
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    updateHUD();
    Audio.resume(); Audio.start(); Audio.startMusic();
    if(AI.enabled){ AI.init(); AI.swinging=false; AI.cooldown=0.3; }
  }
  function gameOver(){
    state=STATE.OVER;
    const isNewRecord = score>best && score>0;
    if(isNewRecord){ best=score; localStorage.setItem('neonFruitBest', best); }
    updateHUD();
    finalScore.textContent = 'SCORE '+score;
    endMsg.innerHTML = isNewRecord ? '🏆 新纪录！再来一刀？' : '再来一刀？';
    endOverlay.classList.remove('hidden');
    Audio.over();
    Audio.stopMusic();
    if(AI.enabled){ AI.restartTimer = 2.0; } // 演示自动重开
  }

  startBtn.addEventListener('click', ()=>{ Audio.resume(); startGame(); });
  restartBtn.addEventListener('click', ()=>{ Audio.resume(); startGame(); });

  function toggleMute(){
    const m = !Audio.muted;
    Audio.setMuted(m);
    muteBtn.textContent = m ? '🔇' : '🔊';
  }
  muteBtn.addEventListener('click', toggleMute);

  // ============================================================
  //  更新
  // ============================================================
  function update(dt){
    try{
      // 连击窗口
      if(comboWindow>0){
        comboWindow -= dt;
        if(comboWindow<=0){ comboCount=0; }
      }
      // 屏幕特效衰减
      if(shake>0) shake=Math.max(0, shake-dt*40);
      if(flash>0) flash=Math.max(0, flash-dt*2.2);

      // AI
      AI.update(dt);

      if(state!==STATE.PLAY) {
        // 即使非游玩，粒子继续衰减以保持画面动感
        stepEffects(dt);
        return;
      }

      timeAlive += dt;

      // 抛出
      spawnTimer -= dt;
      if(spawnTimer<=0){
        spawnGroup();
        spawnTimer = spawnInterval();
      }

      // 飞行物物理
      for(const f of fruits){
        if(!f.alive) continue;
        f.vy += gravity*dt;
        f.x += f.vx*dt;
        f.y += f.vy*dt;
        f.rot += f.vr*dt;
        // 漏掉：上升后落回底部以下
        if(f.y - f.r > H+20 && f.vy>0){
          f.alive=false;
          if(!f.isBomb && !f.sliced){
            loseLife(1);
            Audio.miss();
            popups.push({x:clamp(f.x,30,W-30), y:H-60, text:'MISS', color:NEON.pink, life:0.9, vy:-40});
          }
        }
      }
      fruits = fruits.filter(f=>f.alive || f.sliced ? f.alive : false);
      fruits = fruits.filter(f=>f.alive);

      stepEffects(dt);
    }catch(e){ console.error('update err', e); }
  }

  function stepEffects(dt){
    // 半块水果
    for(const h of halves){
      h.vy += gravity*dt;
      h.x += h.vx*dt; h.y += h.vy*dt;
      h.rot += h.vr*dt;
      h.life -= dt*0.8;
    }
    halves = halves.filter(h=>h.life>0 && h.y-h.r<H+60);
    // 粒子
    for(const p of particles){
      p.vy += gravity*0.5*dt;
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.life -= dt;
    }
    particles = particles.filter(p=>p.life>0);
    // 刀痕拖尾
    for(const b of blades) b.life -= dt*3.2;
    blades = blades.filter(b=>b.life>0);
    // 飘字
    for(const u of popups){ u.y += u.vy*dt; u.life -= dt; }
    popups = popups.filter(u=>u.life>0);
  }

  // ============================================================
  //  绘制
  // ============================================================
  function draw(){
    try{
      ctx.save();
      ctx.scale(DPR,DPR);

      // 震动
      if(shake>0){
        ctx.translate(rand(-shake,shake)*0.4, rand(-shake,shake)*0.4);
      }

      // 背景由 CSS 渐变承担；此处叠加远景网格 + 太阳轮廓（合成波）
      drawBackground();

      // 飞行物
      for(const f of fruits){
        if(!f.alive) continue;
        if(f.isBomb) drawBomb(f); else drawFruit(f);
      }
      // 半块
      for(const h of halves) drawHalf(h);

      // 粒子
      for(const p of particles){
        ctx.globalAlpha = clamp(p.life,0,1);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;

      // 刀痕拖尾
      drawBlade();

      // 飘字
      for(const u of popups){
        ctx.globalAlpha = clamp(u.life,0,1);
        ctx.font = "16px 'Press Start 2P', monospace";
        ctx.textAlign='center';
        ctx.fillStyle = u.color;
        ctx.shadowColor = u.color; ctx.shadowBlur=12;
        ctx.fillText(u.text, u.x, u.y);
        ctx.shadowBlur=0;
      }
      ctx.globalAlpha=1;

      // 爆炸白闪
      if(flash>0){
        ctx.fillStyle = `rgba(255,255,255,${flash*0.6})`;
        ctx.fillRect(-50,-50,W+100,H+100);
      }

      // 演示标识
      if(AI.enabled){
        ctx.font = "10px 'Press Start 2P', monospace";
        ctx.textAlign='center';
        ctx.fillStyle = NEON.cyan;
        ctx.globalAlpha = 0.7+0.3*Math.sin(performance.now()/300);
        ctx.fillText('● AI DEMO ●', W/2, H-22);
        ctx.globalAlpha=1;
      }

      ctx.restore();
    }catch(e){ console.error('draw err', e); }
  }

  // 远景太阳 + 网格地平线
  let gridOff=0;
  function drawBackground(){
    const hor = H*0.72; // 与渐变 72% 对齐
    // 合成波太阳（半圆，被地平线截断），带横纹
    const sunR = Math.min(W,H)*0.22;
    const sunX = W*0.5, sunY = hor - sunR*0.15;
    ctx.save();
    ctx.beginPath(); ctx.rect(0,0,W,hor); ctx.clip();
    const g = ctx.createLinearGradient(0, sunY-sunR, 0, sunY+sunR);
    g.addColorStop(0,'#ffd95e'); g.addColorStop(0.5,'#ff5ec8'); g.addColorStop(1,'#ff2e88');
    ctx.fillStyle=g; ctx.shadowColor='#ff5ec8'; ctx.shadowBlur=40;
    ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // 横纹挖空
    ctx.fillStyle = 'rgba(22,10,54,0.55)';
    for(let i=0;i<8;i++){
      const yy = sunY + sunR*0.15 + i*(sunR*0.16);
      ctx.fillRect(sunX-sunR, yy, sunR*2, Math.max(2, 3+i));
    }
    ctx.restore();

    // 透视网格（地平线下方）
    ctx.save();
    ctx.strokeStyle='rgba(94,240,255,0.35)';
    ctx.lineWidth=1.5;
    // 横线（随时间向下滚动）
    gridOff = (gridOff + 0.6) % 1;
    for(let i=0;i<16;i++){
      const f=(i+gridOff)/16;
      const y = hor + f*f*(H-hor);
      ctx.globalAlpha = 0.5*(1-f)+0.1;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
    // 竖线收束到中心
    ctx.globalAlpha=0.3;
    for(let i=-10;i<=10;i++){
      const x = W*0.5 + i*(W*0.5/8);
      ctx.beginPath();
      ctx.moveTo(W*0.5 + i* (W*0.013), hor);
      ctx.lineTo(x*1.0 + (x-W*0.5)*1.4, H);
      ctx.stroke();
    }
    ctx.restore();
    ctx.globalAlpha=1;
  }

  // 画一个霓虹水果
  function drawFruit(f){
    ctx.save();
    ctx.translate(f.x,f.y); ctx.rotate(f.rot);
    // 外发光
    ctx.shadowColor=f.def.color; ctx.shadowBlur=22;
    // 主体
    const g=ctx.createRadialGradient(-f.r*0.3,-f.r*0.3,f.r*0.2, 0,0,f.r);
    g.addColorStop(0, f.def.rim);
    g.addColorStop(0.6, f.def.color);
    g.addColorStop(1, shade(f.def.color,-30));
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(0,0,f.r,0,Math.PI*2); ctx.fill();
    // 霓虹描边
    ctx.shadowBlur=0;
    ctx.lineWidth=3; ctx.strokeStyle=f.def.rim;
    ctx.beginPath(); ctx.arc(0,0,f.r,0,Math.PI*2); ctx.stroke();
    // 高光
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(-f.r*0.32,-f.r*0.32,f.r*0.16,0,Math.PI*2); ctx.fill();
    // 小叶/蒂
    ctx.fillStyle=NEON.green;
    ctx.fillRect(-2,-f.r-6,4,8);
    ctx.restore();
  }

  // 切开后的半块
  function drawHalf(h){
    ctx.save();
    ctx.globalAlpha = clamp(h.life,0,1);
    ctx.translate(h.x,h.y); ctx.rotate(h.rot);
    ctx.shadowColor=h.def.color; ctx.shadowBlur=16;
    const g=ctx.createRadialGradient(0,0,h.r*0.2, 0,0,h.r);
    g.addColorStop(0,h.def.rim); g.addColorStop(1,shade(h.def.color,-30));
    ctx.fillStyle=g;
    // 半圆（沿切角方向）
    ctx.rotate(h.cutAng);
    ctx.beginPath();
    ctx.arc(0,0,h.r, (h.side>0?0:Math.PI), (h.side>0?Math.PI:Math.PI*2));
    ctx.closePath(); ctx.fill();
    // 切面（亮）
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillRect(-h.r, -2, h.r*2, 3);
    ctx.restore();
    ctx.globalAlpha=1;
  }

  // 炸弹
  function drawBomb(b){
    ctx.save();
    ctx.translate(b.x,b.y); ctx.rotate(b.rot);
    ctx.shadowColor=NEON.pink; ctx.shadowBlur=20;
    // 球体
    const g=ctx.createRadialGradient(-b.r*0.3,-b.r*0.3,b.r*0.2,0,0,b.r);
    g.addColorStop(0,'#444'); g.addColorStop(0.7,'#111'); g.addColorStop(1,'#000');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill();
    // 危险霓虹环
    ctx.shadowBlur=0;
    ctx.lineWidth=3; ctx.strokeStyle=NEON.pink;
    ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.stroke();
    // 引信
    ctx.strokeStyle=NEON.gold; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,-b.r); ctx.quadraticCurveTo(b.r*0.5,-b.r*1.4, b.r*0.7,-b.r*1.2); ctx.stroke();
    // 火花
    ctx.fillStyle=NEON.gold; ctx.shadowColor=NEON.gold; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(b.r*0.7,-b.r*1.2, 3+Math.random()*2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // 骷髅提示
    ctx.fillStyle='#fff'; ctx.font='bold '+(b.r*0.9)+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💣', 0, 2);
    ctx.restore();
  }

  // 刀痕拖尾
  function drawBlade(){
    if(blades.length<2) return;
    ctx.save();
    ctx.lineCap='round'; ctx.lineJoin='round';
    for(let pass=0;pass<2;pass++){
      ctx.beginPath();
      for(let i=0;i<blades.length;i++){
        const b=blades[i];
        if(i===0) ctx.moveTo(b.x,b.y); else ctx.lineTo(b.x,b.y);
      }
      if(pass===0){ // 外发光
        ctx.strokeStyle='rgba(94,240,255,0.35)'; ctx.lineWidth=14;
        ctx.shadowColor=NEON.cyan; ctx.shadowBlur=18;
      } else { // 内白芯
        ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=4; ctx.shadowBlur=0;
      }
      ctx.stroke();
    }
    // 端点亮点
    const tip=blades[blades.length-1];
    ctx.fillStyle='#fff'; ctx.shadowColor=NEON.cyan; ctx.shadowBlur=16;
    ctx.beginPath(); ctx.arc(tip.x,tip.y,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.shadowBlur=0;
  }

  // 颜色加深辅助
  function shade(hex, amt){
    let c = hex.replace('#','');
    if(c.length===3) c=c.split('').map(x=>x+x).join('');
    let r=parseInt(c.substr(0,2),16), g=parseInt(c.substr(2,2),16), b=parseInt(c.substr(4,2),16);
    r=clamp(r+amt,0,255); g=clamp(g+amt,0,255); b=clamp(b+amt,0,255);
    return `rgb(${r|0},${g|0},${b|0})`;
  }

  // ============================================================
  //  主循环 rAF + delta time
  // ============================================================
  let last=performance.now();
  function loop(now){
    let dt=(now-last)/1000; last=now;
    if(dt>0.05) dt=0.05; // 防卡顿大跳
    resize();            // 仅在尺寸变化时真正重设
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ============================================================
  //  录制 / 演示
  // ============================================================
  function startRecording(seconds){
    try{
      if(!canvas.width || !canvas.height){ console.warn('canvas 尺寸无效'); return; }
      const stream = canvas.captureStream(30);
      if(!stream.getVideoTracks().length){ console.warn('无视频轨'); return; }
      let mt='video/webm;codecs=vp9';
      if(!MediaRecorder.isTypeSupported(mt)) mt=(MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm');
      const mr=new MediaRecorder(stream,{mimeType:mt,videoBitsPerSecond:9000000});
      const chunks=[];
      mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
      mr.onstop=()=>{
        const b=new Blob(chunks,{type:'video/webm'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(b); a.download='neon-fruit.webm';
        document.body.appendChild(a); try{a.click()}catch(e){}
      };
      mr.start(250);
      setTimeout(()=>{ try{mr.stop()}catch(e){} }, seconds*1000);
    }catch(e){ console.error('record err', e); }
  }

  // 启动 DEMO / RECORD（免手势）
  if(DEMO){
    AI.enabled = true;
    // 免手势直接开局：尝试 resume（多数浏览器 demo 允许无声或自动播放）
    Audio.ensure(); Audio.resume();
    startGame();
    if(RECORD){
      // 等一帧确保 canvas 有效
      setTimeout(()=>startRecording(RECORD), 400);
    }
  }

  updateHUD();

})();
</script>
</body>
