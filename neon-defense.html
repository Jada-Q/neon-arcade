<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON DEFENSE — 合成波路径塔防</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== 全局合成波 OutRun 风格 ===== */
  :root{
    --pink:#ff2e88; --cyan:#5ef0ff; --magenta:#ff5ec8; --gold:#ffd95e; --green:#5effa0;
    --ink:#160a36;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%; height:100%; overflow:hidden; background:#160a36;}
  body{
    font-family:'Chakra Petch', system-ui, sans-serif;
    color:#fff;
    /* 日落渐变背景 */
    background:linear-gradient(#160a36,#3a1457 30%,#7a2a6e 50%,#ff5e7e 64%,#ff9a4d 72%,#160a36 72%);
    display:flex; align-items:center; justify-content:center;
    -webkit-user-select:none; user-select:none; touch-action:manipulation;
  }
  /* CRT 扫描线极轻叠加 */
  #crt{
    position:fixed; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.10) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply;
  }
  #wrap{ position:relative; width:100vw; height:100vh; }
  canvas#game{ display:block; width:100%; height:100%; image-rendering:pixelated; }

  /* ===== HUD ===== */
  #hud{
    position:absolute; top:10px; left:10px; right:10px; z-index:20;
    display:flex; gap:8px; flex-wrap:wrap; align-items:flex-start; pointer-events:none;
  }
  .chip{
    pointer-events:auto;
    background:rgba(22,10,54,0.72); border:2px solid var(--cyan);
    box-shadow:4px 4px 0 var(--pink);
    padding:6px 10px; font-size:11px; line-height:1.4;
    font-family:'Chakra Petch',sans-serif; letter-spacing:.5px;
    border-radius:4px;
  }
  .chip b{ font-family:'Press Start 2P',monospace; font-size:11px; color:var(--gold); }
  .chip .lbl{ color:var(--cyan); font-size:10px; }
  #muteBtn{
    position:absolute; top:10px; right:10px; z-index:30; pointer-events:auto; cursor:pointer;
    background:rgba(22,10,54,0.8); border:2px solid var(--magenta); box-shadow:3px 3px 0 var(--cyan);
    color:#fff; font-family:'Press Start 2P',monospace; font-size:12px; padding:8px 10px; border-radius:4px;
  }

  /* ===== 塔选择条 ===== */
  #shop{
    position:absolute; bottom:10px; left:50%; transform:translateX(-50%); z-index:20;
    display:flex; gap:10px; pointer-events:auto;
  }
  .tower-btn{
    background:rgba(22,10,54,0.82); border:2px solid var(--gold);
    box-shadow:4px 4px 0 var(--magenta); cursor:pointer;
    padding:8px 12px; border-radius:6px; text-align:center; min-width:96px;
    transition:transform .08s;
  }
  .tower-btn:active{ transform:translate(2px,2px); }
  .tower-btn.sel{ border-color:var(--cyan); box-shadow:4px 4px 0 var(--cyan); }
  .tower-btn .nm{ font-family:'Press Start 2P',monospace; font-size:9px; color:#fff; }
  .tower-btn .cost{ font-size:11px; color:var(--gold); margin-top:4px; }
  .tower-btn .desc{ font-size:9px; color:var(--cyan); margin-top:2px; }

  /* ===== 遮罩 ===== */
  .overlay{
    position:absolute; inset:0; z-index:40; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px;
    background:radial-gradient(ellipse at center, rgba(22,10,54,0.78), rgba(22,10,54,0.94));
    backdrop-filter:blur(2px);
  }
  .overlay.hidden{ display:none; }
  .title{
    font-family:'Press Start 2P',monospace; font-size:30px; line-height:1.5;
    color:var(--cyan); text-shadow:0 0 12px var(--cyan), 4px 4px 0 var(--pink);
    margin-bottom:18px;
  }
  .title .l2{ color:var(--pink); text-shadow:0 0 12px var(--pink), 4px 4px 0 var(--cyan); }
  .sub{ font-size:14px; max-width:560px; line-height:1.8; color:#ffe; margin-bottom:22px; }
  .sub .k{ color:var(--gold); font-weight:700; }
  .btn{
    font-family:'Press Start 2P',monospace; font-size:16px; color:var(--ink);
    background:var(--gold); border:none; box-shadow:5px 5px 0 var(--pink); cursor:pointer;
    padding:16px 28px; border-radius:6px; margin-top:6px;
    transition:transform .08s;
  }
  .btn:active{ transform:translate(3px,3px); box-shadow:2px 2px 0 var(--pink); }
  .hiscore{ margin-top:18px; font-size:12px; color:var(--gold); font-family:'Press Start 2P',monospace; }
  #endTitle{ font-size:26px; }
  #endStats{ font-size:14px; line-height:2; color:#ffe; margin:14px 0; }
  .demoTag{ position:absolute; top:54px; left:10px; z-index:25; font-family:'Press Start 2P',monospace;
    font-size:10px; color:var(--green); background:rgba(22,10,54,.7); border:2px solid var(--green);
    box-shadow:3px 3px 0 var(--pink); padding:6px 8px; border-radius:4px; display:none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="crt"></div>

  <div id="hud">
    <div class="chip"><span class="lbl">命 LIVES</span> <b id="hLives">20</b></div>
    <div class="chip"><span class="lbl">钱 $</span> <b id="hMoney">120</b></div>
    <div class="chip"><span class="lbl">波 WAVE</span> <b id="hWave">0</b></div>
    <div class="chip"><span class="lbl">分 SCORE</span> <b id="hScore">0</b></div>
  </div>
  <div class="demoTag" id="demoTag">AI DEMO</div>

  <button id="muteBtn">♪ ON</button>

  <div id="shop">
    <div class="tower-btn sel" data-t="0">
      <div class="nm">GUN</div><div class="cost">$50</div><div class="desc">单体·快射</div>
    </div>
    <div class="tower-btn" data-t="1">
      <div class="nm">BLAST</div><div class="cost">$90</div><div class="desc">范围·溅射</div>
    </div>
    <div class="tower-btn" data-t="2">
      <div class="nm">FROST</div><div class="cost">$70</div><div class="desc">减速·范围</div>
    </div>
  </div>

  <!-- 开始遮罩 -->
  <div class="overlay" id="startOverlay">
    <div class="title">NEON<br><span class="l2">DEFENSE</span></div>
    <div class="sub">
      合成波路径塔防。敌人沿霓虹之路涌向核心。<br>
      点击 <span class="k">空地</span> 放塔(先选下方塔种),塔自动索敌射击。<br>
      <span class="k">击杀得钱</span>,逐波增强,命归零即终结。<br>
      点已放置的塔可 <span class="k">升级 / 出售</span>。
    </div>
    <button class="btn" id="startBtn">▶ START</button>
    <div class="hiscore">HI-SCORE <span id="hiStart">0</span></div>
  </div>

  <!-- 结束遮罩 -->
  <div class="overlay hidden" id="endOverlay">
    <div class="title" id="endTitle">GAME OVER</div>
    <div id="endStats"></div>
    <button class="btn" id="restartBtn">↻ RETRY</button>
    <div class="hiscore">HI-SCORE <span id="hiEnd">0</span></div>
  </div>
</div>

<script>
/* =========================================================================
   NEON DEFENSE — 合成波 OutRun 路径塔防 (2D Canvas)
   单文件,无构建。requestAnimationFrame + delta time。注释中文。
   ========================================================================= */
(function(){
'use strict';

// ---------- URL 参数:demo / record ----------
const params = new URLSearchParams(location.search);
const DEMO   = params.has('demo') || params.has('record');
const RECORD = params.has('record') ? Math.max(1, parseInt(params.get('record'))||20) : 0;

// ---------- 霓虹调色板 ----------
const C = {
  pink:'#ff2e88', cyan:'#5ef0ff', magenta:'#ff5ec8', gold:'#ffd95e', green:'#5effa0',
  ink:'#160a36'
};

// ---------- Canvas 设置 ----------
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let W=0, H=0, DPR=1;
// 逻辑坐标系基准(路径按此坐标定义,绘制时缩放铺满)
const BASE_W = 1280, BASE_H = 720;
let scale=1, offX=0, offY=0; // 适配变换

function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  // 兜底:某些时刻(最小化/录制初始化)innerWidth/Height 可能为 0,
  // 若直接写入会把 canvas 尺寸设为 0,导致 captureStream 产出 0 帧(空 webm)。
  W = window.innerWidth || W || BASE_W;
  H = window.innerHeight || H || BASE_H;
  const nw = Math.max(1, Math.floor(W*DPR));
  const nh = Math.max(1, Math.floor(H*DPR));
  // 仅在尺寸真正变化时才重设 canvas.width/height —— 重设会清空画布并可能打断录制流。
  if(cv.width!==nw || cv.height!==nh){ cv.width=nw; cv.height=nh; }
  cv.style.width = W+'px'; cv.style.height = H+'px';
  // 保持 16:9 内容居中铺满(contain)
  scale = Math.min(W/BASE_W, H/BASE_H);
  offX = (W - BASE_W*scale)/2;
  offY = (H - BASE_H*scale)/2;
}
window.addEventListener('resize', resize);
resize();

// 屏幕坐标 -> 逻辑坐标
function toLogic(sx, sy){
  return { x:(sx-offX)/scale, y:(sy-offY)/scale };
}

// ====================================================================
//  路径定义 (蜿蜒折线,逻辑坐标)
// ====================================================================
const PATH = [
  {x:-40, y:140},{x:300,y:140},{x:300,y:430},{x:620,y:430},
  {x:620,y:120},{x:920,y:120},{x:920,y:560},{x:520,y:560},
  {x:520,y:680},{x:1100,y:680},{x:1100,y:300},{x:1340,y:300}
];
// 预计算每段长度与累计长度
let PATH_SEG=[], PATH_TOTAL=0;
(function buildPath(){
  PATH_SEG=[]; PATH_TOTAL=0;
  for(let i=0;i<PATH.length-1;i++){
    const a=PATH[i], b=PATH[i+1];
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy);
    PATH_SEG.push({a,b,len,nx:dx/len,ny:dy/len, start:PATH_TOTAL});
    PATH_TOTAL+=len;
  }
})();
// 距离 -> 坐标
function pathPos(dist){
  if(dist<=0) return {x:PATH[0].x,y:PATH[0].y};
  for(let i=0;i<PATH_SEG.length;i++){
    const s=PATH_SEG[i];
    if(dist <= s.start+s.len){
      const t=dist-s.start;
      return {x:s.a.x+s.nx*t, y:s.a.y+s.ny*t};
    }
  }
  const last=PATH[PATH.length-1]; return {x:last.x,y:last.y};
}

// 判断某逻辑点是否离路径太近(不能放塔)
function distToPath(px,py){
  let best=1e9;
  for(const s of PATH_SEG){
    // 点到线段距离
    const vx=s.b.x-s.a.x, vy=s.b.y-s.a.y;
    const wx=px-s.a.x, wy=py-s.a.y;
    let t=(wx*vx+wy*vy)/(vx*vx+vy*vy);
    t=Math.max(0,Math.min(1,t));
    const cx=s.a.x+vx*t, cy=s.a.y+vy*t;
    const d=Math.hypot(px-cx,py-cy);
    if(d<best) best=d;
  }
  return best;
}

// ====================================================================
//  Web Audio 程序化音效 + 合成波配乐
// ====================================================================
const Audio = (function(){
  let actx=null, master=null, musicGain=null, sfxGain=null;
  let muted=false, started=false;
  let musicTimer=null;

  function ensure(){
    if(actx) return;
    actx = new (window.AudioContext||window.webkitAudioContext)();
    master = actx.createGain(); master.gain.value=0.9; master.connect(actx.destination);
    musicGain = actx.createGain(); musicGain.gain.value=0.18; musicGain.connect(master);
    sfxGain = actx.createGain(); sfxGain.gain.value=0.5; sfxGain.connect(master);
  }
  function resume(){ ensure(); if(actx.state==='suspended') actx.resume(); }

  // 简单合成音
  function blip(freq, dur, type, gain, target){
    if(!actx||muted) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    g.gain.value=0; g.connect(target||sfxGain); o.connect(g);
    const t=actx.currentTime;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(gain||0.3,t+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }
  function shoot(){ blip(880,0.06,'square',0.16); }
  function blast(){
    blip(180,0.18,'sawtooth',0.25);
    blip(120,0.22,'triangle',0.2);
  }
  function frost(){ blip(1400,0.12,'sine',0.12); blip(1700,0.1,'sine',0.08); }
  function kill(){ blip(440,0.12,'square',0.2); setTimeout(()=>blip(660,0.1,'square',0.18),50); }
  function place(){ blip(523,0.08,'square',0.25); setTimeout(()=>blip(784,0.1,'square',0.22),60); }
  function upgrade(){ blip(523,0.08,'square',0.22); setTimeout(()=>blip(659,0.08,'square',0.22),70); setTimeout(()=>blip(988,0.12,'square',0.22),140); }
  function hurt(){ blip(140,0.25,'sawtooth',0.3); }
  function over(){ blip(220,0.4,'sawtooth',0.3); setTimeout(()=>blip(160,0.5,'sawtooth',0.3),180); setTimeout(()=>blip(110,0.7,'sawtooth',0.3),380); }
  function wave(){ blip(660,0.1,'square',0.2); setTimeout(()=>blip(880,0.12,'square',0.2),90); }

  // 合成波循环配乐:简单 bassline + arp
  const SCALE=[0,3,5,7,10]; // 小调五声
  const ROOT=110; // A2
  const BASS=[0,0,5,3]; // 和弦根音步进(半音)
  let step=0;
  function noteFreq(semi){ return ROOT*Math.pow(2,semi/12); }
  function tick(){
    if(!actx||muted){ return; }
    const t=actx.currentTime;
    const bar=Math.floor(step/8)%BASS.length;
    const base=BASS[bar];
    // bass
    if(step%2===0){
      const o=actx.createOscillator(), g=actx.createGain();
      o.type='sawtooth'; o.frequency.value=noteFreq(base);
      const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=600;
      g.gain.value=0; o.connect(f); f.connect(g); g.connect(musicGain);
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.5,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      o.start(t); o.stop(t+0.25);
    }
    // arp
    const semi = base+12 + SCALE[(step*1)%SCALE.length] + ((step%16<8)?12:0);
    const o2=actx.createOscillator(), g2=actx.createGain();
    o2.type='square'; o2.frequency.value=noteFreq(semi);
    g2.gain.value=0; o2.connect(g2); g2.connect(musicGain);
    g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.16,t+0.008);
    g2.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    o2.start(t); o2.stop(t+0.18);
    step++;
  }
  function startMusic(){
    if(musicTimer) return;
    ensure();
    musicTimer=setInterval(tick, 150); // ~100 BPM 16分
  }
  function setMuted(m){
    muted=m;
    if(master) master.gain.value = m?0:0.9;
  }
  return { resume, shoot, blast, frost, kill, place, upgrade, hurt, over, wave, startMusic, setMuted,
    get muted(){return muted;}, ensure };
})();

// ====================================================================
//  游戏状态
// ====================================================================
const TOWER_TYPES = [
  { // 0 GUN 单体快射
    name:'GUN', cost:50, color:C.cyan, accent:C.pink,
    range:170, dmg:9, fireRate:0.28, splash:0, slow:0, projColor:C.cyan, projSpeed:560,
    upRange:18, upDmg:7, upRate:0.92
  },
  { // 1 BLAST 范围溅射
    name:'BLAST', cost:90, color:C.gold, accent:C.magenta,
    range:150, dmg:14, fireRate:0.85, splash:62, slow:0, projColor:C.gold, projSpeed:380,
    upRange:14, upDmg:11, upRate:0.92
  },
  { // 2 FROST 减速范围
    name:'FROST', cost:70, color:C.magenta, accent:C.cyan,
    range:140, dmg:5, fireRate:0.6, splash:46, slow:0.45, slowDur:1.4, projColor:C.magenta, projSpeed:420,
    upRange:14, upDmg:4, upRate:0.9
  }
];

let game = null;
function newGame(){
  return {
    lives:20, money:120, score:0, wave:0,
    enemies:[], towers:[], projs:[], particles:[], floaters:[],
    selType:0,
    spawnQueue:[], spawnTimer:0, betweenWave:2.0, inWave:false,
    state:'menu', // menu / playing / over
    time:0, shake:0, flash:0,
    selectedTower:null
  };
}

// ---------- 敌人定义 ----------
function makeEnemy(wave, kind){
  // kind: 0 normal, 1 fast, 2 tank
  const base = 14 + wave*7 + wave*wave*0.6;
  let hp, spd, r, col, reward;
  if(kind===1){ hp=base*0.6; spd=110+wave*2.5; r=11; col=C.green; reward=6; }
  else if(kind===2){ hp=base*2.6; spd=42+wave*1.2; r=20; col=C.pink; reward=14; }
  else { hp=base; spd=66+wave*1.8; r=14; col=C.gold; reward=8; }
  return {
    dist:0, hp, maxHp:hp, spd, baseSpd:spd, r, col, reward, kind,
    slowT:0, slowF:0, dead:false, x:PATH[0].x, y:PATH[0].y, hitFlash:0
  };
}

// ---------- 构建一波的生成队列 ----------
function buildWave(wave){
  const q=[];
  const n = 6 + wave*2;
  for(let i=0;i<n;i++){
    let kind=0;
    const roll=Math.random();
    if(wave>=3 && roll<0.22) kind=2;       // tank
    else if(wave>=2 && roll<0.5) kind=1;   // fast
    q.push({ kind, delay: 0.55 - Math.min(0.3, wave*0.02) });
  }
  // boss-ish tank 每 5 波
  if(wave%5===0 && wave>0){
    for(let i=0;i<2;i++) q.push({kind:2, delay:0.8});
  }
  return q;
}

// ====================================================================
//  浮动文字 / 粒子
// ====================================================================
function addFloater(x,y,txt,col){
  game.floaters.push({x,y,txt,col,life:0.9,vy:-34});
}
function burst(x,y,col,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=(Math.random()*0.6+0.4)*(spd||120);
    game.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5+Math.random()*0.3,col,r:2+Math.random()*2});
  }
}

// ====================================================================
//  波次控制
// ====================================================================
function startNextWave(){
  game.wave++;
  game.spawnQueue = buildWave(game.wave);
  game.spawnTimer = 0;
  game.inWave = true;
  Audio.wave();
  updateHUD();
}

function maybeSpawn(dt){
  if(!game.inWave) {
    // 波间倒计时
    game.betweenWave -= dt;
    if(game.betweenWave<=0 && game.enemies.length===0){
      startNextWave();
    }
    return;
  }
  if(game.spawnQueue.length>0){
    game.spawnTimer -= dt;
    if(game.spawnTimer<=0){
      const item=game.spawnQueue.shift();
      game.enemies.push(makeEnemy(game.wave, item.kind));
      game.spawnTimer = item.delay;
    }
  } else if(game.enemies.length===0){
    // 本波清空
    game.inWave=false;
    game.betweenWave=2.4;
    // 波结束奖励
    const bonus = 18 + game.wave*4;
    game.money += bonus;
    addFloater(BASE_W/2, 60, '+$'+bonus+' WAVE CLEAR', C.green);
    updateHUD();
  }
}

// ====================================================================
//  更新
// ====================================================================
function update(dt){
  game.time += dt;
  if(game.shake>0) game.shake=Math.max(0,game.shake-dt*60);
  if(game.flash>0) game.flash=Math.max(0,game.flash-dt*2.5);

  maybeSpawn(dt);

  // --- 敌人 ---
  for(const e of game.enemies){
    if(e.dead) continue;
    if(e.hitFlash>0) e.hitFlash-=dt;
    // 减速
    let sp=e.baseSpd;
    if(e.slowT>0){ e.slowT-=dt; sp=e.baseSpd*(1-e.slowF); }
    e.dist += sp*dt;
    const p=pathPos(e.dist);
    e.x=p.x; e.y=p.y;
    if(e.dist>=PATH_TOTAL){
      // 到终点
      e.dead=true;
      game.lives--;
      game.shake=10; game.flash=0.7;
      Audio.hurt();
      addFloater(BASE_W-160, 80, '-1 LIFE', C.pink);
      if(game.lives<=0){ gameOver(); }
      updateHUD();
    }
  }
  game.enemies = game.enemies.filter(e=>!e.dead);

  // --- 塔索敌射击 ---
  for(const t of game.towers){
    t.cd-=dt;
    if(t.muzzle>0) t.muzzle-=dt;
    const tt=TOWER_TYPES[t.type];
    const rng=t.range;
    // 选目标:范围内 dist 最大(最靠近终点)
    let tgt=null, bestD=-1;
    for(const e of game.enemies){
      const d=Math.hypot(e.x-t.x,e.y-t.y);
      if(d<=rng && e.dist>bestD){ bestD=e.dist; tgt=e; }
    }
    t.target=tgt;
    if(tgt){
      // 转向
      const ang=Math.atan2(tgt.y-t.y,tgt.x-t.x);
      t.angle = ang;
      if(t.cd<=0){
        t.cd=t.fireRate;
        t.muzzle=0.08;
        // 发射子弹
        game.projs.push({
          x:t.x,y:t.y, tx:tgt.x,ty:tgt.y, target:tgt,
          spd:tt.projSpeed, dmg:t.dmg, splash:t.splash, slow:tt.slow||0, slowDur:tt.slowDur||0,
          col:tt.projColor, type:t.type, life:1.2, r: t.splash>0?5:3
        });
        if(t.type===0) Audio.shoot();
        else if(t.type===1) Audio.blast();
        else Audio.frost();
      }
    }
  }

  // --- 子弹 ---
  for(const pr of game.projs){
    pr.life-=dt;
    // 追踪目标(若目标还活着)
    let aimx=pr.tx, aimy=pr.ty;
    if(pr.target && !pr.target.dead){ aimx=pr.target.x; aimy=pr.target.y; }
    const dx=aimx-pr.x, dy=aimy-pr.y, d=Math.hypot(dx,dy);
    const step=pr.spd*dt;
    if(d<=step || pr.life<=0){
      // 命中
      pr.x=aimx; pr.y=aimy;
      explodeProj(pr);
      pr.dead=true;
    } else {
      pr.x+=dx/d*step; pr.y+=dy/d*step;
    }
  }
  game.projs = game.projs.filter(p=>!p.dead);

  // --- 粒子 ---
  for(const p of game.particles){
    p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92;
  }
  game.particles=game.particles.filter(p=>p.life>0);
  for(const f of game.floaters){ f.life-=dt; f.y+=f.vy*dt; }
  game.floaters=game.floaters.filter(f=>f.life>0);

  // --- AI demo ---
  if(DEMO) aiTick(dt);
}

// 子弹命中结算
function explodeProj(pr){
  const hitOne=(e)=>{
    if(e.dead) return;
    e.hp -= pr.dmg;
    e.hitFlash=0.12;
    if(pr.slow>0){ e.slowT=Math.max(e.slowT,pr.slowDur); e.slowF=pr.slow; }
    if(e.hp<=0){ killEnemy(e); }
  };
  if(pr.splash>0){
    burst(pr.x,pr.y, pr.col, 10, 160);
    for(const e of game.enemies){
      const d=Math.hypot(e.x-pr.x,e.y-pr.y);
      if(d<=pr.splash) hitOne(e);
    }
    game.shake=Math.max(game.shake, pr.type===1?4:2);
  } else {
    burst(pr.x,pr.y, pr.col, 4, 90);
    // 单体:命中最近敌人
    if(pr.target && !pr.target.dead && Math.hypot(pr.target.x-pr.x,pr.target.y-pr.y)<24){
      hitOne(pr.target);
    } else {
      let best=null,bd=22;
      for(const e of game.enemies){
        const d=Math.hypot(e.x-pr.x,e.y-pr.y); if(d<bd){bd=d;best=e;}
      }
      if(best) hitOne(best);
    }
  }
}

function killEnemy(e){
  if(e.dead) return;
  e.dead=true;
  game.money += e.reward;
  game.score += e.reward*2 + game.wave;
  addFloater(e.x,e.y,'+$'+e.reward, C.gold);
  burst(e.x,e.y, e.col, 16, 200);
  Audio.kill();
  updateHUD();
}

// ====================================================================
//  绘制
// ====================================================================
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);

  // 背景(日落渐变,逻辑无关,直接铺屏)
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#160a36'); g.addColorStop(0.30,'#3a1457');
  g.addColorStop(0.50,'#7a2a6e'); g.addColorStop(0.64,'#ff5e7e');
  g.addColorStop(0.72,'#ff9a4d'); g.addColorStop(0.721,'#160a36'); g.addColorStop(1,'#160a36');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // 进入逻辑坐标系
  ctx.save();
  // 屏震
  let sx=0,sy=0;
  if(game.shake>0){ sx=(Math.random()-0.5)*game.shake; sy=(Math.random()-0.5)*game.shake; }
  ctx.translate(offX+sx, offY+sy);
  ctx.scale(scale,scale);

  drawGrid();
  drawPath();
  drawTowerRanges();
  drawTowers();
  drawEnemies();
  drawProjs();
  drawParticles();
  drawFloaters();
  drawPlacePreview();

  ctx.restore();

  // 受击红闪
  if(game.flash>0){
    ctx.fillStyle='rgba(255,46,136,'+(game.flash*0.35)+')';
    ctx.fillRect(0,0,W,H);
  }
}

// 合成波地平线网格
function drawGrid(){
  ctx.save();
  ctx.strokeStyle='rgba(94,240,255,0.10)';
  ctx.lineWidth=1;
  for(let x=0;x<=BASE_W;x+=40){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,BASE_H); ctx.stroke();
  }
  for(let y=0;y<=BASE_H;y+=40){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(BASE_W,y); ctx.stroke();
  }
  ctx.restore();
}

function drawPath(){
  ctx.save();
  ctx.lineCap='round'; ctx.lineJoin='round';
  // 外发光底
  ctx.strokeStyle='rgba(255,46,136,0.25)';
  ctx.lineWidth=54;
  pathStroke();
  // 路面
  ctx.strokeStyle='rgba(22,10,54,0.85)';
  ctx.lineWidth=42;
  pathStroke();
  // 霓虹边
  ctx.strokeStyle=C.cyan; ctx.lineWidth=3;
  ctx.shadowColor=C.cyan; ctx.shadowBlur=10;
  pathStroke();
  ctx.shadowBlur=0;
  // 中线虚线流动
  ctx.strokeStyle=C.magenta; ctx.lineWidth=3;
  ctx.setLineDash([14,18]);
  ctx.lineDashOffset = -(game.time*60)%32;
  pathStroke();
  ctx.setLineDash([]);
  ctx.restore();

  // 起点/终点标记
  const s=PATH[0], en=PATH[PATH.length-1];
  drawMarker(s.x+30,s.y,C.green,'IN');
  drawMarker(en.x-30,en.y,C.pink,'CORE');
}
function pathStroke(){
  ctx.beginPath();
  ctx.moveTo(PATH[0].x,PATH[0].y);
  for(let i=1;i<PATH.length;i++) ctx.lineTo(PATH[i].x,PATH[i].y);
  ctx.stroke();
}
function drawMarker(x,y,col,txt){
  ctx.save();
  ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font='bold 13px Chakra Petch'; ctx.textAlign='center';
  ctx.fillText(txt,x,y-16);
  ctx.restore();
}

function drawTowerRanges(){
  // 仅画选中塔 / 放置预览的范围
  if(game.selectedTower){
    const t=game.selectedTower;
    ctx.save();
    ctx.strokeStyle='rgba(94,240,255,0.5)'; ctx.fillStyle='rgba(94,240,255,0.07)';
    ctx.lineWidth=2; ctx.setLineDash([6,6]);
    ctx.beginPath(); ctx.arc(t.x,t.y,t.range,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }
}

function drawTowers(){
  for(const t of game.towers){
    const tt=TOWER_TYPES[t.type];
    ctx.save();
    ctx.translate(t.x,t.y);
    // 底座
    ctx.fillStyle='rgba(22,10,54,0.9)';
    ctx.strokeStyle=tt.color; ctx.lineWidth=2.5;
    ctx.shadowColor=tt.color; ctx.shadowBlur=10;
    roundRect(-17,-17,34,34,6); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    // 等级点
    for(let i=0;i<t.level;i++){
      ctx.fillStyle=C.gold;
      ctx.beginPath(); ctx.arc(-12+i*7,-12,2.4,0,Math.PI*2); ctx.fill();
    }
    // 炮管(朝目标)
    ctx.rotate(t.angle);
    ctx.fillStyle=tt.accent;
    if(t.type===0){ // 单管
      roundRect(0,-4,22,8,3); ctx.fill();
    } else if(t.type===1){ // 粗炮
      roundRect(0,-7,18,14,4); ctx.fill();
    } else { // 双叉
      roundRect(0,-7,16,5,2); ctx.fill();
      roundRect(0,2,16,5,2); ctx.fill();
    }
    // 炮口闪光
    if(t.muzzle>0){
      ctx.fillStyle=C.gold; ctx.shadowColor=C.gold; ctx.shadowBlur=14;
      ctx.beginPath(); ctx.arc(t.type===1?20:24,0,5,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
    // 核心
    ctx.rotate(-t.angle);
    ctx.fillStyle=tt.color; ctx.shadowColor=tt.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

function drawEnemies(){
  for(const e of game.enemies){
    ctx.save();
    ctx.translate(e.x,e.y);
    const col = e.hitFlash>0 ? '#ffffff' : e.col;
    // 减速光环
    if(e.slowT>0){
      ctx.strokeStyle='rgba(94,240,255,0.7)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,e.r+5,0,Math.PI*2); ctx.stroke();
    }
    ctx.fillStyle=col; ctx.shadowColor=e.col; ctx.shadowBlur=12;
    if(e.kind===2){ // tank 方块
      roundRect(-e.r,-e.r,e.r*2,e.r*2,4); ctx.fill();
    } else if(e.kind===1){ // fast 三角
      ctx.beginPath(); ctx.moveTo(e.r,0); ctx.lineTo(-e.r*0.7,-e.r*0.8); ctx.lineTo(-e.r*0.7,e.r*0.8); ctx.closePath(); ctx.fill();
    } else { // normal 菱形
      ctx.beginPath(); ctx.moveTo(0,-e.r); ctx.lineTo(e.r,0); ctx.lineTo(0,e.r); ctx.lineTo(-e.r,0); ctx.closePath(); ctx.fill();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle=C.ink;
    ctx.beginPath(); ctx.arc(0,0,e.r*0.35,0,Math.PI*2); ctx.fill();
    // 血条
    const w=e.r*2.0, hp=Math.max(0,e.hp/e.maxHp);
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-w/2,-e.r-9,w,4);
    ctx.fillStyle = hp>0.5?C.green:(hp>0.25?C.gold:C.pink);
    ctx.fillRect(-w/2,-e.r-9,w*hp,4);
    ctx.restore();
  }
}

function drawProjs(){
  for(const pr of game.projs){
    ctx.save();
    ctx.fillStyle=pr.col; ctx.shadowColor=pr.col; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(pr.x,pr.y,pr.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawParticles(){
  for(const p of game.particles){
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life*1.6);
    ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawFloaters(){
  for(const f of game.floaters){
    ctx.save();
    ctx.globalAlpha=Math.max(0,Math.min(1,f.life*1.4));
    ctx.fillStyle=f.col; ctx.font="bold 16px 'Chakra Petch'"; ctx.textAlign='center';
    ctx.shadowColor=f.col; ctx.shadowBlur=6;
    ctx.fillText(f.txt,f.x,f.y);
    ctx.restore();
  }
}

// 放置预览
let mouseLogic={x:-999,y:-999};
function drawPlacePreview(){
  if(game.state!=='playing') return;
  if(game.selectedTower) return; // 选中已有塔时不画预览
  const tt=TOWER_TYPES[game.selType];
  const m=mouseLogic;
  if(m.x<-100) return;
  const ok = canPlaceAt(m.x,m.y) && game.money>=tt.cost;
  ctx.save();
  ctx.globalAlpha=0.8;
  ctx.strokeStyle = ok?tt.color:C.pink;
  ctx.fillStyle = ok?'rgba(94,240,255,0.06)':'rgba(255,46,136,0.10)';
  ctx.lineWidth=2; ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.arc(m.x,m.y,tt.range,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle=ok?tt.color:C.pink;
  roundRect(m.x-17,m.y-17,34,34,6); ctx.stroke();
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ====================================================================
//  放塔 / 升级 / 出售
// ====================================================================
function canPlaceAt(x,y){
  if(x<10||x>BASE_W-10||y<10||y>BASE_H-10) return false;
  if(distToPath(x,y) < 40) return false; // 离路太近
  for(const t of game.towers){
    if(Math.hypot(t.x-x,t.y-y)<38) return false; // 与已有塔重叠
  }
  return true;
}

function placeTower(x,y){
  const tt=TOWER_TYPES[game.selType];
  if(game.money<tt.cost) { addFloater(x,y,'NO $',C.pink); return false; }
  if(!canPlaceAt(x,y)) { return false; }
  game.money-=tt.cost;
  game.towers.push({
    type:game.selType, x,y, level:1,
    range:tt.range, dmg:tt.dmg, fireRate:tt.fireRate, splash:tt.splash||0,
    cd:0, angle:0, target:null, muzzle:0, invested:tt.cost
  });
  Audio.place();
  burst(x,y,tt.color,12,140);
  updateHUD();
  return true;
}

function towerAt(x,y){
  for(const t of game.towers){
    if(Math.hypot(t.x-x,t.y-y)<20) return t;
  }
  return null;
}

function upgradeCost(t){ return Math.round(TOWER_TYPES[t.type].cost*0.8*t.level); }

function upgradeTower(t){
  const cost=upgradeCost(t);
  if(game.money<cost){ addFloater(t.x,t.y,'NO $',C.pink); return; }
  if(t.level>=5){ addFloater(t.x,t.y,'MAX',C.gold); return; }
  const tt=TOWER_TYPES[t.type];
  game.money-=cost; t.invested+=cost; t.level++;
  t.range+=tt.upRange; t.dmg+=tt.upDmg; t.fireRate*=tt.upRate;
  Audio.upgrade();
  burst(t.x,t.y,C.gold,16,160);
  addFloater(t.x,t.y,'LVL '+t.level,C.gold);
  updateHUD();
}

function sellTower(t){
  const refund=Math.round(t.invested*0.6);
  game.money+=refund;
  game.towers=game.towers.filter(x=>x!==t);
  game.selectedTower=null;
  hideTowerPanel();
  addFloater(t.x,t.y,'+$'+refund,C.green);
  burst(t.x,t.y,C.magenta,10,120);
  updateHUD();
}

//  选中塔操作面板(动态创建)
// ====================================================================
let panel=null;
function showTowerPanel(t){
  game.selectedTower=t;
  if(!panel){
    panel=document.createElement('div');
    panel.style.cssText='position:absolute;z-index:25;display:flex;gap:6px;';
    document.getElementById('wrap').appendChild(panel);
  }
  panel.innerHTML='';
  const upC=upgradeCost(t);
  const mkBtn=(label,col,fn)=>{
    const b=document.createElement('button');
    b.textContent=label;
    b.style.cssText="font-family:'Press Start 2P',monospace;font-size:9px;color:#160a36;background:"+col+
      ";border:none;box-shadow:3px 3px 0 #ff2e88;cursor:pointer;padding:8px 10px;border-radius:4px;";
    b.onmousedown=(ev)=>{ev.stopPropagation();};
    b.ontouchstart=(ev)=>{ev.stopPropagation();};
    b.onclick=(ev)=>{ev.stopPropagation(); fn();};
    panel.appendChild(b);
  };
  if(t.level<5) mkBtn('UP $'+upC, C.gold, ()=>{ upgradeTower(t); if(panel) showTowerPanel(t); });
  else mkBtn('MAX', C.cyan, ()=>{});
  mkBtn('SELL $'+Math.round(t.invested*0.6), C.magenta, ()=>sellTower(t));
  // 定位:塔上方屏幕坐标
  const sx=offX+t.x*scale, sy=offY+t.y*scale;
  panel.style.left=(sx-50)+'px';
  panel.style.top=(sy-58)+'px';
  panel.style.display='flex';
}
function hideTowerPanel(){ if(panel) panel.style.display='none'; game.selectedTower=null; }

// ====================================================================
function onPointer(sx,sy){
  if(game.state!=='playing') return;
  const m=toLogic(sx,sy);
  // 先判断是否点到已有塔
  const t=towerAt(m.x,m.y);
  if(t){ showTowerPanel(t); return; }
  // 否则放塔(并关闭面板)
  hideTowerPanel();
  placeTower(m.x,m.y);
}

cv.addEventListener('mousemove',(e)=>{

});
cv.addEventListener('mousedown',(e)=>{

  onPointer(e.clientX,e.clientY);
});
cv.addEventListener('touchstart',(e)=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  mouseLogic=toLogic(t.clientX,t.clientY);

function startGame(){
  game=newGame();
  game.state='playing';
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('endOverlay').classList.add('hidden');
  selectShop(0);
  updateHUD();

  game.state='over';

  if(game.score>hi){ setHi(game.score); }
  document.getElementById('endTitle').textContent = 'GAME OVER';
  document.getElementById('endStats').innerHTML =
    'WAVE <span style="color:'+C.cyan+'">'+game.wave+'</span> &nbsp; '+
    'SCORE <span style="color:'+C.gold+'">'+game.score+'</span>';
  document.getElementById('hiEnd').textContent=getHi();

}

// ====================================================================
//  AI 自动演示
//  策略:优先保证有输出塔;按金钱选位放塔;闲钱升级关键塔。
// ====================================================================
let aiTimer=0;
function aiTick(dt){
  if(game.state!=='playing') return;
  aiTimer-=dt;
  if(aiTimer>0) return;
  aiTimer=0.5; // 每 0.5s 决策一次

  // 候选放塔点:沿路径采样,取其旁侧偏移点中可放置者
  // 评估:覆盖路径长度多的位置更优(简化为离路径合适距离)
  function findSpot(){
    let best=null, bestScore=-1;
    const samples=64;
    for(let i=0;i<samples;i++){
      const d=(i/samples)*PATH_TOTAL;
      const p=pathPos(d);
      // 法向两侧
      const p2=pathPos(Math.min(PATH_TOTAL,d+12));
      let nx=-(p2.y-p.y), ny=(p2.x-p.x);
      const nl=Math.hypot(nx,ny)||1; nx/=nl; ny/=nl;
      for(const side of [1,-1]){
        for(const off of [52,64,78]){
          const x=p.x+nx*side*off, y=p.y+ny*side*off;
          if(!canPlaceAt(x,y)) continue;
          // 评分:该点 range 内能覆盖到的路径采样数
          let cover=0;
          for(let j=0;j<samples;j++){
            const pp=pathPos((j/samples)*PATH_TOTAL);
            if(Math.hypot(pp.x-x,pp.y-y)<150) cover++;
          }
          // 倾向靠近后半段(更多火力机会),加随机扰动
          const score=cover + Math.random()*3;
          if(score>bestScore){ bestScore=score; best={x,y}; }
        }
      }
    }
    return best;
  }

  // 决策:优先放塔直到有 ~4 个,再交替放塔/升级
  const towerCount=game.towers.length;
  // 选塔种:混合搭配
  let want;
  if(towerCount===0) want=0;
  else if(game.towers.filter(t=>t.type===2).length===0 && towerCount>=2) want=2; // 来个减速
  else if(towerCount%3===1) want=1; // 范围
  else want= (Math.random()<0.5?0:1);
  game.selType=want;

  const cost=TOWER_TYPES[want].cost;

  // 如果钱多,优先升级已有最值得升级的塔
  const upgradable=game.towers.filter(t=>t.level<5);
  let didUpgrade=false;
  if(towerCount>=3 && upgradable.length>0){
    // 找最便宜可升级且我们钱足够(留点 buffer)
    upgradable.sort((a,b)=>upgradeCost(a)-upgradeCost(b));
    const cand=upgradable[0];
    const uc=upgradeCost(cand);
    if(game.money >= uc + 40 && Math.random()<0.55){
      upgradeTower(cand);
      didUpgrade=true;
    }
  }

  if(!didUpgrade && game.money>=cost){
    const spot=findSpot();
    if(spot){ placeTower(spot.x,spot.y); }
  }
}

// ====================================================================
//  主循环
// ====================================================================
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now;
  if(dt>0.05) dt=0.05; // 防卡顿跳变
  try{ if(game.state==='playing'){ update(dt); } }catch(e){ console.warn('update err',e); }
  try{ draw(); }catch(e){ console.warn('draw err',e); }
  requestAnimationFrame(loop);
}

// ====================================================================
//  录制 ?record=N
// ====================================================================
function startRecording(sec){
  try{
    const stream=cv.captureStream(30);
    if(!stream || stream.getVideoTracks().length===0){
      console.warn('record: no video track on stream'); return;
    }
    // 选一个受支持的编码
    let mt='video/webm;codecs=vp9';
    if(!MediaRecorder.isTypeSupported(mt)) mt='video/webm;codecs=vp8';
    if(!MediaRecorder.isTypeSupported(mt)) mt='video/webm';
    const mr=new MediaRecorder(stream,{mimeType:mt,videoBitsPerSecond:9000000});
    const chunks=[];
    mr.ondataavailable=e=>{ if(e.data && e.data.size) chunks.push(e.data); };
    mr.onstop=()=>{
      try{ stream.getTracks().forEach(t=>t.stop()); }catch(e){}
      const blob=new Blob(chunks,{type:'video/webm'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download='neon-defense.webm';
      document.body.appendChild(a); try{a.click()}catch(e){}
    };
    // 用 timeslice 让 dataavailable 周期性触发:即便 stop 时机异常,也已落盘多块数据,避免空文件。
    mr.start(250);
    setTimeout(()=>{ try{ if(mr.state!=='inactive') mr.stop(); }catch(e){} }, sec*1000);
  }catch(e){ console.warn('record failed',e); }
}

// ====================================================================
//  启动
// ====================================================================
game=newGame();
requestAnimationFrame(loop);

if(DEMO){
  // 免手势开局
  startGame();
  if(RECORD){
    // 稍等让画面进入状态再录;确保此刻 canvas 已有有效尺寸(否则流产出 0 帧)。
    setTimeout(function startRec(){
      if(cv.width<2 || cv.height<2){ resize(); setTimeout(startRec,100); return; }
      startRecording(RECORD);
    }, 800);
  }
}
})();
</script>
