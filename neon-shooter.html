<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEON SURVIVOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* 合成波 OutRun 风格 —— 全局基础 */
  :root{
    --pink:#ff2e88; --cyan:#5ef0ff; --magenta:#ff5ec8; --gold:#ffd95e; --green:#5effa0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0418;}
  body{
    /* 日落渐变背景 */
    background:linear-gradient(#160a36,#3a1457 30%,#7a2a6e 50%,#ff5e7e 64%,#ff9a4d 72%,#160a36 72%);
    font-family:'Chakra Petch',system-ui,'Microsoft YaHei',sans-serif;
    color:#fff; user-select:none; -webkit-user-select:none; touch-action:none;
  }
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas#game{display:block;background:transparent;image-rendering:auto;}

  /* CRT 极轻扫描线叠加 */
  #crt{position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,0.10) 3px,rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply;opacity:.55;}

  /* HUD */
  #hud{position:fixed;top:0;left:0;right:0;z-index:30;padding:14px 18px;
    display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}
  .stat{font-family:'Press Start 2P',monospace;font-size:13px;line-height:1.7;
    text-shadow:2px 2px 0 #000;}
  .stat .lab{color:var(--cyan);font-size:9px;}
  .stat .pink{color:var(--pink);}
  .stat .gold{color:var(--gold);}
  .stat .green{color:var(--green);}
  #hpbar{margin-top:6px;width:200px;max-width:42vw;height:14px;border:2px solid var(--cyan);
    box-shadow:3px 3px 0 var(--pink);background:rgba(0,0,0,.4);}
  #hpfill{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--pink));
    transition:width .12s linear;}
  #wavebadge{font-family:'Press Start 2P';font-size:10px;color:var(--gold);text-shadow:2px 2px 0 #000;margin-top:4px;}

  /* 静音按钮 */
  #mute{position:fixed;top:14px;right:14px;z-index:40;pointer-events:auto;cursor:pointer;
    font-family:'Press Start 2P';font-size:11px;color:var(--gold);background:rgba(20,6,40,.7);
    border:2px solid var(--gold);box-shadow:3px 3px 0 var(--pink);padding:8px 10px;}
  #mute:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--pink);}

  /* 遮罩(开始 / 结束) */
  .mask{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(ellipse at center,rgba(20,6,40,.78),rgba(5,2,14,.92));
    backdrop-filter:blur(2px);padding:20px;}
  .mask.hidden{display:none;}
  .title{font-family:'Press Start 2P';font-size:min(8vw,42px);line-height:1.35;
    color:var(--pink);text-shadow:0 0 14px var(--pink),4px 4px 0 var(--cyan);margin-bottom:10px;}
  .sub{font-family:'Chakra Petch';font-weight:600;font-size:clamp(13px,3.4vw,18px);
    color:var(--cyan);margin-bottom:6px;text-shadow:1px 1px 0 #000;}
  .hint{font-family:'Chakra Petch';font-size:clamp(11px,2.8vw,14px);color:#ffd9ec;
    opacity:.92;line-height:1.7;max-width:560px;margin-bottom:18px;}
  .btn{font-family:'Press Start 2P';font-size:clamp(12px,3.2vw,16px);cursor:pointer;
    color:#160a36;background:var(--gold);border:none;
    box-shadow:5px 5px 0 var(--pink);padding:16px 26px;letter-spacing:1px;}
  .btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--pink);}
  .best{font-family:'Press Start 2P';font-size:12px;color:var(--gold);margin-top:14px;text-shadow:2px 2px 0 #000;}
  .endline{font-family:'Press Start 2P';font-size:clamp(11px,3vw,15px);color:var(--green);
    margin:6px 0;text-shadow:2px 2px 0 #000;}
  .demoflag{position:fixed;bottom:10px;left:0;right:0;text-align:center;z-index:35;
    font-family:'Press Start 2P';font-size:10px;color:var(--gold);text-shadow:2px 2px 0 #000;
    pointer-events:none;opacity:.85;}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="crt"></div>

<div id="hud">
  <div class="stat">
    <div><span class="lab">SCORE</span><br><span class="gold" id="score">0</span></div>
    <div id="wavebadge">WAVE 1</div>
  </div>
  <div class="stat" style="text-align:right">
    <div><span class="lab">HP</span></div>
    <div id="hpbar"><div id="hpfill"></div></div>
    <div style="margin-top:6px"><span class="lab">BEST</span> <span class="green" id="besthud">0</span></div>
  </div>
</div>

<div id="mute">♪ ON</div>

<!-- 开始遮罩 -->
<div class="mask" id="startMask">
  <div class="title">NEON<br>SURVIVOR</div>
  <div class="sub">俯视双摇杆生存射击</div>
  <div class="hint">
    WASD / 方向键 移动 · 鼠标瞄准,点击或按住射击<br>
    移动端:左半屏摇杆移动,右半屏拖拽瞄准开火<br>
    一波波霓虹敌人涌入,击杀得分;被碰掉血,血量归零结束。<br>
    捡 <span style="color:var(--cyan)">▮加速</span> / <span style="color:var(--gold)">✸散射</span> 道具撑更久!
  </div>
  <button class="btn" id="startBtn">START ▶</button>
  <div class="best">BEST <span id="bestStart">0</span></div>
</div>

<!-- 结束遮罩 -->
<div class="mask hidden" id="overMask">
  <div class="title" style="color:var(--cyan);text-shadow:0 0 14px var(--cyan),4px 4px 0 var(--pink)">GAME<br>OVER</div>
  <div class="endline" id="endScore">SCORE 0</div>
  <div class="endline" id="endWave" style="color:var(--gold)">WAVE 1</div>
  <div class="endline" id="endBest">BEST 0</div>
  <button class="btn" id="againBtn" style="margin-top:18px">REPLAY ↻</button>
</div>

<div class="demoflag hidden" id="demoFlag">● AUTO DEMO</div>

<script>
/* ============================================================
   NEON SURVIVOR — 俯视双摇杆生存射击 (2D Canvas)
   合成波 OutRun 风格 · 单文件自包含
   ============================================================ */
(function(){
'use strict';

// ---------- URL 参数:?demo 自动演示 / ?record=N 录制 ----------
const PARAMS = new URLSearchParams(location.search);
const DEMO   = PARAMS.has('demo') || PARAMS.has('record');
const RECORD = PARAMS.has('record') ? Math.max(1, parseInt(PARAMS.get('record'),10)||15) : 0;

// ---------- 画布与自适应 ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

// ---------- 霓虹色板 ----------
const COL = { pink:'#ff2e88', cyan:'#5ef0ff', magenta:'#ff5ec8', gold:'#ffd95e', green:'#5effa0' };

// ---------- 工具 ----------
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
const TAU=Math.PI*2;

// ============================================================
//  音频:Web Audio 程序化音效 + 合成波循环配乐
// ============================================================
const Audio = (function(){
  let ctxA=null, master=null, musicGain=null, sfxGain=null, started=false, muted=false;
  let musicTimer=null, step=0;
  function init(){
    if(ctxA) return;
    try{ ctxA = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master = ctxA.createGain(); master.gain.value=0.9; master.connect(ctxA.destination);
    musicGain = ctxA.createGain(); musicGain.gain.value=0.18; musicGain.connect(master);
    sfxGain = ctxA.createGain(); sfxGain.gain.value=0.5; sfxGain.connect(master);
  }
  function resume(){ init(); if(ctxA && ctxA.state==='suspended') ctxA.resume(); }
  // 通用音 tone
  function tone(freq,dur,type,vol,bend){
    if(!ctxA||muted) return;
    const t=ctxA.currentTime;
    const o=ctxA.createOscillator(), g=ctxA.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
    if(bend) o.frequency.exponentialRampToValueAtTime(Math.max(20,freq*bend),t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol||0.3,t+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+dur+0.02);
  }
  function noise(dur,vol){
    if(!ctxA||muted) return;
    const t=ctxA.currentTime, n=Math.floor(ctxA.sampleRate*dur);
    const buf=ctxA.createBuffer(1,n,ctxA.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);
    const src=ctxA.createBufferSource(); src.buffer=buf;
    const g=ctxA.createGain(); g.gain.value=vol||0.3;
    src.connect(g); g.connect(sfxGain); src.start(t);
  }
  // 音效集合
  const sfx = {
    shoot(){ tone(720,0.08,'square',0.16,0.5); },
    hit(){ tone(300,0.07,'sawtooth',0.18,0.6); },
    kill(){ tone(180,0.18,'square',0.22,2.2); tone(90,0.2,'triangle',0.18,0.5); },
    hurt(){ tone(140,0.25,'sawtooth',0.3,0.4); noise(0.18,0.25); },
    pickup(){ tone(660,0.1,'triangle',0.25,1.6); tone(990,0.12,'triangle',0.2,1.5); },
    wave(){ tone(440,0.12,'square',0.22,1.5); tone(660,0.16,'square',0.2,1.5); },
    over(){ tone(330,0.5,'sawtooth',0.3,0.25); tone(220,0.7,'triangle',0.25,0.3); }
  };
  // 合成波 bass+arp 循环
  const bass=[55,55,82.4,73.4]; // A1 A1 E2 D2
  const arp=[440,554,659,880,659,554]; // A C# E A E C#
  function musicStep(){
    if(!ctxA||muted){ return; }
    const t=ctxA.currentTime;
    // bass
    const bf=bass[Math.floor(step/4)%bass.length];
    const bo=ctxA.createOscillator(), bg=ctxA.createGain();
    bo.type='sawtooth'; bo.frequency.value=bf;
    bg.gain.setValueAtTime(0.0001,t); bg.gain.exponentialRampToValueAtTime(0.5,t+0.02);
    bg.gain.exponentialRampToValueAtTime(0.0001,t+0.26);
    bo.connect(bg); bg.connect(musicGain); bo.start(t); bo.stop(t+0.3);
    // arp 每步
    const af=arp[step%arp.length];
    const ao=ctxA.createOscillator(), ag=ctxA.createGain();
    ao.type='square'; ao.frequency.value=af;
    ag.gain.setValueAtTime(0.0001,t); ag.gain.exponentialRampToValueAtTime(0.18,t+0.01);
    ag.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
    ao.connect(ag); ag.connect(musicGain); ao.start(t); ao.stop(t+0.2);
    step++;
  }
  function startMusic(){
    if(musicTimer) return;
    musicTimer=setInterval(musicStep, 200); // 300BPM 16分 ~ 节奏
  }
  function setMuted(m){ muted=m; if(master) master.gain.value = m?0:0.9; }
  return { resume, sfx, startMusic, setMuted, get muted(){return muted;}, get ctx(){return ctxA;} };
})();

// ============================================================
//  游戏状态
// ============================================================
const STATE = { MENU:0, PLAY:1, OVER:2 };
let state = STATE.MENU;

const player = {
  x:0,y:0, r:15, speed:230, hp:100, maxhp:100,
  aim:0,            // 瞄准角度
  fireCD:0, fireRate:0.14,
  inv:0,            // 受伤无敌时间
  // 道具状态
  speedT:0, scatterT:0,
  flash:0
};

let bullets=[], enemies=[], particles=[], pickups=[], floaters=[];
let score=0, wave=1, gameTime=0, spawnTimer=0, waveTimer=0, shake=0;
let best = parseInt(localStorage.getItem('neon_survivor_best')||'0',10)||0;

// 输入
const keys={};
let mouseX=0,mouseY=0, mouseDown=false;
let aimActive=false; // 是否有有效瞄准(鼠标移动过或触屏)

// 触屏摇杆
const moveStick={active:false,id:-1,bx:0,by:0,x:0,y:0};
const aimStick ={active:false,id:-1,bx:0,by:0,x:0,y:0};

// ---------- UI 引用 ----------
const elScore=document.getElementById('score');
const elBestHud=document.getElementById('besthud');
const elHpfill=document.getElementById('hpfill');
const elWave=document.getElementById('wavebadge');
const startMask=document.getElementById('startMask');
const overMask=document.getElementById('overMask');
const muteBtn=document.getElementById('mute');
const demoFlag=document.getElementById('demoFlag');
document.getElementById('bestStart').textContent=best;
elBestHud.textContent=best;

// ============================================================
//  开始 / 重开
// ============================================================
function startGame(){
  Audio.resume(); Audio.startMusic();
  state=STATE.PLAY;
  startMask.classList.add('hidden');
  overMask.classList.add('hidden');
  player.x=W/2; player.y=H/2; player.hp=player.maxhp;
  player.speedT=0; player.scatterT=0; player.inv=0; player.fireCD=0; player.flash=0;
  bullets=[]; enemies=[]; particles=[]; pickups=[]; floaters=[];
  score=0; wave=1; gameTime=0; spawnTimer=0; waveTimer=0; shake=0;
  updateHUD();
  Audio.sfx.wave();
}
function gameOver(){
  state=STATE.OVER;
  Audio.sfx.over();
  if(score>best){ best=score; localStorage.setItem('neon_survivor_best',String(best)); }
  document.getElementById('endScore').textContent='SCORE '+score;
  document.getElementById('endWave').textContent='WAVE '+wave;
  document.getElementById('endBest').textContent='BEST '+best;
  elBestHud.textContent=best;
  overMask.classList.remove('hidden');
  // DEMO 模式:短暂展示结算后自动重开,保证自动演示/录制持续有内容
  if(DEMO){ setTimeout(()=>{ if(state===STATE.OVER) startGame(); }, 1500); }
}

// ============================================================
//  敌人生成 —— 数量/速度随时间递增
// ============================================================
function enemyType(){
  // 随波次解锁更强敌人
  const r=Math.random();
  if(wave>=4 && r<0.18) return 'tank';   // 慢血厚
  if(wave>=2 && r<0.45) return 'fast';   // 快脆
  return 'grunt';
}
function spawnEnemy(){
  const t=enemyType();
  // 从四周边缘外生成
  const side=Math.floor(rand(0,4));
  let x,y;
  if(side===0){x=rand(0,W);y=-30;}
  else if(side===1){x=W+30;y=rand(0,H);}
  else if(side===2){x=rand(0,W);y=H+30;}
  else{x=-30;y=rand(0,H);}
  const speedBoost=1+gameTime*0.012; // 速度随时间增长
  let e={x,y,vx:0,vy:0,type:t,hitFlash:0};
  if(t==='grunt'){ e.r=15; e.speed=58*speedBoost; e.hp=2; e.maxhp=2; e.col=COL.pink; e.score=10; }
  else if(t==='fast'){ e.r=11; e.speed=108*speedBoost; e.hp=1; e.maxhp=1; e.col=COL.cyan; e.score=15; }
  else { e.r=24; e.speed=38*speedBoost; e.hp=6; e.maxhp=6; e.col=COL.magenta; e.score=30; }
  enemies.push(e);
}

// ============================================================
//  射击
// ============================================================
function fire(){
  const scatter = player.scatterT>0;
  const spreads = scatter ? [-0.22,-0.11,0,0.11,0.22] : [0];
  for(const s of spreads){
    const a=player.aim+s + (scatter?0:rand(-0.02,0.02));
    bullets.push({
      x:player.x+Math.cos(a)*player.r, y:player.y+Math.sin(a)*player.r,
      vx:Math.cos(a)*640, vy:Math.sin(a)*640, r:5, life:1.1, col:COL.gold
    });
  }
  // 枪口火花
  for(let i=0;i<4;i++){
    const a=player.aim+rand(-0.4,0.4);
    particles.push({x:player.x+Math.cos(player.aim)*player.r,y:player.y+Math.sin(player.aim)*player.r,
      vx:Math.cos(a)*rand(80,200),vy:Math.sin(a)*rand(80,200),life:rand(0.1,0.25),max:0.25,r:rand(1,3),col:COL.gold});
  }
  Audio.sfx.shoot();
  shake=Math.min(shake+1.5,8);
}

// ---------- 粒子爆炸 ----------
function explode(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=rand(0,TAU), sp=rand(40,300);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rand(0.25,0.6),max:0.6,r:rand(1.5,4),col});
  }
}
function floater(x,y,txt,col){
  floaters.push({x,y,txt,col,life:0.9,max:0.9});
}

// ============================================================
//  道具
// ============================================================
function maybeDropPickup(x,y){
  if(Math.random()<0.12){
    const speed=Math.random()<0.5;
    pickups.push({x,y,r:13,type:speed?'speed':'scatter',
      col:speed?COL.cyan:COL.gold,life:9,bob:rand(0,TAU)});
  }
}

// ============================================================
//  DEMO AI —— 自动朝最近敌人开火 + 走位躲避密集敌群
// ============================================================
function demoAI(dt){
  // 1) 找最近敌人用于瞄准
  let near=null, nd=Infinity;
  for(const e of enemies){
    const d=dist2(player.x,player.y,e.x,e.y);
    if(d<nd){nd=d;near=e;}
  }
  if(near){
    // 预瞄:简单提前量
    const lead=0.12;
    const tx=near.x+near.vx*lead, ty=near.y+near.vy*lead;
    player.aim=Math.atan2(ty-player.y,tx-player.x);
    aimActive=true;
    mouseDown=true; // 持续开火
  } else {
    mouseDown=false;
  }
  // 2) 走位:计算"威胁向量"= 远离附近敌群的加权方向 + 拾取吸引 + 居中
  let fx=0, fy=0;
  for(const e of enemies){
    const dx=player.x-e.x, dy=player.y-e.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    if(d<260){
      const w=(260-d)/260; // 越近威胁越大
      fx+=(dx/d)*w*(e.type==='tank'?1.4:1);
      fy+=(dy/d)*w*(e.type==='tank'?1.4:1);
    }
  }
  // 拾取吸引
  let pk=null,pd=Infinity;
  for(const p of pickups){const d=dist2(player.x,player.y,p.x,p.y);if(d<pd){pd=d;pk=p;}}
  if(pk && pd<70000){ const dx=pk.x-player.x,dy=pk.y-player.y,d=Math.sqrt(dx*dx+dy*dy)||1; fx+=dx/d*0.6; fy+=dy/d*0.6; }
  // 边界回中(避免贴边被围)
  const cx=W/2, cy=H/2, margin=90;
  if(player.x<margin) fx+=0.8; if(player.x>W-margin) fx-=0.8;
  if(player.y<margin) fy+=0.8; if(player.y>H-margin) fy-=0.8;
  // 转成键位等效:写入虚拟方向
  demoMove.x=fx; demoMove.y=fy;
}
const demoMove={x:0,y:0};

// ============================================================
//  更新
// ============================================================
function update(dt){
  gameTime+=dt;

  // ---- 玩家移动方向 ----
  let mx=0,my=0;
  if(DEMO){
    demoAI(dt);
    mx=demoMove.x; my=demoMove.y;
  } else {
    if(keys['w']||keys['arrowup'])    my-=1;
    if(keys['s']||keys['arrowdown'])  my+=1;
    if(keys['a']||keys['arrowleft'])  mx-=1;
    if(keys['d']||keys['arrowright']) mx+=1;
    if(moveStick.active){ mx+=moveStick.x; my+=moveStick.y; }
  }
  const ml=Math.hypot(mx,my);
  if(ml>0.001){ mx/=ml; my/=ml; if(ml<1 && (moveStick.active||DEMO)){mx*=Math.min(ml,1);my*=Math.min(ml,1);} }
  const sp=player.speed*(player.speedT>0?1.7:1);
  player.x=clamp(player.x+mx*sp*dt, player.r, W-player.r);
  player.y=clamp(player.y+my*sp*dt, player.r, H-player.r);

  // ---- 瞄准(非 demo)----
  if(!DEMO){
    if(aimStick.active){
      const al=Math.hypot(aimStick.x,aimStick.y);
      if(al>0.1){ player.aim=Math.atan2(aimStick.y,aimStick.x); aimActive=true; }
    } else if(aimActive){
      player.aim=Math.atan2(mouseY-player.y, mouseX-player.x);
    }
  }

  // ---- 射击 ----
  player.fireCD-=dt;
  const wantFire = DEMO ? mouseDown : (mouseDown||aimStick.active);
  const rate = player.scatterT>0 ? player.fireRate*1.25 : player.fireRate;
  if(wantFire && aimActive && player.fireCD<=0){
    fire();
    player.fireCD=rate;
  }

  // ---- 道具计时 ----
  if(player.speedT>0) player.speedT-=dt;
  if(player.scatterT>0) player.scatterT-=dt;
  if(player.inv>0) player.inv-=dt;
  if(player.flash>0) player.flash-=dt;

  // ---- 难度:生成节奏随时间加快 ----
  spawnTimer-=dt;
  const spawnInterval = Math.max(0.28, 1.25 - gameTime*0.02 - wave*0.04);
  if(spawnTimer<=0){
    const burst = 1 + Math.floor(wave/3);
    for(let i=0;i<burst;i++) spawnEnemy();
    spawnTimer=spawnInterval;
  }
  // 波次推进(每 18 秒 +1 波)
  waveTimer+=dt;
  if(waveTimer>=18){ waveTimer=0; wave++; Audio.sfx.wave();
    floater(player.x,player.y-40,'WAVE '+wave,COL.gold); }

  // ---- 子弹 ----
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if(b.life<=0||b.x<-40||b.x>W+40||b.y<-40||b.y>H+40){ bullets.splice(i,1); continue; }
    // 与敌人圆碰撞
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      const rr=(b.r+e.r);
      if(dist2(b.x,b.y,e.x,e.y) < rr*rr){
        e.hp--; e.hitFlash=0.1;
        explode(b.x,b.y,e.col,5);
        bullets.splice(i,1);
        Audio.sfx.hit();
        if(e.hp<=0){
          score+=e.score; updateHUD();
          explode(e.x,e.y,e.col,18);
          floater(e.x,e.y,'+'+e.score,COL.green);
          maybeDropPickup(e.x,e.y);
          enemies.splice(j,1);
          Audio.sfx.kill();
          shake=Math.min(shake+2,10);
        }
        break;
      }
    }
  }

  // ---- 敌人:冲向玩家 ----
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const ang=Math.atan2(player.y-e.y, player.x-e.x);
    e.vx=Math.cos(ang)*e.speed; e.vy=Math.sin(ang)*e.speed;
    e.x+=e.vx*dt; e.y+=e.vy*dt;
    if(e.hitFlash>0) e.hitFlash-=dt;
    // 与玩家圆碰撞 -> 掉血
    const rr=(e.r+player.r);
    if(dist2(e.x,e.y,player.x,player.y) < rr*rr){
      if(player.inv<=0){
        const dmg = e.type==='tank'?20:(e.type==='fast'?8:12);
        player.hp-=dmg; player.inv=0.6; player.flash=0.25;
        Audio.sfx.hurt();
        explode(player.x,player.y,COL.pink,12);
        shake=Math.min(shake+5,14);
        updateHUD();
        if(player.hp<=0){ player.hp=0; updateHUD(); gameOver(); return; }
      }
      // 击退敌人少许,避免黏连
      e.x-=Math.cos(ang)*8; e.y-=Math.sin(ang)*8;
    }
  }

  // ---- 道具 ----
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i]; p.life-=dt; p.bob+=dt*4;
    if(p.life<=0){ pickups.splice(i,1); continue; }
    const rr=(p.r+player.r);
    if(dist2(p.x,p.y,player.x,player.y)<rr*rr){
      if(p.type==='speed'){ player.speedT=6; floater(player.x,player.y-30,'SPEED!',COL.cyan); }
      else { player.scatterT=7; floater(player.x,player.y-30,'SCATTER!',COL.gold); }
      Audio.sfx.pickup();
      explode(p.x,p.y,p.col,14);
      pickups.splice(i,1);
    }
  }

  // ---- 粒子 / 浮字 ----
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt;
    if(p.life<=0){ particles.splice(i,1); continue; }
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.94; p.vy*=0.94;
  }
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i]; f.life-=dt; f.y-=30*dt;
    if(f.life<=0) floaters.splice(i,1);
  }

  if(shake>0) shake=Math.max(0,shake-dt*30);
}

function updateHUD(){
  elScore.textContent=score;
  elHpfill.style.width=clamp(player.hp/player.maxhp*100,0,100)+'%';
  elWave.textContent='WAVE '+wave;
  elBestHud.textContent=Math.max(best,score);
}

// ============================================================
//  渲染
// ============================================================
function drawGrid(){
  // 合成波透视网格地面(下半屏)
  ctx.save();
  ctx.strokeStyle='rgba(94,240,255,0.18)';
  ctx.lineWidth=1;
  const horizon=H*0.5;
  const t=gameTime*40;
  // 竖线汇聚
  ctx.beginPath();
  for(let i=-10;i<=10;i++){
    const fx=W/2 + i*(W/10);
    ctx.moveTo(W/2,horizon); ctx.lineTo(fx, H);
  }
  ctx.stroke();
  // 横线(随时间向下滚)
  ctx.beginPath();
  for(let k=0;k<14;k++){
    let yy=horizon + ((k*42 + t)% (H-horizon));
    const p=(yy-horizon)/(H-horizon);
    ctx.globalAlpha=0.06+p*0.18;
    ctx.moveTo(0,yy); ctx.lineTo(W,yy);
  }
  ctx.stroke();
  ctx.globalAlpha=1;
  // 远处太阳光晕
  const sun=ctx.createRadialGradient(W/2,horizon-20,10,W/2,horizon-20,Math.max(W,H)*0.32);
  sun.addColorStop(0,'rgba(255,158,77,0.35)');
  sun.addColorStop(0.5,'rgba(255,94,126,0.12)');
  sun.addColorStop(1,'rgba(255,94,126,0)');
  ctx.fillStyle=sun; ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function neonCircle(x,y,r,col,glow){
  ctx.save();
  ctx.shadowColor=col; ctx.shadowBlur=glow||14;
  ctx.strokeStyle=col; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.stroke();
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,W,H);
  // 屏幕震动
  ctx.save();
  if(shake>0){ ctx.translate(rand(-shake,shake),rand(-shake,shake)); }

  drawGrid();

  // 粒子(底层)
  for(const p of particles){
    const a=clamp(p.life/(p.max||0.6),0,1);
    ctx.save(); ctx.globalAlpha=a; ctx.shadowColor=p.col; ctx.shadowBlur=8;
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,TAU); ctx.fill();
    ctx.restore();
  }

  // 道具
  for(const p of pickups){
    const pulse=1+Math.sin(p.bob)*0.12;
    ctx.save();
    ctx.globalAlpha = p.life<2 ? (0.4+0.6*Math.abs(Math.sin(p.life*10))) : 1;
    ctx.shadowColor=p.col; ctx.shadowBlur=18;
    ctx.strokeStyle=p.col; ctx.lineWidth=3;
    ctx.translate(p.x,p.y); ctx.scale(pulse,pulse);
    ctx.beginPath();
    // 菱形外框
    ctx.moveTo(0,-p.r); ctx.lineTo(p.r,0); ctx.lineTo(0,p.r); ctx.lineTo(-p.r,0); ctx.closePath(); ctx.stroke();
    ctx.fillStyle=p.col; ctx.font='bold 14px "Chakra Petch"'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.type==='speed'?'»':'✸',0,1);
    ctx.restore();
  }

  // 子弹
  for(const b of bullets){
    ctx.save(); ctx.shadowColor=b.col; ctx.shadowBlur=12;
    ctx.fillStyle=b.col; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,TAU); ctx.fill();
    // 拖尾
    ctx.globalAlpha=0.4; ctx.beginPath();
    ctx.arc(b.x-b.vx*0.012,b.y-b.vy*0.012,b.r*0.6,0,TAU); ctx.fill();
    ctx.restore();
  }

  // 敌人
  for(const e of enemies){
    const col = e.hitFlash>0 ? '#ffffff' : e.col;
    neonCircle(e.x,e.y,e.r,col,16);
    // 内部图案区分类型
    ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.shadowColor=col; ctx.shadowBlur=8;
    if(e.type==='grunt'){ ctx.beginPath(); ctx.arc(e.x,e.y,e.r*0.45,0,TAU); ctx.stroke(); }
    else if(e.type==='fast'){ // 三角
      ctx.beginPath();
      for(let k=0;k<3;k++){const a=-Math.PI/2+k*TAU/3; ctx[k?'lineTo':'moveTo'](e.x+Math.cos(a)*e.r*0.5,e.y+Math.sin(a)*e.r*0.5);}
      ctx.closePath(); ctx.stroke();
    } else { // tank 方块
      ctx.strokeRect(e.x-e.r*0.4,e.y-e.r*0.4,e.r*0.8,e.r*0.8);
      // 血条
      ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2,4);
      ctx.fillStyle=COL.green; ctx.fillRect(e.x-e.r,e.y-e.r-8,e.r*2*(e.hp/e.maxhp),4);
    }
    ctx.restore();
  }

  // 玩家
  drawPlayer();

  // 浮动文字
  for(const f of floaters){
    const a=clamp(f.life/f.max,0,1);
    ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=f.col;
    ctx.shadowColor='#000'; ctx.shadowBlur=0;
    ctx.font='bold 16px "Press Start 2P", monospace'; ctx.textAlign='center';
    ctx.fillText(f.txt,f.x,f.y);
    ctx.restore();
  }

  ctx.restore();

  // 触屏摇杆可视化
  drawSticks();
}

function drawPlayer(){
  const x=player.x,y=player.y;
  const flashing = player.inv>0 && Math.floor(gameTime*20)%2===0;
  ctx.save();
  if(flashing) ctx.globalAlpha=0.4;
  // 身体
  const body = player.flash>0 ? '#ffffff' : COL.cyan;
  neonCircle(x,y,player.r, body, 18);
  // 加速时拖影
  if(player.speedT>0){
    ctx.globalAlpha=(ctx.globalAlpha)*0.4;
    neonCircle(x,y,player.r+5,COL.green,20);
    ctx.globalAlpha=flashing?0.4:1;
  }
  // 炮管
  ctx.save();
  ctx.translate(x,y); ctx.rotate(player.aim);
  ctx.shadowColor=COL.gold; ctx.shadowBlur=12;
  ctx.fillStyle=COL.gold;
  ctx.fillRect(player.r-2, -4, 18, 8);
  ctx.restore();
  // 中心点
  ctx.fillStyle=body; ctx.shadowColor=body; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(x,y,4,0,TAU); ctx.fill();
  ctx.restore();
}

function drawSticks(){
  if(!('ontouchstart' in window)) return;
  ctx.save();
  if(moveStick.active){
    ctx.globalAlpha=0.35; ctx.strokeStyle=COL.cyan; ctx.lineWidth=3; ctx.shadowColor=COL.cyan; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(moveStick.bx,moveStick.by,52,0,TAU); ctx.stroke();
    ctx.globalAlpha=0.6; ctx.fillStyle=COL.cyan;
    ctx.beginPath(); ctx.arc(moveStick.bx+moveStick.x*40,moveStick.by+moveStick.y*40,22,0,TAU); ctx.fill();
  }
  if(aimStick.active){
    ctx.globalAlpha=0.35; ctx.strokeStyle=COL.gold; ctx.lineWidth=3; ctx.shadowColor=COL.gold; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(aimStick.bx,aimStick.by,52,0,TAU); ctx.stroke();
    ctx.globalAlpha=0.6; ctx.fillStyle=COL.gold;
    ctx.beginPath(); ctx.arc(aimStick.bx+aimStick.x*40,aimStick.by+aimStick.y*40,22,0,TAU); ctx.fill();
  }
  ctx.restore();
}

// ============================================================
//  主循环 requestAnimationFrame + delta time
// ============================================================
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now;
  if(dt>0.05) dt=0.05; // 防卡顿跳变
  if(state===STATE.PLAY) update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ============================================================
//  输入事件
// ============================================================
// 键盘
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(state!==STATE.PLAY && (k===' '||k==='enter')){
    if(state===STATE.MENU) startGame(); else startGame();
  }
});
window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

// 鼠标
canvas.addEventListener('mousemove',e=>{ mouseX=e.clientX; mouseY=e.clientY; aimActive=true; });
canvas.addEventListener('mousedown',e=>{ mouseDown=true; mouseX=e.clientX; mouseY=e.clientY; aimActive=true; });
window.addEventListener('mouseup',()=>{ mouseDown=false; });

// 触屏:左半屏移动摇杆,右半屏瞄准射击
function touchStart(e){
  for(const t of e.changedTouches){
    if(t.clientX < W/2 && !moveStick.active){
      moveStick.active=true; moveStick.id=t.identifier; moveStick.bx=t.clientX; moveStick.by=t.clientY; moveStick.x=0; moveStick.y=0;
    } else if(t.clientX>=W/2 && !aimStick.active){
      aimStick.active=true; aimStick.id=t.identifier; aimStick.bx=t.clientX; aimStick.by=t.clientY; aimStick.x=0; aimStick.y=0;
      aimActive=true;
    }
  }
  e.preventDefault();
}
function touchMove(e){
  for(const t of e.changedTouches){
    if(t.identifier===moveStick.id){
      let dx=t.clientX-moveStick.bx, dy=t.clientY-moveStick.by;
      const d=Math.hypot(dx,dy), max=52;
      if(d>max){dx=dx/d*max;dy=dy/d*max;}
      moveStick.x=dx/max; moveStick.y=dy/max;
    } else if(t.identifier===aimStick.id){
      let dx=t.clientX-aimStick.bx, dy=t.clientY-aimStick.by;
      const d=Math.hypot(dx,dy), max=52;
      if(d>max){dx=dx/d*max;dy=dy/d*max;}
      aimStick.x=dx/max; aimStick.y=dy/max;
    }
  }
  e.preventDefault();
}
function touchEnd(e){
  for(const t of e.changedTouches){
    if(t.identifier===moveStick.id){ moveStick.active=false; moveStick.id=-1; moveStick.x=0; moveStick.y=0; }
    if(t.identifier===aimStick.id){ aimStick.active=false; aimStick.id=-1; aimStick.x=0; aimStick.y=0; }
  }
  e.preventDefault();
}
canvas.addEventListener('touchstart',touchStart,{passive:false});
canvas.addEventListener('touchmove',touchMove,{passive:false});
canvas.addEventListener('touchend',touchEnd,{passive:false});
canvas.addEventListener('touchcancel',touchEnd,{passive:false});

// 按钮
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',startGame);
muteBtn.addEventListener('click',()=>{
  const m=!Audio.muted; Audio.setMuted(m);
  muteBtn.textContent = m ? '♪ OFF' : '♪ ON';
  muteBtn.style.opacity = m ? 0.6 : 1;
});

// ============================================================
//  DEMO / RECORD 自动启动
// ============================================================
function startRecording(){
  try{
    const stream = canvas.captureStream(30);
    let mt='video/webm;codecs=vp9';
    if(!MediaRecorder.isTypeSupported(mt)) mt='video/webm';
    const mr=new MediaRecorder(stream,{mimeType:mt,videoBitsPerSecond:9000000});
    const chunks=[];
    mr.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
    mr.onstop=()=>{
      const blob=new Blob(chunks,{type:'video/webm'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download='neon-shooter.webm';
      document.body.appendChild(a); try{a.click()}catch(e){}
    };
    mr.start(); setTimeout(()=>mr.stop(), RECORD*1000);
  }catch(e){ console.warn('record failed',e); }
}

if(DEMO){
  demoFlag.classList.remove('hidden');
  // 免手势直接开局(音频可能挂起,画面正常)
  try{ Audio.setMuted(true); muteBtn.textContent='♪ OFF'; muteBtn.style.opacity=0.6; }catch(e){}
  startGame();
  if(RECORD){
    // 稍等画面稳定再录制
    setTimeout(startRecording, 400);
  }
}

})();
</script>
