<!DOCTYPE html>
<html lang="zh-CN">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  /* ============ 合成波 OutRun 全局风格 ============ */
  :root{
    --pink:#ff2e88; --cyan:#5ef0ff; --magenta:#ff5ec8;
    --gold:#ffd95e; --green:#5effa0; --bg0:#1a0633; --bg1:#3a0d5c;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0418;}
  body{
    font-family:'Chakra Petch','Microsoft YaHei',sans-serif;
    color:#fff;-webkit-user-select:none;user-select:none;
    touch-action:none;
  }
  #app{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}

  /* CRT 极轻扫描线叠加 */
  #crt{position:fixed;inset:0;pointer-events:none;z-index:30;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.10) 0px,rgba(0,0,0,0.10) 1px,transparent 2px,transparent 3px);
    mix-blend-mode:multiply;opacity:.5;}

  /* ============ HUD ============ */
  #hud{position:fixed;top:0;left:0;right:0;z-index:20;padding:12px 16px;
    display:flex;justify-content:space-between;align-items:flex-start;
    pointer-events:none;text-shadow:0 0 8px currentColor;}
  .hud-box{font-family:'Press Start 2P',monospace;font-size:12px;line-height:1.8;}
  #hudL{color:var(--cyan);}
  #hudR{color:var(--gold);text-align:right;}
  #hudCenter{color:var(--green);text-align:center;flex:1;}
  .lbl{font-family:'Chakra Petch';font-size:10px;opacity:.7;letter-spacing:2px;}

  /* 静音按钮 */
  #muteBtn{position:fixed;top:12px;left:50%;transform:translateX(-50%);
    z-index:25;pointer-events:auto;cursor:pointer;
    background:rgba(26,6,51,.7);border:2px solid var(--magenta);
    color:var(--magenta);font-family:'Press Start 2P';font-size:11px;
    padding:8px 10px;border-radius:6px;text-shadow:0 0 6px var(--magenta);
    box-shadow:0 0 12px rgba(255,94,200,.5);}
  #muteBtn:active{transform:translateX(-50%) scale(.94);}

  /* ============ 遮罩 ============ */
  .mask{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(ellipse at 50% 120%,#3a0d5c 0%,#1a0633 45%,#0a0418 100%);
    padding:24px;}
  .mask.hidden{display:none;}
  .title{font-family:'Press Start 2P';font-size:clamp(20px,6vw,44px);
    color:var(--pink);text-shadow:0 0 12px var(--pink),0 0 26px var(--magenta),4px 4px 0 #000;
    line-height:1.4;margin-bottom:6px;}
  .subtitle{font-family:'Press Start 2P';font-size:clamp(10px,2.6vw,16px);
    color:var(--cyan);text-shadow:0 0 10px var(--cyan);margin-bottom:24px;}
  .info{font-size:clamp(13px,3.4vw,16px);max-width:560px;line-height:1.9;
    color:#ffe;margin-bottom:14px;}
  .info b{color:var(--gold);}
  .kbd{display:inline-block;border:1px solid var(--cyan);border-radius:4px;
    padding:1px 7px;margin:0 2px;color:var(--cyan);font-family:'Press Start 2P';
    font-size:10px;text-shadow:0 0 5px var(--cyan);}
  .btn{margin-top:18px;cursor:pointer;pointer-events:auto;
    font-family:'Press Start 2P';font-size:clamp(13px,3.5vw,18px);
    color:#1a0633;background:linear-gradient(180deg,var(--gold),#ff9e3d);
    border:none;padding:16px 30px;border-radius:8px;
    box-shadow:0 0 18px var(--gold),0 6px 0 #a05a00;
    text-shadow:none;letter-spacing:1px;}
  .btn:active{transform:translateY(4px);box-shadow:0 0 18px var(--gold),0 2px 0 #a05a00;}
  #endTitle{font-family:'Press Start 2P';font-size:clamp(22px,7vw,52px);
    color:var(--green);text-shadow:0 0 14px var(--green),4px 4px 0 #000;margin-bottom:8px;}
  .stat{font-family:'Press Start 2P';font-size:clamp(12px,3vw,18px);
    color:var(--gold);text-shadow:0 0 10px var(--gold);margin:6px 0;}

  /* ============ 移动端控制 ============ */
  #touchUI{position:fixed;inset:0;z-index:15;pointer-events:none;display:none;}
  #touchUI.on{display:block;}
  .tHint{position:fixed;bottom:14px;font-family:'Chakra Petch';font-size:12px;
    color:var(--cyan);opacity:.55;text-shadow:0 0 6px var(--cyan);pointer-events:none;}
  #tHintL{left:14px;} #tHintR{right:14px;text-align:right;}

  #demoTag{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
    z-index:22;font-family:'Press Start 2P';font-size:12px;color:var(--magenta);
    text-shadow:0 0 10px var(--magenta);display:none;letter-spacing:2px;}
  #demoTag.on{display:block;animation:blink 1.1s steps(2) infinite;}
  @keyframes blink{50%{opacity:.25;}}

  #flash{position:fixed;inset:0;z-index:28;pointer-events:none;opacity:0;
    background:radial-gradient(circle,var(--gold),transparent 70%);}
</style>

<body>
<div id="app"></div>
<div id="crt"></div>

<!-- HUD -->
<div id="hud">
  <div id="hudL" class="hud-box"><div class="lbl">SCORE</div><span id="score">0</span></div>
  <div id="hudCenter" class="hud-box"><div class="lbl">ORBS</div><span id="orbs">0/0</span></div>

<!-- 触屏提示 -->

<!-- 开始遮罩 -->
<div id="startMask" class="mask">
  <div class="title">NEON<br>FPS MAZE</div>
  <div class="subtitle">霓虹迷宫 · 第一人称逃脱</div>
  <div class="info">
    在随机霓虹迷宫中第一人称行走,吃掉<b>发光点</b>计分,<br>

  </div>
  <div class="info">
    <span class="kbd">W A S D</span>/方向键 移动 ·
    <span class="kbd">Q</span><span class="kbd">E</span> 或鼠标拖动 转身<br>
    <span style="font-size:12px;opacity:.7">移动端:左半屏滑动转向 · 右半屏触按前进</span>
  </div>

</div>

<!-- 结束遮罩 -->
<div id="endMask" class="mask hidden">
  <div id="endTitle">逃出成功!</div>
  <div class="stat" id="endScore">SCORE 0</div>
  <div class="stat" id="endBest">BEST 0</div>
  <div class="info" id="endMsg">下一层迷宫更大更难…</div>
  <button id="againBtn" class="btn">▶ 再来一层</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ====================================================================
   NEON FPS MAZE — 合成波第一人称 3D 迷宫
   单文件 Three.js · 随机迷宫 · 网格碰撞 · 发光点/出口 · DEMO AI · 录制
   ==================================================================== */

const $ = id => document.getElementById(id);
const QS = new URLSearchParams(location.search);
const DEMO = QS.has('demo') || QS.has('record');
const RECORD = QS.has('record') ? Math.max(3, parseInt(QS.get('record'))||20) : 0;

// ---------- 颜色常量 ----------
const C = {
  pink:0xff2e88, cyan:0x5ef0ff, magenta:0xff5ec8,
  gold:0xffd95e, green:0x5effa0
};

// ---------- 全局状态 ----------
let renderer, scene, camera, clock;
let state = 'start';          // start | play | end
let level = 1, score = 0;
let bestScore = +(localStorage.getItem('neonFpsMazeBest')||0);
let elapsed = 0;
let muted = false, audioReady = false;

// 迷宫数据
let maze=null, gridW=0, gridH=0, cellSize=4;
let wallGroup, orbMeshes=[], portal=null, exitCell=null;
let orbsTotal=0, orbsGot=0;

// 玩家
const player = { x:0, z:0, yaw:0, radius:0.55 };
const keys = {};
let dragging=false, lastMX=0;

// DEMO AI
const ai = { path:[], target:null, wallSide:0, repathT:0 };

$('endBest') && ($('endBest').textContent='BEST '+bestScore);

// ===================================================================
//  音频 — Web Audio 程序化音效 + 合成波循环配乐
// ===================================================================
let actx=null, masterGain=null, musicGain=null, sfxGain=null, musicTimer=null;
function initAudio(){
  if(actx) return;
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = actx.createGain(); masterGain.gain.value = muted?0:0.9; masterGain.connect(actx.destination);
    musicGain = actx.createGain(); musicGain.gain.value=0.32; musicGain.connect(masterGain);
    sfxGain = actx.createGain(); sfxGain.gain.value=0.55; sfxGain.connect(masterGain);
    audioReady=true;
    startMusic();
  }catch(e){ console.warn('audio init fail',e); }
}
function resumeAudio(){ if(actx && actx.state==='suspended') actx.resume(); }

function blip(freq,dur,type='square',vol=0.5,slide=0){
  if(!audioReady||muted) return;
  try{
    const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq*slide),t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function sfxOrb(){ blip(660,0.10,'square',0.4,2.2); blip(990,0.09,'square',0.3,2.0); }
function sfxWin(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>blip(f,0.18,'sawtooth',0.45),i*90)); }
function sfxBump(){ blip(90,0.07,'sawtooth',0.3,0.6); }

// 合成波循环配乐:贝斯 + 琶音
const bassSeq=[55,55,73.42,49]; // A C# G 之类
const arpSeq=[440,554.37,659.25,554.37,440,659.25,830.61,659.25];
let musicStep=0;
function musicTick(){
  if(!audioReady) return;
  const t=actx.currentTime;
  // 贝斯
  const bf=bassSeq[(musicStep>>2)%bassSeq.length];
  const bo=actx.createOscillator(), bg=actx.createGain();
  bo.type='sawtooth'; bo.frequency.value=bf;
  bg.gain.setValueAtTime(0.0001,t); bg.gain.exponentialRampToValueAtTime(0.5,t+0.02);
  bg.gain.exponentialRampToValueAtTime(0.0001,t+0.46);
  bo.connect(bg); bg.connect(musicGain); bo.start(t); bo.stop(t+0.5);
  // 琶音
  const af=arpSeq[musicStep%arpSeq.length];
  const ao=actx.createOscillator(), ag=actx.createGain();
  ao.type='square'; ao.frequency.value=af;
  ag.gain.setValueAtTime(0.0001,t); ag.gain.exponentialRampToValueAtTime(0.16,t+0.01);
  ag.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
  ao.connect(ag); ag.connect(musicGain); ao.start(t); ao.stop(t+0.24);
  musicStep++;
}
function startMusic(){ if(musicTimer) return; musicTimer=setInterval(musicTick, 240); }

// ===================================================================
//  迷宫生成 — 递归回溯 (DFS) ；带 1 格墙的栅格
//  网格表示: grid[y][x] 1=墙 0=通路。 实际单元在奇数坐标。
// ===================================================================
function genMaze(cw,ch){
  // cw,ch = 单元格数(逻辑),最终栅格 = 2*cw+1
  const W=2*cw+1, H=2*ch+1;
  const g=[];
  for(let y=0;y<H;y++){ g.push(new Array(W).fill(1)); }
  const stack=[]; const sx=1, sy=1; g[sy][sx]=0; stack.push([sx,sy]);
  const dirs=[[0,-2],[0,2],[-2,0],[2,0]];
  while(stack.length){
    const [cx,cy]=stack[stack.length-1];
    const opts=[];
    for(const [dx,dy] of dirs){
      const nx=cx+dx, ny=cy+dy;
      if(nx>0&&nx<W-1&&ny>0&&ny<H-1&&g[ny][nx]===1) opts.push([nx,ny,dx,dy]);
    }
    if(opts.length){
      const [nx,ny,dx,dy]=opts[(Math.random()*opts.length)|0];
      g[cy+dy/2][cx+dx/2]=0; g[ny][nx]=0;
      stack.push([nx,ny]);
    } else stack.pop();
  }
  // 额外开几个环路,让 demo 更有探索感、也更易于绕路
  const extra = Math.floor(cw*ch*0.06);
  for(let i=0;i<extra;i++){
    const x=1+2*((Math.random()*cw)|0), y=1+2*((Math.random()*ch)|0);
    const d=dirs[(Math.random()*4)|0]; const wx=x+d[0]/2, wy=y+d[1]/2;
    if(wx>0&&wx<W-1&&wy>0&&wy<H-1) g[wy][wx]=0;
  }
  return {g,W,H};
}

// ===================================================================
//  构建三维场景中的迷宫
// ===================================================================
function buildLevel(){
  // 清理旧场景物体
  if(wallGroup){ scene.remove(wallGroup); disposeGroup(wallGroup); }
  // 球体共享同一几何,几何只 dispose 一次;材质为各自 clone,逐个 dispose
  if(orbMeshes.length){ orbMeshes[0].geometry.dispose(); }
  orbMeshes.forEach(o=>{ scene.remove(o); if(o.material) o.material.dispose(); });
  orbMeshes=[];
  if(portal){ scene.remove(portal); disposeGroup(portal); }

  // 难度递增:每层增大
  const cw = 6 + Math.min(10, level*2);
  const ch = 6 + Math.min(10, level*2);
  const m = genMaze(cw,ch);
  maze=m.g; gridW=m.W; gridH=m.H;

  wallGroup = new THREE.Group();

  // 地面:网格平面
  const floorSize = Math.max(gridW,gridH)*cellSize;
  const floorGeo = new THREE.PlaneGeometry(floorSize*1.4, floorSize*1.4);
  const floorMat = new THREE.MeshBasicMaterial({color:0x150826});
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x=-Math.PI/2; floor.position.y=0;
  wallGroup.add(floor);
  // 霓虹网格线地面
  const grid = new THREE.GridHelper(floorSize*1.4, Math.max(gridW,gridH)*1.4|0, C.magenta, 0x3a1060);
  grid.position.y=0.02; grid.material.opacity=0.55; grid.material.transparent=true;
  wallGroup.add(grid);

  // 墙体:共享几何 + 霓虹边框
  const wallH=3.0;
  const wallGeo = new THREE.BoxGeometry(cellSize, wallH, cellSize);
  // 不同墙用不同霓虹色,做出 OutRun 多彩感
  const palette=[C.cyan,C.pink,C.magenta];
  const wallMats = palette.map(col=>new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:0.16}));
  const edgeMats = palette.map(col=>new THREE.LineBasicMaterial({color:col}));
  const edgeGeo = new THREE.EdgesGeometry(wallGeo);

  const off = -((gridW-1)/2)*cellSize; // 居中(用 gridW 做主轴近似)
  const offX = -((gridW-1)/2)*cellSize;
  const offZ = -((gridH-1)/2)*cellSize;

  for(let y=0;y<gridH;y++){
    for(let x=0;x<gridW;x++){
      if(maze[y][x]===1){
        const ci=(x+y)%palette.length;
        const wx=offX + x*cellSize, wz=offZ + y*cellSize;
        const mesh = new THREE.Mesh(wallGeo, wallMats[ci]);
        mesh.position.set(wx, wallH/2, wz);
        wallGroup.add(mesh);
        const edge = new THREE.LineSegments(edgeGeo, edgeMats[ci]);
        edge.position.copy(mesh.position);
        wallGroup.add(edge);
      }
    }
  }
  // 把网格坐标 -> 世界坐标的偏移记下来
  maze._offX=offX; maze._offZ=offZ;

  scene.add(wallGroup);

  // 玩家起点:格 (1,1)
  player.x = cellToWorldX(1); player.z = cellToWorldZ(1);
  player.yaw = 0;

  // 选出口:离起点最远的通路格(BFS)
  exitCell = farthestCell(1,1);
  const ex=cellToWorldX(exitCell.x), ez=cellToWorldZ(exitCell.z);

  // 出口传送门:发光圆环 + 光柱
  portal = new THREE.Group();
  const ringGeo = new THREE.TorusGeometry(1.3,0.22,16,40);
  const ringMat = new THREE.MeshBasicMaterial({color:C.green});
  const ring = new THREE.Mesh(ringGeo, ringMat); ring.position.y=1.5;
  portal.add(ring);
  const ring2 = new THREE.Mesh(new THREE.TorusGeometry(0.9,0.12,12,32), new THREE.MeshBasicMaterial({color:C.gold}));
  ring2.position.y=1.5; portal.add(ring2);
  const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.7,6,20,1,true),
     new THREE.MeshBasicMaterial({color:C.green,transparent:true,opacity:0.18,side:THREE.DoubleSide}));
  beam.position.y=3; portal.add(beam);
  portal.position.set(ex,0,ez);
  portal.userData.cell={x:exitCell.x,z:exitCell.z};
  scene.add(portal);

  // 发光点:在通路格随机布置(避开起点与出口)
  orbsGot=0;
  const cells=[];
  for(let y=1;y<gridH;y+=1) for(let x=1;x<gridW;x+=1){
    if(maze[y][x]===0 && !(x===1&&y===1) && !(x===exitCell.x&&y===exitCell.z)) cells.push([x,y]);
  }
  shuffle(cells);
  orbsTotal=Math.min(cells.length, 8+level*3);
  const orbGeo=new THREE.OctahedronGeometry(0.4,0);
  const orbMat=new THREE.MeshBasicMaterial({color:C.gold});
  for(let i=0;i<orbsTotal;i++){
    const [gx,gy]=cells[i];
    const o=new THREE.Mesh(orbGeo, orbMat.clone());
    o.position.set(cellToWorldX(gx),1.0,cellToWorldZ(gy));
    o.userData={cell:[gx,gy],got:false,base:1.0};
    scene.add(o); orbMeshes.push(o);
  }

  // 雾:增强纵深
  scene.fog = new THREE.Fog(0x1a0633, cellSize*2.5, cellSize*9);

  elapsed=0; orbsGot=0;
  ai.path=[]; ai.target=null; ai.repathT=0; ai.wallSide=0;
  updateHUD();
}

function cellToWorldX(cx){ return maze._offX + cx*cellSize; }
function cellToWorldZ(cz){ return maze._offZ + cz*cellSize; }
function worldToCellX(wx){ return Math.round((wx-maze._offX)/cellSize); }
function worldToCellZ(wz){ return Math.round((wz-maze._offZ)/cellSize); }

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } }

// BFS 找最远通路格
function farthestCell(sx,sy){
  const dist=Array.from({length:gridH},()=>new Array(gridW).fill(-1));
  const q=[[sx,sy]]; dist[sy][sx]=0; let far={x:sx,z:sy,d:0};
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(q.length){
    const [cx,cy]=q.shift();
    if(dist[cy][cx]>far.d) far={x:cx,z:cy,d:dist[cy][cx]};
    for(const [dx,dy] of dirs){
      const nx=cx+dx, ny=cy+dy;
      if(nx>=0&&nx<gridW&&ny>=0&&ny<gridH&&maze[ny][nx]===0&&dist[ny][nx]<0){
        dist[ny][nx]=dist[cy][cx]+1; q.push([nx,ny]);
      }
    }
  }
  return far;
}

// BFS 求 from->to 路径(单元格数组)
function bfsPath(sx,sy,tx,ty){
  const prev=Array.from({length:gridH},()=>new Array(gridW).fill(null));
  const seen=Array.from({length:gridH},()=>new Array(gridW).fill(false));
  const q=[[sx,sy]]; seen[sy][sx]=true;
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(q.length){
    const [cx,cy]=q.shift();
    if(cx===tx&&cy===ty){
      const path=[]; let c=[cx,cy];
      while(c){ path.push(c); c=prev[c[1]][c[0]]; }
      return path.reverse();
    }
    for(const [dx,dy] of dirs){
      const nx=cx+dx, ny=cy+dy;
      if(nx>=0&&nx<gridW&&ny>=0&&ny<gridH&&maze[ny][nx]===0&&!seen[ny][nx]){
        seen[ny][nx]=true; prev[ny][nx]=[cx,cy]; q.push([nx,ny]);
      }
    }
  }
  return null;
}

function disposeGroup(g){
  g.traverse(o=>{ if(o.geometry)o.geometry.dispose(); if(o.material){ if(Array.isArray(o.material))o.material.forEach(m=>m.dispose()); else o.material.dispose(); } });
}

// ===================================================================
//  碰撞:基于网格判定 — 检测玩家圆与墙格的重叠
// ===================================================================
function isWall(cx,cy){
  if(cx<0||cx>=gridW||cy<0||cy>=gridH) return true;
  return maze[cy][cx]===1;
}
// 尝试把玩家移动到 (nx,nz),做轴向滑动碰撞
function tryMove(nx,nz){
  // 分轴处理,实现"贴墙滑动"
  let px=player.x, pz=player.z;
  // X 轴
  if(!collide(nx,pz)) px=nx;
  // Z 轴
  if(!collide(px,nz)) pz=nz;
  if(px===player.x && pz===player.z && (nx!==player.x||nz!==player.z)) sfxBumpThrottled();
  player.x=px; player.z=pz;
}
let lastBump=0;
function sfxBumpThrottled(){ const t=performance.now(); if(t-lastBump>180){ sfxBump(); lastBump=t; } }

// 检测点(world)的玩家圆是否撞墙
function collide(wx,wz){
  const r=player.radius;
  // 检查玩家所在格附近 3x3
  const cx=worldToCellX(wx), cz=worldToCellZ(wz);
  for(let y=cz-1;y<=cz+1;y++){
    for(let x=cx-1;x<=cx+1;x++){
      if(isWall(x,y)){
        // 墙格 AABB
        const minX=cellToWorldX(x)-cellSize/2, maxX=cellToWorldX(x)+cellSize/2;
        const minZ=cellToWorldZ(y)-cellSize/2, maxZ=cellToWorldZ(y)+cellSize/2;
        const clx=Math.max(minX,Math.min(wx,maxX));
        const clz=Math.max(minZ,Math.min(wz,maxZ));
        const dx=wx-clx, dz=wz-clz;
        if(dx*dx+dz*dz < r*r) return true;
      }
    }
  }
  return false;
}

// ===================================================================
//  DEMO AI — BFS 朝出口走,顺路改道去附近的发光点;持续探索
// ===================================================================
function aiUpdate(dt){
  // 当前格
  let cx=worldToCellX(player.x), cz=worldToCellZ(player.z);
  // 边界取整可能落到墙格,导致 BFS 起点无效 -> AI 卡死;回退到最近的通路格
  if(isWall(cx,cz)){
    let best=null,bd=1e9;
    for(let y=cz-1;y<=cz+1;y++)for(let x=cx-1;x<=cx+1;x++){
      if(!isWall(x,y)){
        const d=(cellToWorldX(x)-player.x)**2+(cellToWorldZ(y)-player.z)**2;
        if(d<bd){ bd=d; best=[x,y]; }
      }
    }
    if(best){ cx=best[0]; cz=best[1]; }
  }
  ai.repathT-=dt;

  // 若没有路径或到达路径末/需要重算
  if(!ai.path.length || ai.repathT<=0){
    // 优先去最近的未吃发光点(若较近),否则去出口
    let goal=null, bestD=1e9;
    for(const o of orbMeshes){
      if(o.userData.got) continue;
      const [gx,gy]=o.userData.cell;
      const d=Math.abs(gx-cx)+Math.abs(gy-cz);
      if(d<bestD){ bestD=d; goal=[gx,gy]; }
    }
    // 若最近的点太远,且出口更值得,就直接走出口(但通常顺路吃)
    let target = (goal && bestD<=12) ? goal : [exitCell.x, exitCell.z];
    const p=bfsPath(cx,cz,target[0],target[1]);
    ai.path = p&&p.length>1 ? p.slice(1) : [];
    ai.repathT=1.2;
  }

  if(!ai.path.length){
    // 直接朝出口
    const p=bfsPath(cx,cz,exitCell.x,exitCell.z);
    ai.path = p&&p.length>1?p.slice(1):[];
    if(!ai.path.length) return;
  }

  // 朝路径下一个格中心走
  const next=ai.path[0];
  const tx=cellToWorldX(next[0]), tz=cellToWorldZ(next[1]);
  const ddx=tx-player.x, ddz=tz-player.z;
  const dist=Math.hypot(ddx,ddz);
  // 期望朝向
  const desired=Math.atan2(ddx,ddz);
  // 平滑转向
  let diff=desired-player.yaw;
  while(diff>Math.PI)diff-=2*Math.PI; while(diff<-Math.PI)diff+=2*Math.PI;
  player.yaw += Math.max(-6*dt,Math.min(6*dt,diff*3));

  // 朝向基本对齐后前进
  const speed=5.2;
  if(Math.abs(diff)<0.6){
    const mvx=Math.sin(player.yaw)*speed*dt;
    const mvz=Math.cos(player.yaw)*speed*dt;
    tryMove(player.x+mvx, player.z+mvz);
  }
  if(dist<cellSize*0.4) ai.path.shift();
}

// ===================================================================
//  输入
// ===================================================================
addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
addEventListener('keyup',e=>{ keys[e.code]=false; });

// 鼠标拖动转身
const app=$('app');
app.addEventListener('mousedown',e=>{ dragging=true; lastMX=e.clientX; });
addEventListener('mousemove',e=>{ if(dragging){ player.yaw -= (e.clientX-lastMX)*0.005; lastMX=e.clientX; } });
addEventListener('mouseup',()=>dragging=false);

// 触屏:左半屏滑动转向,右半屏触按前进
let touchLeftId=null, touchRightId=null, touchLastX=0, touchFwd=false, touchTurn=0;
app.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    if(t.clientX < innerWidth/2){ touchLeftId=t.identifier; touchLastX=t.clientX; }
    else { touchRightId=t.identifier; touchFwd=true; }
  }
  e.preventDefault();
},{passive:false});
app.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===touchLeftId){ touchTurn += -(t.clientX-touchLastX)*0.006; touchLastX=t.clientX; }
  }
  e.preventDefault();
},{passive:false});
app.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===touchLeftId) touchLeftId=null;
    if(t.identifier===touchRightId){ touchRightId=null; touchFwd=false; }
  }
  e.preventDefault();
},{passive:false});

// ===================================================================
//  玩家更新(手动操控)
// ===================================================================
function playerUpdate(dt){
  const moveSpeed=6.0, turnSpeed=2.6;
  let fwd=0, strafe=0;
  if(keys['KeyW']||keys['ArrowUp']) fwd+=1;
  if(keys['KeyS']||keys['ArrowDown']) fwd-=1;
  if(keys['KeyA']) strafe-=1;
  if(keys['KeyD']) strafe+=1;
  if(keys['ArrowLeft']||keys['KeyQ']) player.yaw+=turnSpeed*dt;
  if(keys['ArrowRight']||keys['KeyE']) player.yaw-=turnSpeed*dt;

  // 触屏
  if(touchTurn){ player.yaw+=touchTurn; touchTurn=0; }
  if(touchFwd) fwd+=1;

  if(fwd||strafe){
    const len=Math.hypot(fwd,strafe)||1; fwd/=len; strafe/=len;
    const mvx=(Math.sin(player.yaw)*fwd + Math.cos(player.yaw)*strafe)*moveSpeed*dt;
    const mvz=(Math.cos(player.yaw)*fwd - Math.sin(player.yaw)*strafe)*moveSpeed*dt;
    tryMove(player.x+mvx, player.z+mvz);
  }
}

// ===================================================================
//  拾取 & 出口检测
// ===================================================================
function checkPickups(){
  const cx=worldToCellX(player.x), cz=worldToCellZ(player.z);
  for(const o of orbMeshes){
    if(o.userData.got) continue;
    const dx=o.position.x-player.x, dz=o.position.z-player.z;
    if(dx*dx+dz*dz < 1.4*1.4){
      o.userData.got=true; o.visible=false;
      orbsGot++; score+=100; sfxOrb(); flash(C.gold,0.25);
      updateHUD();
    }
  }
  // 出口
  if(portal){
    const dx=portal.position.x-player.x, dz=portal.position.z-player.z;
    if(dx*dx+dz*dz < 1.6*1.6){ winLevel(); }
  }
}

function flash(col,a){
  const f=$('flash');
  f.style.background=`radial-gradient(circle, #${col.toString(16).padStart(6,'0')}, transparent 70%)`;
  f.style.opacity=a; setTimeout(()=>{ f.style.opacity=0; },120);
}

// ===================================================================
//  关卡胜利 / 流程
// ===================================================================
function winLevel(){
  if(state!=='play') return;
  // 计分:时间奖励 + 完成奖励
  const timeBonus=Math.max(0, Math.floor(600 - elapsed*8));
  score += 500 + timeBonus + orbsGot*20;
  sfxWin(); flash(C.green,0.5);
  if(score>bestScore){ bestScore=score; localStorage.setItem('neonFpsMazeBest',bestScore); }

  if(DEMO){
    // demo 模式:直接进入下一层,不停
    level++; buildLevel(); return;
  }
  state='end';
  $('endTitle').textContent='逃出成功!';
  $('endScore').textContent='SCORE '+score;
  $('endBest').textContent='BEST '+bestScore;
  $('endMsg').textContent=`通过第 ${level} 层 · 用时 ${elapsed.toFixed(1)}s · 吃到 ${orbsGot}/${orbsTotal} 发光点`;
  $('endMask').classList.remove('hidden');
}

function startGame(){
  $('startMask').classList.add('hidden');
  $('endMask').classList.add('hidden');
  level=1; score=0; state='play';
  buildLevel();
  if(isTouch()) $('touchUI').classList.add('on');
}
function nextLevel(){
  $('endMask').classList.add('hidden');
  level++; score=score; state='play';
  buildLevel();
}

function isTouch(){ return ('ontouchstart' in window) || navigator.maxTouchPoints>0; }

// ===================================================================
//  HUD
// ===================================================================
function updateHUD(){
  $('score').textContent=score;
  $('orbs').textContent=orbsGot+'/'+orbsTotal;
  $('lvl').textContent='LV.'+level;
}

// ===================================================================
//  Three.js 初始化
// ===================================================================
function initThree(){
  const w=innerWidth,h=innerHeight;
  renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(w,h);
  $('app').appendChild(renderer.domElement);

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a0633);

  camera=new THREE.PerspectiveCamera(72, w/h, 0.05, 200);
  camera.position.set(0,1.6,0);

  clock=new THREE.Clock();
}

// resize:仅在尺寸真正变化时重设(录制期间不破坏画布)
let curW=0,curH=0;
function handleResize(){
  const w=innerWidth,h=innerHeight;
  if(w===curW&&h===curH) return;
  curW=w;curH=h;
  renderer.setSize(w,h);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
addEventListener('resize',handleResize);

// ===================================================================
//  主循环
// ===================================================================
let demoStartT=0;
function update(dt){
  try{
    if(state!=='play') return;
    elapsed+=dt;

    if(DEMO) aiUpdate(dt); else playerUpdate(dt);

    checkPickups();

    // 相机跟随玩家(第一人称)
    camera.position.set(player.x,1.6,player.z);
    const lookDist=10;
    camera.lookAt(
      player.x+Math.sin(player.yaw)*lookDist,
      1.6,
      player.z+Math.cos(player.yaw)*lookDist
    );

    // 动画:发光点旋转浮动、出口旋转
    const t=performance.now()*0.001;
    for(const o of orbMeshes){
      if(o.userData.got) continue;
      o.rotation.y+=dt*2.2; o.rotation.x+=dt*1.1;
      o.position.y=o.userData.base+Math.sin(t*2+o.position.x)*0.18;
    }
    if(portal){
      portal.rotation.y+=dt*1.2;
      portal.children[0].rotation.z=t*1.5;
      portal.children[1].rotation.z=-t*2.0;
    }

    // HUD 计时
    $('time').textContent=elapsed.toFixed(1);
  }catch(e){ console.error('update err',e); }
}

function draw(){
  try{ renderer.render(scene,camera); }
  catch(e){ console.error('draw err',e); }
}

function loop(){
  requestAnimationFrame(loop);
  let dt=clock.getDelta();
  if(dt>0.05) dt=0.05; // 防抖
  handleResize();
  update(dt);
  draw();
}

// ===================================================================
//  按钮 & 静音
// ===================================================================
$('startBtn').addEventListener('click',()=>{ initAudio(); resumeAudio(); startGame(); });
$('againBtn').addEventListener('click',()=>{ resumeAudio(); nextLevel(); });
$('muteBtn').addEventListener('click',()=>{
  muted=!muted;
  if(masterGain) masterGain.gain.value=muted?0:0.9;
  $('muteBtn').textContent=muted?'♪ OFF':'♪ ON';
  $('muteBtn').style.opacity=muted?0.5:1;
});
// 首次手势 resume 音频
['click','keydown','touchstart'].forEach(ev=>addEventListener(ev,()=>{ initAudio(); resumeAudio(); },{once:true}));

// ===================================================================
//  DEMO / RECORD 自动开局
// ===================================================================
function startDemo(){
  $('demoTag').classList.add('on');
  $('startMask').classList.add('hidden');
  // demo 也尝试播放音频(部分浏览器允许)
  initAudio(); resumeAudio();
  level=1; score=0; state='play';
  buildLevel();
  demoStartT=performance.now();
}

// 录制
function startRecord(){
  const cv=renderer.domElement;
  const stream=cv.captureStream(30);
  if(!stream.getVideoTracks().length){ console.warn('no video track'); return; }
  let mt='video/webm;codecs=vp9';
  if(!MediaRecorder.isTypeSupported(mt)) mt=(MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm');
  const mr=new MediaRecorder(stream,{mimeType:mt,videoBitsPerSecond:9000000});
  const chunks=[];
  mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
  mr.onstop=()=>{
    const b=new Blob(chunks,{type:'video/webm'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download='neon-fpsmaze.webm'; document.body.appendChild(a);
    try{a.click()}catch(e){}
  };
  mr.start(250);
  setTimeout(()=>{ try{mr.stop()}catch(e){} }, RECORD*1000);
}

// ===================================================================
//  启动
// ===================================================================
function boot(){
  initThree();
  loop();
  if(DEMO){
    startDemo();
    if(RECORD) setTimeout(startRecord, 400); // 等首帧渲染后开录
  }
}
boot();
</script>
