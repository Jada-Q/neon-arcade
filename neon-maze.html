<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON MAZE · 霓虹迷宫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== 全局合成波 OutRun 风格 ===== */
  :root{
    --pink:#ff2e88; --cyan:#5ef0ff; --magenta:#ff5ec8; --gold:#ffd95e; --green:#5effa0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%; height:100%; overflow:hidden; background:#160a36;}
  body{
    font-family:'Chakra Petch', system-ui, sans-serif;
    /* 日落渐变背景 */
    background:linear-gradient(#160a36,#3a1457 30%,#7a2a6e 50%,#ff5e7e 64%,#ff9a4d 72%,#160a36 72%);
    display:flex; align-items:center; justify-content:center;
    color:#fff; -webkit-tap-highlight-color:transparent; touch-action:none;
  }
  #wrap{
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  canvas#game{
    display:block;
    image-rendering:auto;
    border:3px solid var(--cyan);
    box-shadow:4px 4px 0 var(--pink), 0 0 28px rgba(94,240,255,.5), inset 0 0 40px rgba(0,0,0,.5);
    background:rgba(10,4,28,.55);
    max-width:100vw; max-height:100vh;
  }
  /* CRT 扫描线叠加 */
  #crt{
    position:fixed; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0, rgba(0,0,0,.16) 1px, transparent 2px, transparent 3px);
    mix-blend-mode:multiply; opacity:.55;
  }
  /* HUD */
  #hud{
    position:fixed; top:10px; left:0; right:0; z-index:30;
    display:flex; justify-content:space-between; align-items:center;
    padding:0 16px; pointer-events:none;
    font-family:'Press Start 2P', monospace; font-size:12px;
    text-shadow:2px 2px 0 #000;
  }
  #hud .blk{ display:flex; gap:14px; align-items:center; }
  .lab{ color:var(--gold); }
  .val{ color:var(--cyan); }
  #lives{ color:var(--pink); letter-spacing:2px; }
  /* 静音按钮 */
  #mute{
    position:fixed; top:8px; right:12px; z-index:60; pointer-events:auto;
    font-family:'Press Start 2P', monospace; font-size:11px; color:var(--gold);
    background:rgba(20,8,40,.8); border:2px solid var(--gold);
    box-shadow:3px 3px 0 var(--pink); padding:8px 10px; cursor:pointer;
    border-radius:4px;
  }
  #mute:active{ transform:translate(2px,2px); box-shadow:1px 1px 0 var(--pink);}
  /* 遮罩 */
  .overlay{
    position:fixed; inset:0; z-index:40; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:18px;
    background:radial-gradient(circle at 50% 40%, rgba(58,20,87,.65), rgba(10,4,28,.92));
    backdrop-filter:blur(2px);
  }
  .overlay.hidden{ display:none; }
  .title{
    font-family:'Press Start 2P', monospace; font-size:clamp(20px,6vw,46px);
    color:var(--pink); text-shadow:4px 4px 0 var(--cyan), 0 0 24px var(--pink);
    letter-spacing:2px; line-height:1.4;
  }
  .sub{
    font-family:'Press Start 2P', monospace; font-size:clamp(10px,2.4vw,15px);
    color:var(--gold); text-shadow:2px 2px 0 #000;
  }
  .desc{ max-width:560px; font-size:clamp(13px,3vw,17px); color:#ffe; line-height:1.7; padding:0 16px;}
  .desc b{ color:var(--cyan);}
  .btn{
    font-family:'Press Start 2P', monospace; font-size:clamp(12px,3vw,18px);
    color:#160a36; background:var(--green);
    border:3px solid #fff; box-shadow:5px 5px 0 var(--magenta);
    padding:16px 26px; cursor:pointer; border-radius:6px; margin-top:4px;
    animation:pulseBtn 1.1s ease-in-out infinite;
  }
  .btn:active{ transform:translate(3px,3px); box-shadow:2px 2px 0 var(--magenta);}
  @keyframes pulseBtn{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
  .gend{ color:var(--gold); font-family:'Press Start 2P',monospace; font-size:clamp(14px,3vw,22px); text-shadow:2px 2px 0 #000;}
  /* 触屏方向提示(仅小屏显示) */
  #touchHint{ position:fixed; bottom:14px; left:0; right:0; text-align:center; z-index:30;
    font-size:12px; color:var(--cyan); text-shadow:1px 1px 0 #000; pointer-events:none; opacity:.8;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>
<div id="crt"></div>

<!-- HUD -->
<div id="hud">
  <div class="blk"><span class="lab">SCORE</span><span class="val" id="score">0</span></div>
  <div class="blk"><span class="lab">LV</span><span class="val" id="level">1</span></div>
  <div class="blk"><span id="lives">♥♥♥</span></div>
  <div class="blk"><span class="lab">HI</span><span class="val" id="hi">0</span></div>
</div>
<button id="mute">♪ ON</button>
<div id="touchHint">滑动屏幕控制移动</div>

<!-- 开始遮罩 -->
<div class="overlay" id="startOv">
  <div class="title">NEON MAZE</div>
  <div class="sub">合成波 · 吃豆人迷宫</div>
  <div class="desc">在<b>霓虹迷宫</b>里吃光所有豆子过关。躲开 4 只<b>幽灵</b>(3 命),
  吃下<b>大能量豆</b>后可短时间反杀它们。<br>方向键 / WASD / 滑动 控制移动。</div>
  <button class="btn" id="startBtn">▶ 开始游戏</button>
</div>

<!-- 结束遮罩 -->
<div class="overlay hidden" id="endOv">
  <div class="title" id="endTitle">GAME OVER</div>
  <div class="gend" id="endScore">SCORE 0</div>
  <div class="sub" id="endHi">HI 0</div>
  <button class="btn" id="againBtn">↻ 再玩一次</button>
</div>

<script>
"use strict";
/* ====================================================================
   NEON MAZE — 吃豆人式霓虹迷宫 (合成波 OutRun)
   单文件 / 原生 Canvas 2D / Web Audio / 自动演示 + 自录
   ==================================================================== */

(function(){
  // ---------- 基础 DOM ----------
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d', { alpha:true });
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const livesEl = document.getElementById('lives');
  const hiEl    = document.getElementById('hi');
  const muteBtn = document.getElementById('mute');
  const startOv = document.getElementById('startOv');
  const endOv   = document.getElementById('endOv');
  const startBtn= document.getElementById('startBtn');
  const againBtn= document.getElementById('againBtn');
  const endTitle= document.getElementById('endTitle');
  const endScore= document.getElementById('endScore');
  const endHi   = document.getElementById('endHi');
  const touchHint=document.getElementById('touchHint');

  // ---------- URL 参数 ----------
  const params = new URLSearchParams(location.search);
  const DEMO   = params.has('demo') || params.has('record');
  const RECORD_SEC = params.has('record') ? Math.max(1, parseInt(params.get('record')||'20',10)) : 0;

  // ---------- 颜色 ----------
  const C = { pink:'#ff2e88', cyan:'#5ef0ff', magenta:'#ff5ec8', gold:'#ffd95e', green:'#5effa0' };

  // ---------- 迷宫定义 ----------
  // 图例: # 墙  . 豆  o 大能量豆  空格=空通道  - 鬼屋门  G 鬼出生  P 玩家出生
  // 经典对称布局 (19 列 x 21 行)
  const MAZE = [
    "###################",
    "#........#........#",
    "#o##.###.#.###.##o#",
    "#.................#",
    "#.##.#.#####.#.##.#",
    "#....#...#...#....#",
    "####.### # ###.####",
    "   #.#   G   #.#   ",
    "####.# ##-## #.####",
    "    .  #GGG#  .    ",
    "####.# ##### #.####",
    "   #.#       #.#   ",
    "####.# ##### #.####",
    "#........#........#",
    "#.##.###.#.###.##.#",
    "#o.#.....P.....#.o#",
    "##.#.#.#####.#.#.##",
    "#....#...#...#....#",
    "#.######.#.######.#",
    "#.................#",
    "###################",
  ];
  const ROWS = MAZE.length;       // 21
  const COLS = MAZE[0].length;    // 19

  // 网格状态: 0=墙 1=空 2=豆 3=大豆 4=门
  let grid = [];
  let pelletTotal = 0;
  let pelletLeft  = 0;
  let playerSpawn = {c:9, r:15};
  let ghostHome   = {c:9, r:9};
  let ghostSpawns = [];

  function buildGrid(){
    grid = []; pelletTotal = 0; ghostSpawns = [];
    for(let r=0;r<ROWS;r++){
      const row=[];
      for(let c=0;c<COLS;c++){
        const ch = MAZE[r][c];
        if(ch==='#'){ row.push(0); }
        else if(ch==='.'){ row.push(2); pelletTotal++; }
        else if(ch==='o'){ row.push(3); pelletTotal++; }
        else if(ch==='-'){ row.push(4); }
        else { row.push(1);
          if(ch==='G'){ ghostSpawns.push({c,r}); }
          if(ch==='P'){ playerSpawn={c,r}; }
        }
      }
      grid.push(row);
    }
    // 确保有 4 个鬼出生点
    while(ghostSpawns.length<4){ ghostSpawns.push({c:ghostHome.c, r:ghostHome.r}); }
    pelletLeft = pelletTotal;
  }

  function isWall(c,r){
    if(r<0||r>=ROWS) return true;
    // 左右隧道环绕
    if(c<0||c>=COLS) return false;
    return grid[r][c]===0;
  }
  function isWallForGhostExit(c,r){
    // 门(4)对玩家是墙,对鬼可通行
    if(r<0||r>=ROWS) return true;
    if(c<0||c>=COLS) return false;
    return grid[r][c]===0;
  }
  function isWallForPlayer(c,r){
    if(r<0||r>=ROWS) return true;
    if(c<0||c>=COLS) return false;
    const v=grid[r][c];
    return v===0 || v===4;
  }

  // ---------- 自适应尺寸 ----------
  let TILE=24, OX=0, OY=0, DPR=1;
  function fit(){
    const availW = Math.min(window.innerWidth, 1100);
    const availH = window.innerHeight - 40;
    const tileW = Math.floor(availW / COLS);
    const tileH = Math.floor(availH / ROWS);
    TILE = Math.max(10, Math.min(tileW, tileH));
    const w = TILE*COLS, h = TILE*ROWS;
    DPR = Math.min(window.devicePixelRatio||1, 2);
    const newW = Math.round(w*DPR), newH = Math.round(h*DPR);
    // 仅在尺寸真正变化时重设(录制期间不清空画布)
    if(cv.width!==newW || cv.height!==newH){
      cv.width = newW; cv.height = newH;
      cv.style.width = w+'px'; cv.style.height = h+'px';
    }
    OX=0; OY=0;
    touchHint.style.display = (window.innerWidth<760) ? 'block':'none';
  }
  window.addEventListener('resize', ()=>{ try{ fit(); }catch(e){} });

  // 坐标换算 (像素中心)
  function px(c){ return (c+0.5)*TILE; }
  function py(r){ return (r+0.5)*TILE; }

  // ---------- 游戏状态 ----------
  const ST = { START:0, PLAY:1, DEAD:2, LEVELCLEAR:3, OVER:4, WIN:5 };
  let state = ST.START;
  let score=0, level=1, lives=3;
  let hiScore = parseInt(localStorage.getItem('neonmaze_hi')||'0',10) || 0;
  hiEl.textContent = hiScore;

  let frightTimer = 0;       // 反杀计时(秒)
  let frightDur = 7;         // 反杀持续
  let levelClearTimer=0;
  let deadTimer=0;
  let comboGhost=0;          // 连吃幽灵计分倍率
  let globalT=0;             // 全局时间(脉动用)

  // 屏幕震动
  let shake=0;
  // 粒子
  const particles=[];
  function spawnParticles(x,y,color,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=40+Math.random()*160;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.5+Math.random()*0.4,t:0,color,sz:2+Math.random()*3});
    }
  }
  // 飘分文字
  const floaters=[];
  function spawnFloater(x,y,text,color){
    floaters.push({x,y,text,color,t:0,life:0.9});
  }

  // ---------- 玩家 ----------
  const player = {
    c:9, r:15, x:0, y:0,
    dir:{x:-1,y:0}, want:{x:-1,y:0},
    speed:5.2,          // 格/秒
    mouth:0,
  };
  // ---------- 幽灵 ----------
  // 4 色幽灵
  const GHOST_COLORS=[C.pink, C.cyan, C.gold, C.green];
  const GHOST_NAMES=['blink','pink','inky','clyde'];
  let ghosts=[];
  function makeGhosts(){
    ghosts=[];
    for(let i=0;i<4;i++){
      const sp = ghostSpawns[i] || ghostHome;
      ghosts.push({
        idx:i, color:GHOST_COLORS[i], name:GHOST_NAMES[i],
        c:sp.c, r:sp.r, x:px(sp.c), y:py(sp.r),
        dir:{x:0,y:-1},
        speed:4.2 + i*0.12,
        mode:'scatter',          // scatter / chase / fright / eaten
        frightFlash:false,
        releaseAt: i*1.6,        // 依次出笼
        released:false,
        wobble:Math.random()*10,
      });
    }
  }

  // ---------- 初始化关卡 ----------
  function resetLevel(fullReset){
    buildGrid();
    // 玩家
    player.c=playerSpawn.c; player.r=playerSpawn.r;
    player.x=px(player.c); player.y=py(player.r);
    player.dir={x:-1,y:0}; player.want={x:-1,y:0};
    player.speed = 5.2 + (level-1)*0.18;
    makeGhosts();
    // 难度: 幽灵更快, 反杀更短
    for(const g of ghosts){ g.speed = (4.0 + g.idx*0.12) + (level-1)*0.16; }
    frightDur = Math.max(3.2, 7 - (level-1)*0.5);
    frightTimer=0; comboGhost=0;
    modeTimer=0; modePhase=0;
  }

  function fullRestart(){
    score=0; level=1; lives=3;
    updateHud();
    resetLevel(true);
    state=ST.PLAY;
  }

  function updateHud(){
    scoreEl.textContent = score;
    levelEl.textContent = level;
    livesEl.textContent = '♥'.repeat(Math.max(0,lives)) || '·';
    if(score>hiScore){ hiScore=score; hiEl.textContent=hiScore; localStorage.setItem('neonmaze_hi', String(hiScore)); }
    else hiEl.textContent=hiScore;
  }

  // ---------- 模式切换 (scatter/chase 节奏) ----------
  let modeTimer=0, modePhase=0;
  const MODE_SEQ=[7,20,7,20,5,20,5,999]; // scatter,chase 交替
  function currentBaseMode(){
    return (modePhase%2===0)?'scatter':'chase';
  }

  // ====================================================================
  //  音频 (Web Audio 程序化)
  // ====================================================================
  let actx=null, masterGain=null, musicGain=null, sfxGain=null;
  let muted=false, musicStarted=false;
  let musicNodes=[];
  function initAudio(){
    if(actx) return;
    try{
      actx = new (window.AudioContext||window.webkitAudioContext)();
      masterGain = actx.createGain(); masterGain.gain.value=0.9; masterGain.connect(actx.destination);
      musicGain = actx.createGain(); musicGain.gain.value=0.22; musicGain.connect(masterGain);
      sfxGain = actx.createGain(); sfxGain.gain.value=0.5; sfxGain.connect(masterGain);
    }catch(e){ actx=null; }
  }
  function resumeAudio(){
    if(!actx) initAudio();
    if(actx && actx.state==='suspended'){ actx.resume().catch(()=>{}); }
    if(!musicStarted){ startMusic(); musicStarted=true; }
  }
  // 简单合成音效
  function beep(freq, dur, type, gain, slideTo){
    if(!actx||muted) return;
    try{
      const o=actx.createOscillator(), g=actx.createGain();
      o.type=type||'square'; o.frequency.value=freq;
      if(slideTo){ o.frequency.linearRampToValueAtTime(slideTo, actx.currentTime+dur); }
      g.gain.value=0.0001;
      g.gain.exponentialRampToValueAtTime(gain||0.3, actx.currentTime+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
      o.connect(g); g.connect(sfxGain);
      o.start(); o.stop(actx.currentTime+dur+0.02);
    }catch(e){}
  }
  function sfxPellet(){ beep(560+Math.random()*60, 0.05, 'square', 0.12); }
  function sfxPower(){ beep(220,0.3,'sawtooth',0.3, 660); }
  function sfxEatGhost(){ beep(180,0.25,'square',0.35, 880); }
  function sfxDeath(){ beep(440,0.7,'sawtooth',0.35, 60); }
  function sfxLevel(){ beep(523,0.12,'square',0.3); setTimeout(()=>beep(659,0.12,'square',0.3),120); setTimeout(()=>beep(784,0.2,'square',0.3),240); }

  // 合成波循环配乐 (低音琶音 + pad)
  let musicTimer=null, musicStep=0;
  const BASS=[55,55,82.4,73.4]; // A1 A1 E2 D2 风格
  const ARP=[220,277.2,329.6,440,329.6,277.2]; // A 小调琶音
  function startMusic(){
    if(!actx) return;
    stopMusic();
    musicStep=0;
    const stepDur=0.26;
    function tick(){
      if(!actx||muted){ musicTimer=setTimeout(tick, stepDur*1000); return; }
      const t=actx.currentTime;
      // bass
      if(musicStep%2===0){
        const o=actx.createOscillator(), g=actx.createGain();
        o.type='sawtooth'; o.frequency.value=BASS[(musicStep/2|0)%BASS.length];
        g.gain.value=0.0001; g.gain.linearRampToValueAtTime(0.5,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,t+stepDur*1.8);
        const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=600;
        o.connect(f); f.connect(g); g.connect(musicGain);
        o.start(t); o.stop(t+stepDur*2);
      }
      // arp
      const o2=actx.createOscillator(), g2=actx.createGain();
      o2.type='square'; o2.frequency.value=ARP[musicStep%ARP.length]* (frightTimer>0?1.5:1);
      g2.gain.value=0.0001; g2.gain.linearRampToValueAtTime(0.16,t+0.01);
      g2.gain.exponentialRampToValueAtTime(0.0001,t+stepDur*0.9);
      o2.connect(g2); g2.connect(musicGain);
      o2.start(t); o2.stop(t+stepDur);
      musicStep++;
      musicTimer=setTimeout(tick, stepDur*1000);
    }
    tick();
  }
  function stopMusic(){ if(musicTimer){ clearTimeout(musicTimer); musicTimer=null; } }

  muteBtn.addEventListener('click', ()=>{
    muted=!muted;
    muteBtn.textContent = muted? '♪ OFF':'♪ ON';
    muteBtn.style.color = muted? '#888':C.gold;
    if(masterGain) masterGain.gain.value = muted?0:0.9;
  });

  // ====================================================================
  //  输入
  // ====================================================================
  function setWant(x,y){ player.want={x,y}; }
  window.addEventListener('keydown', e=>{
    const k=e.key;
    if(k==='ArrowLeft'||k==='a'||k==='A'){ setWant(-1,0); e.preventDefault(); }
    else if(k==='ArrowRight'||k==='d'||k==='D'){ setWant(1,0); e.preventDefault(); }
    else if(k==='ArrowUp'||k==='w'||k==='W'){ setWant(0,-1); e.preventDefault(); }
    else if(k==='ArrowDown'||k==='s'||k==='S'){ setWant(0,1); e.preventDefault(); }
    else if(k===' '){ if(state===ST.START){ beginGame(); } else if(state===ST.OVER||state===ST.WIN){ beginGame(); } }
  }, {passive:false});

  // 触屏滑动
  let touchStart=null;
  cv.addEventListener('touchstart', e=>{ const t=e.touches[0]; touchStart={x:t.clientX,y:t.clientY}; }, {passive:true});
  cv.addEventListener('touchmove', e=>{
    if(!touchStart) return;
    const t=e.touches[0]; const dx=t.clientX-touchStart.x, dy=t.clientY-touchStart.y;
    if(Math.abs(dx)+Math.abs(dy)<22) return;
    if(Math.abs(dx)>Math.abs(dy)){ setWant(dx>0?1:-1,0); } else { setWant(0,dy>0?1:-1); }
    touchStart={x:t.clientX,y:t.clientY};
  }, {passive:true});
  window.addEventListener('touchend', ()=>{ touchStart=null; }, {passive:true});

  startBtn.addEventListener('click', beginGame);
  againBtn.addEventListener('click', beginGame);

  function beginGame(){
    resumeAudio();
    startOv.classList.add('hidden');
    endOv.classList.add('hidden');
    fullRestart();
  }

  // ====================================================================
  //  实体移动 (网格对齐 + 平滑)
  // ====================================================================
  function atCenter(ent){
    return Math.abs(ent.x-px(ent.c))<0.6 && Math.abs(ent.y-py(ent.r))<0.6;
  }
  // 把超出隧道的列环绕
  function wrapCol(c){ if(c<0) return COLS-1; if(c>=COLS) return 0; return c; }

  function moveEntity(ent, wallFn, dt){
    // 在格子中心时尝试转向
    const cx=px(ent.c), cy=py(ent.r);
    const reachX = Math.abs(ent.x-cx) < ent.speed*TILE*dt + 0.5;
    const reachY = Math.abs(ent.y-cy) < ent.speed*TILE*dt + 0.5;
    if(reachX && reachY){
      ent.x=cx; ent.y=cy;
      // 玩家: 检查想要方向
      if(ent===player){
        const nc=ent.c+player.want.x, nr=ent.r+player.want.y;
        if(!wallFn(nc<0?COLS-1:(nc>=COLS?0:nc), nr)){
          ent.dir={...player.want};
        }
      }
      // 前进一格
      const ncRaw=ent.c+ent.dir.x, nr=ent.r+ent.dir.y;
      const nc=wrapCol(ncRaw);
      if(wallFn(ncRaw<0?COLS-1:(ncRaw>=COLS?0:ncRaw), nr)){
        // 撞墙: 停 (玩家) ; 幽灵会在 AI 处理
        if(ent===player){ ent.dir={x:0,y:0}; }
        return;
      }
      ent.c=nc; ent.r=nr;
      // 隧道环绕瞬移
      if(ncRaw<0){ ent.x=px(COLS-1)+TILE; }
      else if(ncRaw>=COLS){ ent.x=px(0)-TILE; }
    }
    // 平滑移动到目标格中心
    const tx=px(ent.c), ty=py(ent.r);
    const sp=ent.speed*TILE*dt;
    if(ent.x<tx) ent.x=Math.min(tx,ent.x+sp);
    else if(ent.x>tx) ent.x=Math.max(tx,ent.x-sp);
    if(ent.y<ty) ent.y=Math.min(ty,ent.y+sp);
    else if(ent.y>ty) ent.y=Math.max(ty,ent.y-sp);
  }

  // ====================================================================
  //  幽灵 AI
  // ====================================================================
  function ghostTargetTile(g){
    if(g.mode==='eaten'){ return {c:ghostHome.c, r:ghostHome.r}; }
    if(g.mode==='fright'){ return null; } // 随机
    if(g.mode==='scatter'){
      // 各自占据一个角落
      const corners=[{c:COLS-2,r:1},{c:1,r:1},{c:COLS-2,r:ROWS-2},{c:1,r:ROWS-2}];
      return corners[g.idx];
    }
    // chase
    if(g.name==='blink'){ return {c:player.c, r:player.r}; }
    if(g.name==='pink'){ return {c:player.c+player.dir.x*4, r:player.r+player.dir.y*4}; }
    if(g.name==='inky'){ return {c:player.c+player.dir.x*2 + (player.c-ghosts[0].c), r:player.r+player.dir.y*2 + (player.r-ghosts[0].r)}; }
    // clyde: 远追近散
    const d=Math.hypot(g.c-player.c, g.r-player.r);
    if(d>6) return {c:player.c, r:player.r};
    return {c:1, r:ROWS-2};
  }

  function ghostChooseDir(g){
    // 在格子中心: 选择不回头、不撞墙、最接近目标的方向
    const opts=[{x:0,y:-1},{x:-1,y:0},{x:0,y:1},{x:1,y:0}];
    const back={x:-g.dir.x, y:-g.dir.y};
    const wallFn = (g.mode==='eaten')? isWallForGhostExit : (g.released? isWallForGhostExit : isWallForGhostExit);
    let valid=[];
    for(const o of opts){
      if(o.x===back.x && o.y===back.y) continue;
      const ncRaw=g.c+o.x, nr=g.r+o.y;
      const nc=ncRaw<0?COLS-1:(ncRaw>=COLS?0:ncRaw);
      if(!wallFn(nc,nr)) valid.push(o);
    }
    if(valid.length===0){ g.dir=back; return; }
    if(g.mode==='fright'){
      g.dir = valid[(Math.random()*valid.length)|0];
      return;
    }
    const tgt=ghostTargetTile(g);
    let best=valid[0], bestD=Infinity;
    for(const o of valid){
      const nc=g.c+o.x, nr=g.r+o.y;
      const d=(nc-tgt.c)*(nc-tgt.c)+(nr-tgt.r)*(nr-tgt.r);
      if(d<bestD){ bestD=d; best=o; }
    }
    g.dir=best;
  }

  function updateGhost(g, dt){
    // 出笼逻辑
    if(!g.released){
      g.releaseAt -= dt;
      if(g.releaseAt<=0){ g.released=true; }
      else {
        // 在屋内上下晃动
        g.y += Math.sin(globalT*4+g.wobble)*0.4;
        return;
      }
    }
    // eaten 回到家变回正常
    if(g.mode==='eaten'){
      if(Math.abs(g.c-ghostHome.c)<=0 && Math.abs(g.r-ghostHome.r)<=1){
        g.mode = currentBaseMode();
        g.speed = baseGhostSpeed(g);
      }
    }
    // 速度依模式
    if(g.mode==='fright') g.speed = baseGhostSpeed(g)*0.55;
    else if(g.mode==='eaten') g.speed = baseGhostSpeed(g)*1.9;
    else g.speed = baseGhostSpeed(g);

    // 在中心时选向
    if(atCenter(g)){
      g.c=Math.round((g.x/TILE)-0.5); g.r=Math.round((g.y/TILE)-0.5);
      g.c=wrapCol(g.c);
      ghostChooseDir(g);
    }
    moveGhost(g, dt);
  }
  function baseGhostSpeed(g){ return (4.0 + g.idx*0.12) + (level-1)*0.16; }

  function moveGhost(g, dt){
    const cx=px(g.c), cy=py(g.r);
    const reachX=Math.abs(g.x-cx)<g.speed*TILE*dt+0.5;
    const reachY=Math.abs(g.y-cy)<g.speed*TILE*dt+0.5;
    if(reachX&&reachY){
      g.x=cx; g.y=cy;
      const ncRaw=g.c+g.dir.x, nr=g.r+g.dir.y;
      const nc=wrapCol(ncRaw);
      const wallFn=isWallForGhostExit;
      if(!wallFn(ncRaw<0?COLS-1:(ncRaw>=COLS?0:ncRaw), nr)){
        g.c=nc; g.r=nr;
        if(ncRaw<0) g.x=px(COLS-1)+TILE;
        else if(ncRaw>=COLS) g.x=px(0)-TILE;
      }
    }
    const tx=px(g.c), ty=py(g.r), sp=g.speed*TILE*dt;
    if(g.x<tx) g.x=Math.min(tx,g.x+sp); else if(g.x>tx) g.x=Math.max(tx,g.x-sp);
    if(g.y<ty) g.y=Math.min(ty,g.y+sp); else if(g.y>ty) g.y=Math.max(ty,g.y-sp);
  }

  // ====================================================================
  //  演示 AI (自动游玩玩家) — BFS 寻路吃最近豆 + 躲鬼
  // ====================================================================
  function bfsNearest(sc, sr, targets, avoid){
    // targets: 函数(c,r)=>bool ; avoid: Set of "c,r" 危险格
    const q=[{c:sc,r:sr}];
    const seen=new Set([sc+','+sr]);
    const prev=new Map();
    let head=0;
    while(head<q.length){
      const cur=q[head++];
      if((cur.c!==sc||cur.r!==sr) && targets(cur.c,cur.r)){
        // 回溯第一步
        let node=cur, first=cur;
        while(prev.has(node.c+','+node.r)){
          const p=prev.get(node.c+','+node.r);
          if(p.c===sc&&p.r===sr){ first=node; break; }
          node=p;
        }
        return {dir:{x:first.c-sc, y:first.r-sr}, dist:0, target:cur};
      }
      const dirs=[{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
      for(const d of dirs){
        let nc=cur.c+d.x, nr=cur.r+d.y;
        if(nc<0) nc=COLS-1; if(nc>=COLS) nc=0;
        const key=nc+','+nr;
        if(seen.has(key)) continue;
        if(isWallForPlayer(nc,nr)) continue;
        if(avoid && avoid.has(key)) continue;
        seen.add(key); prev.set(key,cur); q.push({c:nc,r:nr});
      }
    }
    return null;
  }

  function demoThink(){
    // 危险区: 非反杀状态的幽灵周围
    const danger=new Set();
    let chaseFright=null, fdMin=1e9;
    for(const g of ghosts){
      if(!g.released) continue;
      if(g.mode==='fright' && frightTimer>0.8){
        const d=Math.abs(g.c-player.c)+Math.abs(g.r-player.r);
        if(d<fdMin){ fdMin=d; chaseFright=g; }
        continue;
      }
      if(g.mode==='eaten') continue;
      // 标记幽灵格及周边 2 格为危险
      for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
        if(Math.abs(dr)+Math.abs(dc)<=2){
          let nc=g.c+dc, nr=g.r+dr;
          if(nc<0)nc=COLS-1; if(nc>=COLS)nc=0;
          danger.add(nc+','+nr);
        }
      }
    }
    // 若有可吃的反杀幽灵且较近 -> 去吃
    if(chaseFright && fdMin<8){
      const res=bfsNearest(player.c,player.r,(c,r)=> (c===chaseFright.c&&r===chaseFright.r), null);
      if(res){ player.want=res.dir; return; }
    }
    // 玩家当前是否处于危险格?若是, 优先逃离 (找远离幽灵的安全方向)
    const myKey=player.c+','+player.r;
    const inDanger = danger.has(myKey) || nearestGhostDist()<3.2;
    if(inDanger){
      // 评估四个方向, 选距离最近危险幽灵最远且不撞墙的
      const dirs=[{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
      let best=null, bestScore=-1e9;
      for(const d of dirs){
        let nc=player.c+d.x, nr=player.r+d.y;
        if(nc<0)nc=COLS-1; if(nc>=COLS)nc=0;
        if(isWallForPlayer(nc,nr)) continue;
        let mind=1e9;
        for(const g of ghosts){
          if(!g.released||g.mode==='fright'||g.mode==='eaten') continue;
          mind=Math.min(mind, Math.abs(g.c-nc)+Math.abs(g.r-nr));
        }
        // 同时倾向有豆的方向 (轻微)
        const v=grid[nr] && grid[nr][nc];
        const food=(v===2||v===3)?0.6:0;
        const sc=mind+food;
        if(sc>bestScore){ bestScore=sc; best=d; }
      }
      if(best){ player.want=best; return; }
    }
    // 安全: BFS 找最近豆子, 避开危险格
    let res=bfsNearest(player.c,player.r,(c,r)=>{ const v=grid[r]&&grid[r][c]; return v===2||v===3; }, danger);
    if(!res){
      // 危险格挡住了, 放宽避让再找
      res=bfsNearest(player.c,player.r,(c,r)=>{ const v=grid[r]&&grid[r][c]; return v===2||v===3; }, null);
    }
    if(res){ player.want=res.dir; }
  }
  function nearestGhostDist(){
    let m=1e9;
    for(const g of ghosts){
      if(!g.released||g.mode==='eaten'||g.mode==='fright') continue;
      m=Math.min(m, Math.hypot(g.x-player.x, g.y-player.y)/TILE);
    }
    return m;
  }

  // ====================================================================
  //  碰撞 / 吃豆
  // ====================================================================
  function eatPellet(){
    if(!grid[player.r]) return;
    const v=grid[player.r][player.c];
    if(v===2){
      grid[player.r][player.c]=1; pelletLeft--; score+=10; sfxPellet();
      updateHud();
    } else if(v===3){
      grid[player.r][player.c]=1; pelletLeft--; score+=50;
      // 进入反杀
      frightTimer=frightDur; comboGhost=0;
      for(const g of ghosts){ if(g.mode!=='eaten' && g.released){ g.mode='fright'; g.dir={x:-g.dir.x,y:-g.dir.y}; } }
      sfxPower();
      spawnParticles(player.x,player.y,C.gold,18);
      spawnFloater(player.x,player.y-TILE,'POWER!',C.gold);
      updateHud();
    }
    if(pelletLeft<=0){
      // 过关
      state=ST.LEVELCLEAR; levelClearTimer=1.6; sfxLevel();
      spawnParticles(player.x,player.y,C.green,30);
    }
  }

  function checkGhostCollision(){
    for(const g of ghosts){
      if(!g.released) continue;
      const d=Math.hypot(g.x-player.x, g.y-player.y);
      if(d < TILE*0.62){
        if(g.mode==='fright'){
          // 吃掉幽灵
          g.mode='eaten';
          comboGhost++;
          const pts=200*Math.pow(2,Math.min(comboGhost-1,3)); // 200/400/800/1600
          score+=pts; updateHud();
          sfxEatGhost();
          spawnParticles(g.x,g.y,g.color,20);
          spawnFloater(g.x,g.y-8,String(pts),C.cyan);
          shake=8;
        } else if(g.mode!=='eaten'){
          // 玩家死亡
          loseLife();
          return;
        }
      }
    }
  }

  function loseLife(){
    lives--; updateHud();
    sfxDeath();
    shake=14;
    spawnParticles(player.x,player.y,C.pink,30);
    if(lives<=0){
      state=ST.OVER; deadTimer=1.4;
    } else {
      state=ST.DEAD; deadTimer=1.4;
    }
  }

  // ====================================================================
  //  UPDATE
  // ====================================================================
  let demoRestartTimer=0;
  function update(dt){
    try{
      globalT+=dt;
      if(shake>0) shake=Math.max(0,shake-dt*30);
      // 粒子
      for(let i=particles.length-1;i>=0;i--){
        const p=particles[i]; p.t+=dt;
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=120*dt;
        if(p.t>=p.life) particles.splice(i,1);
      }
      for(let i=floaters.length-1;i>=0;i--){
        const f=floaters[i]; f.t+=dt; f.y-=18*dt;
        if(f.t>=f.life) floaters.splice(i,1);
      }

      if(state===ST.PLAY){
        // 模式节奏
        if(frightTimer<=0){
          modeTimer+=dt;
          if(modeTimer>=MODE_SEQ[Math.min(modePhase,MODE_SEQ.length-1)]){
            modeTimer=0; modePhase++;
          }
        }
        // 反杀计时
        if(frightTimer>0){
          frightTimer-=dt;
          if(frightTimer<=0){
            for(const g of ghosts){ if(g.mode==='fright') g.mode=currentBaseMode(); }
            comboGhost=0;
          }
        } else {
          // 同步基础模式
          for(const g of ghosts){
            if(g.mode!=='fright'&&g.mode!=='eaten') g.mode=currentBaseMode();
          }
        }

        // 演示 AI
        if(DEMO){ demoThink(); }

        // 玩家移动
        player.mouth += dt*10;
        moveEntity(player, isWallForPlayer, dt);
        eatPellet();

        // 幽灵
        for(const g of ghosts){ updateGhost(g, dt); }

        checkGhostCollision();

      } else if(state===ST.DEAD){
        deadTimer-=dt;
        if(deadTimer<=0){
          // 重置位置(保留豆子/分数)
          player.c=playerSpawn.c; player.r=playerSpawn.r;
          player.x=px(player.c); player.y=py(player.r);
          player.dir={x:-1,y:0}; player.want={x:-1,y:0};
          makeGhosts();
          for(const g of ghosts){ g.speed=baseGhostSpeed(g); }
          frightTimer=0; modeTimer=0; modePhase=0;
          state=ST.PLAY;
        }
      } else if(state===ST.LEVELCLEAR){
        levelClearTimer-=dt;
        if(levelClearTimer<=0){
          level++; updateHud();
          resetLevel(false);
          state=ST.PLAY;
        }
      } else if(state===ST.OVER || state===ST.WIN){
        deadTimer-=dt;
        // 演示模式: 自动重开保证整段有内容
        if(DEMO){
          demoRestartTimer+=dt;
          if(demoRestartTimer>2.2){
            demoRestartTimer=0;
            startOv.classList.add('hidden'); endOv.classList.add('hidden');
            fullRestart();
          }
        } else {
          if(deadTimer<=0 && endOv.classList.contains('hidden')){
            showEnd();
          }
        }
      }
    }catch(e){ /* 防止一帧异常打断 */ console.warn('update err',e); }
  }

  function showEnd(){
    endTitle.textContent = (state===ST.WIN)?'YOU WIN!':'GAME OVER';
    endTitle.style.color = (state===ST.WIN)?C.green:C.pink;
    endScore.textContent='SCORE '+score;
    endHi.textContent='HI '+hiScore;
    endOv.classList.remove('hidden');
  }

  // ====================================================================
  //  DRAW
  // ====================================================================
  function drawWallTile(c,r){
    const x=c*TILE, y=r*TILE;
    // 霓虹墙: 圆角描边块
    ctx.save();
    ctx.translate(x+TILE/2, y+TILE/2);
    const pulse=0.5+0.5*Math.sin(globalT*2 + (c+r)*0.4);
    ctx.lineWidth=Math.max(2,TILE*0.16);
    ctx.strokeStyle=C.cyan;
    ctx.shadowColor=C.cyan; ctx.shadowBlur=8+pulse*6;
    const s=TILE*0.40;
    ctx.beginPath();
    roundRectPath(-s,-s,s*2,s*2,TILE*0.16);
    ctx.stroke();
    // 内层品红
    ctx.lineWidth=Math.max(1,TILE*0.06);
    ctx.strokeStyle='rgba(255,46,136,'+(0.4+pulse*0.4)+')';
    ctx.shadowBlur=4;
    ctx.stroke();
    ctx.restore();
  }
  function roundRectPath(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function draw(){
    try{
      const W=cv.width, H=cv.height;
      ctx.save();
      ctx.setTransform(DPR,0,0,DPR,0,0);
      const w=W/DPR, h=H/DPR;
      // 屏幕震动
      let sx=0, sy=0;
      if(shake>0){ sx=(Math.random()-0.5)*shake; sy=(Math.random()-0.5)*shake; }
      ctx.clearRect(0,0,w,h);
      ctx.translate(sx,sy);

      // 背景暗网格 (合成波地平线感)
      ctx.fillStyle='rgba(10,4,28,0.35)';
      ctx.fillRect(-20,-20,w+40,h+40);

      // 画墙 + 门 + 豆
      for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
          const v=grid[r][c];
          if(v===0){ drawWallTile(c,r); }
          else if(v===4){
            // 鬼屋门
            ctx.save();
            ctx.strokeStyle=C.magenta; ctx.lineWidth=Math.max(2,TILE*0.12);
            ctx.shadowColor=C.magenta; ctx.shadowBlur=6;
            ctx.beginPath();
            ctx.moveTo(c*TILE+2, r*TILE+TILE*0.5);
            ctx.lineTo(c*TILE+TILE-2, r*TILE+TILE*0.5);
            ctx.stroke(); ctx.restore();
          }
          else if(v===2){
            // 普通豆 (脉动)
            const pul=0.7+0.3*Math.sin(globalT*4+(c+r));
            ctx.fillStyle=C.gold;
            ctx.shadowColor=C.gold; ctx.shadowBlur=6*pul;
            ctx.beginPath();
            ctx.arc(px(c),py(r), TILE*0.10*pul+TILE*0.04, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur=0;
          }
          else if(v===3){
            // 大能量豆 (强脉动)
            const pul=0.6+0.5*Math.sin(globalT*6+(c+r));
            ctx.fillStyle=C.green;
            ctx.shadowColor=C.green; ctx.shadowBlur=14*pul+6;
            ctx.beginPath();
            ctx.arc(px(c),py(r), TILE*0.26*pul+TILE*0.06, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur=0;
          }
        }
      }

      // 玩家
      drawPlayer();
      // 幽灵
      for(const g of ghosts){ drawGhost(g); }

      // 粒子
      for(const p of particles){
        const a=1-(p.t/p.life);
        ctx.globalAlpha=a; ctx.fillStyle=p.color;
        ctx.shadowColor=p.color; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1; ctx.shadowBlur=0;
      // 飘分
      ctx.textAlign='center';
      for(const f of floaters){
        const a=1-(f.t/f.life);
        ctx.globalAlpha=a;
        ctx.font='bold '+Math.max(10,TILE*0.6)+"px 'Press Start 2P', monospace";
        ctx.fillStyle=f.color; ctx.shadowColor=f.color; ctx.shadowBlur=8;
        ctx.fillText(f.text, f.x, f.y);
      }
      ctx.globalAlpha=1; ctx.shadowBlur=0;

      // 反杀剩余时间条
      if(frightTimer>0){
        const bw=w*0.5, bh=6;
        ctx.fillStyle='rgba(0,0,0,0.4)';
        ctx.fillRect(w/2-bw/2, h-14, bw, bh);
        ctx.fillStyle = frightTimer<2 && Math.floor(globalT*8)%2 ? '#fff':C.cyan;
        ctx.fillRect(w/2-bw/2, h-14, bw*(frightTimer/frightDur), bh);
      }

      // 状态文字
      if(state===ST.LEVELCLEAR){
        bigText(w/2,h/2,'LEVEL '+level+' CLEAR!',C.green);
      } else if(state===ST.DEAD){
        bigText(w/2,h/2,'OUCH!',C.pink);
      }
      // DEMO 标识
      if(DEMO){
        ctx.font="bold "+Math.max(9,TILE*0.45)+"px 'Press Start 2P', monospace";
        ctx.fillStyle=C.magenta; ctx.shadowColor=C.magenta; ctx.shadowBlur=8;
        ctx.textAlign='left';
        ctx.fillText('● AI DEMO', 8, h-8);
        ctx.shadowBlur=0;
      }

      ctx.restore();
    }catch(e){ console.warn('draw err',e); }
  }

  function bigText(x,y,txt,color){
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold '+Math.max(14,TILE*0.85)+"px 'Press Start 2P', monospace";
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0, y-TILE*0.9, cv.width, TILE*1.8);
    ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=16;
    ctx.fillText(txt, x, y);
    ctx.restore();
  }

  function drawPlayer(){
    if(state===ST.DEAD && deadTimer<1.2){
      // 死亡动画: 收口
    }
    ctx.save();
    ctx.translate(player.x, player.y);
    let ang=0;
    if(player.dir.x===1) ang=0;
    else if(player.dir.x===-1) ang=Math.PI;
    else if(player.dir.y===-1) ang=-Math.PI/2;
    else if(player.dir.y===1) ang=Math.PI/2;
    ctx.rotate(ang);
    const rad=TILE*0.42;
    let mouth=Math.abs(Math.sin(player.mouth))*0.32+0.05;
    if(state===ST.DEAD){ mouth=Math.min(1.0,(1.4-deadTimer)*0.9); }
    // 玩家发金光
    ctx.fillStyle=C.gold;
    ctx.shadowColor=C.gold; ctx.shadowBlur=16;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,rad, mouth*Math.PI, (2-mouth)*Math.PI);
    ctx.closePath();
    ctx.fill();
    // 描边
    ctx.lineWidth=2; ctx.strokeStyle=C.pink; ctx.stroke();
    ctx.restore();
  }

  function drawGhost(g){
    ctx.save();
    ctx.translate(g.x, g.y);
    const rad=TILE*0.40;
    let col=g.color;
    if(g.mode==='fright'){
      const flashing = frightTimer<2 && Math.floor(globalT*8)%2===0;
      col = flashing ? '#fff' : '#3a3aff';
    } else if(g.mode==='eaten'){
      col='rgba(94,240,255,0.35)';
    }
    ctx.fillStyle=col;
    ctx.shadowColor=col; ctx.shadowBlur=14;
    // 身体
    ctx.beginPath();
    ctx.arc(0,-rad*0.1,rad,Math.PI,0);
    ctx.lineTo(rad, rad*0.8);
    // 波浪底边
    const waves=4;
    for(let i=0;i<waves;i++){
      const x1=rad - (rad*2)*( (i+0.5)/waves );
      const y1=rad*0.8 + (i%2===0? rad*0.18 : -rad*0.02);
      const x2=rad - (rad*2)*( (i+1)/waves );
      ctx.lineTo(x1, rad*0.55);
      ctx.lineTo(x2, rad*0.8);
    }
    ctx.closePath();
    ctx.fill();
    // 眼睛
    if(g.mode!=='eaten'){
      ctx.shadowBlur=0;
      const ex=rad*0.35, ey=-rad*0.15, er=rad*0.28;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(-ex,ey,er,0,Math.PI*2); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
      // 瞳孔朝向移动方向
      ctx.fillStyle=(g.mode==='fright')?'#3a3aff':'#160a36';
      const pdx=g.dir.x*er*0.5, pdy=g.dir.y*er*0.5;
      ctx.beginPath(); ctx.arc(-ex+pdx,ey+pdy,er*0.55,0,Math.PI*2); ctx.arc(ex+pdx,ey+pdy,er*0.55,0,Math.PI*2); ctx.fill();
    } else {
      // 被吃: 只剩眼睛
      ctx.shadowBlur=0;
      const ex=rad*0.35, ey=-rad*0.15, er=rad*0.28;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(-ex,ey,er,0,Math.PI*2); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=C.cyan;
      const pdx=g.dir.x*er*0.5, pdy=g.dir.y*er*0.5;
      ctx.beginPath(); ctx.arc(-ex+pdx,ey+pdy,er*0.55,0,Math.PI*2); ctx.arc(ex+pdx,ey+pdy,er*0.55,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // ====================================================================
  //  主循环
  // ====================================================================
  let last=performance.now();
  function loop(now){
    let dt=(now-last)/1000; last=now;
    if(dt>0.05) dt=0.05; // 限制最大步长
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // ====================================================================
  //  录制 (?record=N)
  // ====================================================================
  function startRecording(sec){
    try{
      // 确认 canvas 尺寸有效
      if(!cv.width || !cv.height){ fit(); }
      const stream=cv.captureStream(30);
      if(!stream || stream.getVideoTracks().length===0){
        console.warn('无视频轨, 取消录制'); return;
      }
      let mt='video/webm;codecs=vp9';
      if(!MediaRecorder.isTypeSupported(mt)) mt=(MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm');
      const mr=new MediaRecorder(stream,{mimeType:mt, videoBitsPerSecond:9000000});
      const chunks=[];
      mr.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
      mr.onstop=()=>{
        const b=new Blob(chunks,{type:'video/webm'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(b); a.download='neon-maze.webm';
        document.body.appendChild(a); try{a.click()}catch(e){}
      };
      mr.start(250);
      setTimeout(()=>{ try{mr.stop()}catch(e){} }, sec*1000);
    }catch(e){ console.warn('record err',e); }
  }

  // ====================================================================
  //  启动
  // ====================================================================
  function boot(){
    fit();
    buildGrid();
    resetLevel(true);
    requestAnimationFrame(loop);

    if(DEMO){
      // 免手势直接开局
      startOv.classList.add('hidden');
      endOv.classList.add('hidden');
      // demo 模式尝试初始化音频(可能被策略拦截, 不影响画面)
      initAudio();
      try{ if(actx && actx.state==='suspended') actx.resume(); }catch(e){}
      musicStarted=true; startMusic();
      fullRestart();
      if(RECORD_SEC>0){
        // 略等画面起来再录, 保证非空
        setTimeout(()=>startRecording(RECORD_SEC), 400);
      }
    }
  }
  boot();
})();
</script>
